              </div>

              <div style={{ background: "#fff", padding: 24, borderRadius: 14, boxShadow: "0 2px 12px rgba(0,0,0,.08)", textAlign: "center", marginTop: "auto", border: "2px solid #e0c8a0" }}>
                <div style={{ fontSize: 18, fontWeight: 800, color: BRN, marginBottom: 8 }}>Készen állsz a tervezésre?</div>
                <div style={{ fontSize: 13, color: "var(--text-muted)", marginBottom: 20 }}>Az alapadatok mentésre kerülnek es öröklődnek minden szekrénynél.</div>
                <button onClick={() => setCorpusPage("types")} style={{
                  background: BRN, color: "#fff", border: "none", padding: "14px 24px", width: "100%",
                  borderRadius: 12, fontSize: 16, fontWeight: 800, fontFamily: "Inter", cursor: "pointer",
                  boxShadow: "0 4px 12px rgba(90,42,10,.25)", transition: "all .2s"
                }}
                  onMouseEnter={e => e.currentTarget.style.transform = "translateY(-2px)"}
                  onMouseLeave={e => e.currentTarget.style.transform = "none"}
                >
                  Tovább a szekrénytípusokhoz {"\u2192"}
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    // DRAWER CABINET CALCULATOR
    // ═══════════════════════════════════════════
    function DrawerCalc(props) {
      const variant = props.variant || "kitchen";
      const params = props.params || { boardThickness: 18, countertopThickness: 38, counterHeight: 850, cabinetHeight: 2000, plinthHeight: 100, gapBetween: 600, upperHeight: 720, lowerDepth: 560, upperDepth: 300, upperDoorGapBottom: 0, upperDoorGapTop: 2, upperDoorGapSide: 2, lowerDoorGapBottom: 0, lowerDoorGapTop: 5, lowerDoorGapSide: 2, drawerGap: 3, shelfSetback: 20, backPanelGap: 5, handleOrient: "horizontal", handleCenter: true, handlePitch: 128, handleMarginX: 50, handleMarginY: 50, hingeMargin: 100 };
      const boardColors = props.boardColors || [{ name: "Fehér", hex: "#f5f0e8" }, { name: "Sonoma tölgy", hex: "#c4a060" }];
      const edgeBandOptions = props.edgeBandOptions || [{ name: "Fehér", defT: 0 }, { name: "Sötét", defT: 1 }];
      const partDefaults = props.partDefaults || [
        { id: "lower_side", filter: "lower", name: "Oldallap", colorIdx: 0, edges: [{ o: 0, t: 0 }, null, null, null] },
        { id: "lower_bottom", filter: "lower", name: "Fenéklap", colorIdx: 0, edges: [{ o: 0, t: 0 }, null, null, null] },
        { id: "lower_brace_f", filter: "lower", name: "Első átkötő", colorIdx: 0, edges: [{ o: 0, t: 0 }, null, null, null] },
        { id: "lower_brace_b", filter: "lower", name: "Hátsó átkötő", colorIdx: 0, edges: [null, null, null, null] },
        { id: "lower_back", filter: "lower", name: "Hátlap", colorIdx: 0, edges: [null, null, null, null] },
        { id: "lower_door", filter: "lower", name: "Ajtólap", colorIdx: 0, edges: [{ o: 0, t: 0 }, { o: 0, t: 0 }, { o: 0, t: 0 }, { o: 0, t: 0 }] }
      ];
      const onBack = props.onBack || (() => window.location.reload());

      const [W, setW] = usePersistentState("DrawerCalc", "W", 600);
      const [customH, setCustomH] = usePersistentState("DrawerCalc", "customH", null);
      const [localDepth, setLocalDepth] = usePersistentState("DrawerCalc", "localDepth", params.lowerDepth || 560);
      const [depthIncludesFront, setDepthIncludesFront] = usePersistentState("DrawerCalc", "depthIncludesFront", false);
      const [braceDepth, setBraceDepth] = usePersistentState("DrawerCalc", "braceDepth", 100);
      const [backT, setBackT] = usePersistentState("DrawerCalc", "backT", 3);
      const [bottomPos, setBottomPos] = usePersistentState("DrawerCalc", "bottomPos", "between");
      const [topPos, setTopPos] = usePersistentState("DrawerCalc", "topPos", "between");
      const [doorGapTop, setDoorGapTop] = usePersistentState("DrawerCalc", "doorGapTop", params.lowerDoorGapTop);
      const [doorGapBottom, setDoorGapBottom] = usePersistentState("DrawerCalc", "doorGapBottom", params.lowerDoorGapBottom);
      const [doorGapSide, setDoorGapSide] = usePersistentState("DrawerCalc", "doorGapSide", params.lowerDoorGapSide);
      const [drawerGap, setDrawerGap] = usePersistentState("DrawerCalc", "drawerGap", params.drawerGap || 3);
      const [splitSides, setSplitSides] = usePersistentState("DrawerCalc", "splitSides", false);
      const [swappedParts, setSwappedParts] = usePersistentState("DrawerCalc", "swappedParts", {});

      const [drawerCount, setDrawerCount] = usePersistentState("DrawerCalc", "drawerCount", 3);
      const [drawerDist, setDrawerDist] = usePersistentState("DrawerCalc", "drawerDist", "preset_3_1");
      const [customHeights, setCustomHeights] = usePersistentState("DrawerCalc", "customHeights", {});

      const [handlePitch, setHandlePitch] = usePersistentState("DrawerCalc", "handlePitch", params.handlePitch);
      const [handleCenter, setHandleCenter] = usePersistentState("DrawerCalc", "handleCenter", true);
      const [handleMarginX, setHandleMarginX] = usePersistentState("DrawerCalc", "handleMarginX", params.handleMarginX);
      const [handleMarginY, setHandleMarginY] = usePersistentState("DrawerCalc", "handleMarginY", params.handleMarginY);

      const bt = params.boardThickness;
      const autoTotalCabinetH = variant === "kitchen" ? params.counterHeight - params.countertopThickness : params.cabinetHeight;
      const autoCorpusH = autoTotalCabinetH - params.plinthHeight;
      const corpusFrameH = customH !== null ? customH : autoCorpusH;
      const totalCabinetH = corpusFrameH + params.plinthHeight;

      let sideH = corpusFrameH;
      if (bottomPos === "under") sideH -= bt;
      if (variant === "simple" && topPos === "over") sideH -= bt;

      const sideDepth = localDepth;

      const internalW = W - 2 * bt;
      let internalH = sideH;
      if (bottomPos === "between") internalH -= bt;
      if (variant === "kitchen" || topPos === "between") internalH -= bt;

      const backPanelW = W; // Nailed from outside, so full width. Wait, the user said "hátfal kívülről van felszegelve". I'll use W.
      const backPanelH = corpusFrameH; // Nailed from outside, full height

      const bottomPanelL = bottomPos === "between" ? internalW : W;
      const bottomPanelW = sideDepth;
      const braceL = internalW;
      const topPanelL = topPos === "between" ? internalW : W;

      const totalFrontsH = corpusFrameH - doorGapTop - doorGapBottom - ((drawerCount - 1) * drawerGap);
      const drawerW = W - 2 * doorGapSide;

      const [drawerRunner, setDrawerRunner] = usePersistentState("DrawerCalc", "drawerRunner", "HB_45");
      const [drawerSlideW, setDrawerSlideW] = usePersistentState("DrawerCalc", "drawerSlideW", 26);
      const [drawerBt, setDrawerBt] = usePersistentState("DrawerCalc", "drawerBt", 16);
      const [svgTab, setSvgTab] = usePersistentState("DrawerCalc", "svgTab", "front");

      // ── Blum Tandem specifikus state-ek ──
      const [tandemBt, setTandemBt] = usePersistentState("DrawerCalc", "tandemBt", 18);             // Fiók oldalfal vastagság 17-19 mm
      const [tandemSkirtSetback, setTandemSkirtSetback] = usePersistentState("DrawerCalc", "tandemSkirtSetback", 12); // Szoknya visszaállás 12-15 mm
      // Felső fiók: rés a fióktest teteje és az átkötő/tetőlap alja között (min 7mm, katalógusérték)
      const [topBraceGap, setTopBraceGap] = usePersistentState("DrawerCalc", "topBraceGap", 7);
      // Felső fiók: csúszó alja mennyivel feljebb az előlap aljánál
      const [topBottomOffset, setTopBottomOffset] = usePersistentState("DrawerCalc", "topBottomOffset", 10);
      // Köztes fiók: fióktest teteje mennyivel lejjebb az előlap tetejénél
      const [midTopOffset, setMidTopOffset] = usePersistentState("DrawerCalc", "midTopOffset", 20);
      // Köztes fiók: csúszó alja mennyivel feljebb az előlap aljánál
      const [midBottomOffset, setMidBottomOffset] = usePersistentState("DrawerCalc", "midBottomOffset", 10);
      // Alsó fiók: fióktest teteje mennyivel lejjebb az előlap tetejénél
      const [botTopOffset, setBotTopOffset] = usePersistentState("DrawerCalc", "botTopOffset", 20);
      // Alsó fiók: rés a szekrény fenéklapja felett
      const [botBottomGap, setBotBottomGap] = usePersistentState("DrawerCalc", "botBottomGap", 1);
      // Elő/hátlap szélesség levonás és tűrés
      const [tandemWidthDeduction, setTandemWidthDeduction] = usePersistentState("DrawerCalc", "tandemWidthDeduction", 49);
      const [tandemWidthTolerance, setTandemWidthTolerance] = usePersistentState("DrawerCalc", "tandemWidthTolerance", 0);

      // Blum Tandem NL (Névleges hossz) táblázat
      const TANDEM_NL_TABLE = [
        { nl: 250, code: "560F2500B", load: 30 },
        { nl: 270, code: "560F2700B", load: 30 },
        { nl: 300, code: "560F3000B", load: 30 },
        { nl: 350, code: "560F3500B", load: 30 },
        { nl: 400, code: "560F4000B", load: 30 },
        { nl: 450, code: "560F4500B", load: 30 },
        { nl: 500, code: "560F5000B", load: 30 },
        { nl: 550, code: "560F5500B", load: 30 },
        { nl: 600, code: "560F6000B", load: 30 },
      ];

      // NL automatikus kiválasztás: korpusz mélysége (előlap nélkül) >= NL + 3
      const tandemNL = useMemo(() => {
        const availableDepth = sideDepth;
        let best = null;
        for (const entry of TANDEM_NL_TABLE) {
          if (availableDepth >= entry.nl + 3) best = entry;
        }
        return best || TANDEM_NL_TABLE[0];
      }, [sideDepth]);

      const getPresets = (count) => {
        if (count === 2) return [
          { id: "equal", label: "Egyenletes", sublabel: "50/50", ratios: [0.5, 0.5] },
          { id: "preset_2_1", label: "Kis + Nagy", sublabel: "30/70", ratios: [0.3, 0.7] },
        ];
        if (count === 3) return [
          { id: "equal", label: "Egyenletes", sublabel: "33/33/33", ratios: [1/3, 1/3, 1/3] },
          { id: "preset_3_1", label: "K + N + N", sublabel: "20/40/40", ratios: [0.2, 0.4, 0.4] },
          { id: "preset_3_2", label: "K + K + N", sublabel: "20/30/50", ratios: [0.2, 0.3, 0.5] },
        ];
        if (count === 4) return [
          { id: "equal", label: "Egyenletes", sublabel: "25/25/25/25", ratios: [0.25, 0.25, 0.25, 0.25] },
          { id: "preset_4_1", label: "K + 3×K", sublabel: "15/28/28/29", ratios: [0.15, 0.28, 0.28, 0.29] },
        ];
        return [{ id: "equal", label: "Egyenletes", sublabel: "", ratios: [1] }];
      };

      if (!getPresets(drawerCount).find(p => p.id === drawerDist) && drawerDist !== "custom") {
        setDrawerDist("equal");
      }

      let frontsH = [];
      let exactFrontsH = [];
      if (drawerDist === "equal") {
        const exactH = totalFrontsH / drawerCount;
        const h = Math.round(exactH);
        frontsH = Array(drawerCount).fill(h);
        exactFrontsH = Array(drawerCount).fill(exactH);
        frontsH[drawerCount - 1] = totalFrontsH - (h * (drawerCount - 1));
      } else if (drawerDist === "preset_3_1" && drawerCount === 3) {
        const h1 = Math.round(totalFrontsH * 0.2);
        const h2 = Math.round(totalFrontsH * 0.4);
        frontsH = [h1, h2, totalFrontsH - h1 - h2];
      } else if (drawerDist === "preset_3_2" && drawerCount === 3) {
        const h1 = Math.round(totalFrontsH * 0.2);
        const h2 = Math.round(totalFrontsH * 0.3);
        frontsH = [h1, h2, totalFrontsH - h1 - h2];
      } else if (drawerDist === "preset_4_1" && drawerCount === 4) {
        const h1 = Math.round(totalFrontsH * 0.15);
        const h2 = Math.round(totalFrontsH * 0.28);
        frontsH = [h1, h2, h2, totalFrontsH - h1 - h2 * 2];
      } else if (drawerDist === "preset_2_1" && drawerCount === 2) {
        const h1 = Math.round(totalFrontsH * 0.3);
        frontsH = [h1, totalFrontsH - h1];
      } else if (drawerDist === "custom") {
        frontsH = Array(drawerCount).fill(0);
        let sum = 0;
        let lastUnsetIdx = -1;
        for (let i = 0; i < drawerCount; i++) {
          if (customHeights[i] !== undefined) {
            frontsH[i] = customHeights[i];
            sum += customHeights[i];
          } else {
            lastUnsetIdx = i;
          }
        }
        if (lastUnsetIdx === -1) lastUnsetIdx = drawerCount - 1;
        const remaining = totalFrontsH - sum + (customHeights[lastUnsetIdx] || 0);
        frontsH[lastUnsetIdx] = Math.max(0, remaining);
      }

      const TANDEM_BOTTOM_DEDUCTION = 27.5; // fix katalógus érték: csúszómechanizmus igénye

      let drawerBoxes = [];
      let drawerMaterials = [];
      if (drawerRunner === "HB_45") {
        const boxW = internalW - drawerSlideW;
        const internalDepth = sideDepth; // Side panel depth IS the internal depth because back panel is nailed outside.
        const boxD = internalDepth - 10;
        drawerBoxes = frontsH.map((h, i) => {
          let boxH;
          if (i === 0) {
            boxH = h - bt + doorGapTop - 20;
          } else if (i === frontsH.length - 1) {
            boxH = h - bt + doorGapBottom - 30;
          } else {
            boxH = h - 30;
          }
          if (boxH < 20) boxH = 20;
          
          const finalBoxW = Number(boxW.toFixed(1));
          const finalBoxD = Math.round(boxD);
          const finalBoxH = Math.round(boxH);
          
          drawerMaterials.push({ id: `drw_side_${i}`, name: `${i + 1}. Fiók oldallap`, qty: 2, l: finalBoxD, w: finalBoxH, t: drawerBt, note: "", colorIdx: 0, edges: [{ o: 0, t: 0 }, null, null, null], isDrawer: true });
          drawerMaterials.push({ id: `drw_fb_${i}`, name: `${i + 1}. Fiók elő/hátlap`, qty: 2, l: finalBoxW - 2 * drawerBt, w: finalBoxH, t: drawerBt, note: "Oldallapok között", colorIdx: 0, edges: [{ o: 0, t: 0 }, null, null, null], isDrawer: true });
          drawerMaterials.push({ id: `drw_bot_${i}`, name: `${i + 1}. Fiók fenéklap`, qty: 1, l: finalBoxW - 2 * drawerBt, w: finalBoxD - 2 * drawerBt, t: drawerBt, note: "Kereten belül", colorIdx: 0, edges: [null, null, null, null], isDrawer: true });
          
          return { w: finalBoxW, d: finalBoxD, h: finalBoxH };
        });
      } else if (drawerRunner === "Blum_Tandem") {
        // ── Blum Tandem 560F fiókdoboz számítás (újraírt logika) ──
        // SKW = belső fiókszélesség (külméret) = LW - tandemWidthDeduction - tandemWidthTolerance
        // SKL = fiókhosszúság = NL - 10
        const SKW = internalW - tandemWidthDeduction - tandemWidthTolerance;
        const SKL = tandemNL.nl - 10;
        const tBt = tandemBt; // fiók anyagvastagság (17-19mm)
        const skirt = tandemSkirtSetback; // szoknya visszaállás (12-15mm)
        // TANDEM_BOTTOM_DEDUCTION fentebb van definiálva (modul szinten)

        // Minden fiók elérhető magassága önállóan, pozíció alapján
        const availableHeights = frontsH.map((h, i) => {
          if (i === 0) {
            // FELSŐ FIÓK: előlap rátakar az átkötőre
            // topCover = mennyivel lóg rá az előlap az átkötőre
            const topCover = Math.max(0, bt - doorGapTop);
            // Elérhető tér = előlap magasság − takarás felül − rés az átkötő alatt − csúszó alja feljebb az előlap aljánál
            return h - topCover - topBraceGap - topBottomOffset;
          } else if (i === frontsH.length - 1) {
            // ALSÓ FIÓK: előlap rátakar a fenéklapra
            // bottomCover = mennyivel lóg rá az előlap a fenéklapra
            const bottomCover = Math.max(0, bt - doorGapBottom);
            // Elérhető tér = előlap − takarás alul − fióktest teteje lejjebb az előlap tetejénél − rés a fenéklap és csúszó alja között
            return h - bottomCover - botTopOffset - botBottomGap;
          } else {
            // KÖZTES FIÓK: nincs takarás, csak a megadott offset-ek szűkítik
            // midTopOffset: fióktest teteje mennyivel lejjebb az előlap tetejénél
            // midBottomOffset: csúszó alja mennyivel feljebb az előlap aljánál
            return h - midTopOffset - midBottomOffset;
          }
        });

        drawerBoxes = frontsH.map((h, i) => {
          // Minden fiók saját, független elérhető magasságával számolunk
          const usableH = availableHeights[i];

          // Fiókoldal magasság: rendelkezésre álló magasság - TANDEM_BOTTOM_DEDUCTION + szoknya visszaállás
          const sideHCalc = usableH - TANDEM_BOTTOM_DEDUCTION + skirt;
          const finalSideH = Math.max(37, Math.round(sideHCalc)); // minimum a sín magassága (37mm)

          // Elő/hátlap magasság: oldallap magasság - szoknya visszaállás
          const fbH = Math.max(20, finalSideH - skirt);

          // Alkatrészek:
          // 1. Oldalfal (2db): SKL × sideH × tBt — teljes mélység, teljes magasság szoknyával
          drawerMaterials.push({
            id: `tnd_side_${i}`, name: `${i + 1}. Fiók oldallap`,
            qty: 2, l: SKL, w: finalSideH, t: tBt,
            note: `Tandem — szoknya: ${skirt} mm`,
            colorIdx: 0, edges: [{ o: 0, t: 0 }, null, null, null], isDrawer: true
          });

          // 2. Elő/hátlap (2db): szélesség = SKW, magasság = fbH (szoknya nélkül)
          //    Az elő/hátlap szélessége = SKW (ami már LW - 49 - tűrés)
          const fbW = SKW;
          drawerMaterials.push({
            id: `tnd_fb_${i}`, name: `${i + 1}. Fiók elő/hátlap`,
            qty: 2, l: fbW, w: fbH, t: tBt,
            note: "Oldallapok között",
            colorIdx: 0, edges: [{ o: 0, t: 0 }, null, null, null], isDrawer: true
          });

          // 3. Fenéklap (1db): szélesség = elő/hátlap szélessége (SKW), hossz = oldallapok hossza - anyagvastagság
          const botW = fbW;
          const botD = SKL - tBt;
          drawerMaterials.push({
            id: `tnd_bot_${i}`, name: `${i + 1}. Fiók fenéklap`,
            qty: 1, l: botW, w: botD, t: tBt,
            note: `Oldallapok között`,
            colorIdx: 0, edges: [null, null, null, null], isDrawer: true
          });

          // Pozíció típus meghatározása
          const posType = i === 0 ? "felső" : (i === frontsH.length - 1 ? "alsó" : "köztes");

          return { w: SKW, d: SKL, h: finalSideH, fbH: fbH, skirt: skirt, botW: botW, botD: botD, posType: posType, usableH: Math.round(usableH), availH: Math.round(availableHeights[i]) };
        });
      }

      const getDef = (id) => partDefaults.find(p => p.id === id) || { colorIdx: 0, edges: [{ o: 0, t: 0 }, null, null, null] };
      const sideDef = getDef("lower_side");
      const bottomDef = getDef("lower_bottom");
      const braceFDef = getDef("lower_brace_f");
      const braceBDef = getDef("lower_brace_b");
      const backDef = getDef("lower_back");
      const doorDef = getDef("lower_door");

      const sideNote = () => {
        let n = [];
        if (bottomPos === "under") n.push("Lent rááll");
        if (variant === "simple" && topPos === "over") n.push("Fent alááll");
        return n.join(", ");
      };

      const e04 = { o: 0, t: 0 };
      const defaultParts = [
        ...(splitSides ? [
          { id: "side_l", name: "Oldallap (bal)", qty: 1, l: sideH, w: params.lowerDepth, t: bt, note: sideNote(), colorIdx: sideDef.colorIdx, edges: [...sideDef.edges] },
          { id: "side_r", name: "Oldallap (jobb)", qty: 1, l: sideH, w: params.lowerDepth, t: bt, note: sideNote(), colorIdx: sideDef.colorIdx, edges: [...sideDef.edges] },
        ] : [
          { id: "side", name: "Oldallap", qty: 2, l: sideH, w: params.lowerDepth, t: bt, note: sideNote(), colorIdx: sideDef.colorIdx, edges: [...sideDef.edges] },
        ]),
        { id: "bottom", name: "Fenéklap", qty: 1, l: bottomPanelL, w: bottomPanelW, t: bt, note: bottomPos === "between" ? "Oldalfalak között" : "Oldalfalak alatt", colorIdx: bottomDef.colorIdx, edges: bottomPos === "between" ? [...bottomDef.edges] : [bottomDef.edges[0], bottomDef.edges[1], bottomDef.edges[0] || e04, bottomDef.edges[3]] },
        ...(variant === "kitchen" ? [
          { id: "brace_f", name: "Átkötő (elöl)", qty: 1, l: braceL, w: braceDepth, t: bt, note: "Felül, elöl", colorIdx: braceFDef.colorIdx, edges: [...braceFDef.edges] },
          { id: "brace_b", name: "Átkötő (hátul)", qty: 1, l: braceL, w: braceDepth, t: bt, note: "Felül, hátul", colorIdx: braceBDef.colorIdx, edges: [...braceBDef.edges] }
        ] : [
          { id: "top", name: "Tetőlap", qty: 1, l: topPanelL, w: params.lowerDepth, t: bt, note: topPos === "between" ? "Oldalfalak között" : "Oldalfalak felett", colorIdx: bottomDef.colorIdx, edges: topPos === "between" ? [...bottomDef.edges] : [bottomDef.edges[0], bottomDef.edges[1], bottomDef.edges[0] || e04, bottomDef.edges[3]] }
        ]),
        { id: "back", name: "Hátlap", qty: 1, l: backPanelW, w: backPanelH, t: backT, note: "HDF (" + params.backPanelGap + " mm behúzás)", colorIdx: backDef.colorIdx, edges: [...backDef.edges] },
        ...frontsH.map((h, i) => {
          let exactStr = exactFrontsH && exactFrontsH[i] ? `(Pontos: ${exactFrontsH[i].toFixed(1)} mm)` : "";
          return {
            id: "front_" + i, name: "Fiókelőlap " + (i + 1) + ".", qty: 1, l: h, w: drawerW, t: bt, note: `Fogantyú: Vízszintes ${exactStr}`, colorIdx: doorDef.colorIdx, edges: [...doorDef.edges], isFront: true
          };
        }),
        ...drawerMaterials
      ];

      const toggleSwap = (id) => setSwappedParts(prev => ({ ...prev, [id]: !prev[id] }));
      const getDisplayDims = (p) => {
        const swapped = swappedParts[p.id];
        return swapped ? { l: p.w, w: p.l } : { l: p.l, w: p.w };
      };

      const [partOverrides, setPartOverrides] = usePersistentState("DrawerCalc", "partOverrides", {});
      const getPart = (p) => {
        const ov = partOverrides[p.id] || {};
        return {
          ...p,
          colorIdx: ov.colorIdx !== undefined ? ov.colorIdx : p.colorIdx,
          edges: ov.edges || p.edges,
        };
      };
      const setPartOverride = (id, key, val) => {
        setPartOverrides(prev => ({ ...prev, [id]: { ...prev[id], [key]: val } }));
      };

      const parts = defaultParts.map(getPart);

      const thickLabels = ["0.4", "2"];
      const edgeLabel = (e) => e ? (edgeBandOptions[e.o]?.name?.charAt(0) || "?") + " " + thickLabels[e.t] : "—";
      const edgeBg = (e) => {
        if (!e) return "#e0dbd0";
        const colors = ["#b8d0e8", "#e8c8a0"];
        return colors[e.o] || "#ddd";
      };
      const cycleEdgeColor = (e) => {
        if (!e) return { o: 0, t: edgeBandOptions[0]?.defT || 0 };
        if (e.o < edgeBandOptions.length - 1) return { ...e, o: e.o + 1 };
        return null;
      };
      const toggleEdgeThick = (e) => {
        if (!e) return { o: 0, t: 1 };
        return { ...e, t: e.t === 0 ? 1 : 0 };
      };

      const setCustomFrontH = (idx, h) => {
        setCustomHeights(prev => ({ ...prev, [idx]: h }));
        setDrawerDist("custom");
      };

      // SVG dimensions
      const SVW = 370, SVH = 520;
      const padL = 80, padR = 80, padT = 36, padB = 64;
      const drawW = SVW - padL - padR;
      const drawH = SVH - padT - padB;
      const scX = drawW / W;
      const scY = drawH / totalCabinetH;
      const sc = Math.min(scX, scY);
      const cw = W * sc;
      const ch = totalCabinetH * sc;
      const cx = padL + (drawW - cw) / 2;
      const cy = padT + (drawH - ch) / 2;

      const yFromBot = (mmFromBot) => cy + ch - mmFromBot * sc;

      const plinthTopY = yFromBot(params.plinthHeight);
      const cabinetTopY = cy;
      const bottomPanelTopY = plinthTopY - bt * sc;

      const sideTopY = variant === "simple" && topPos === "over" ? cabinetTopY + bt * sc : cabinetTopY;
      const sideBotY = bottomPos === "under" ? bottomPanelTopY : plinthTopY;
      const sideDrawH = sideBotY - sideTopY;

      return (
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: 16 }}>
          <button onClick={onBack} style={{
            padding: "6px 16px", borderRadius: 8, background: "rgba(90,42,10,.1)", border: "1.5px solid rgba(90,42,10,.2)",
            color: BRN, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "Inter, sans-serif", marginBottom: 16
          }}>{"\u2190"} Vissza a szekrénytípusokhoz</button>

          <div style={{ display: "grid", gridTemplateColumns: "280px 1fr 460px", gap: 20, alignItems: "start" }}>
            {/* Left Column */}
            <div>
              <div style={cardStyle}>
                <div style={{ fontWeight: 800, fontSize: 14, color: BRN, marginBottom: 12 }}>{"\uD83D\uDDC4\uFE0F"} Fiókos szekrény</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                    Szekrény szélessége
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={W} min={200} onChange={e => setW(e.target.value === "" ? "" : +e.target.value)} style={{ ...inputStyle, fontSize: 14 }} />
                      <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>mm</span>
                    </div>
                     <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                       {[300, 450, 600, 800, 900].map(w => (
                         <button key={w} onClick={e => { e.preventDefault(); setW(w); }} style={{
                           padding: "2px 8px", borderRadius: 5, fontSize: 11, cursor: "pointer",
                           background: W === w ? "#5a2a0a" : "#e8dfd0",
                           color: W === w ? "#fff" : "#5a4a3a",
                           border: W === w ? "1.5px solid #5a2a0a" : "1.5px solid #c0b090",
                           fontWeight: 700, fontFamily: "JetBrains Mono, monospace", transition: "all .15s"
                         }}>{w}</button>
                       ))}
                     </div>
                  </label>
                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span>Korpusz magassága</span>
                      {customH !== null && (
                        <button onClick={() => setCustomH(null)} style={{ fontSize: 9, padding: "1px 6px", borderRadius: 5, cursor: "pointer", background: "#f0e0d0", border: "1px solid #c0a080", color: BRN, fontWeight: 700 }}>↩ Auto ({autoCorpusH} mm)</button>
                      )}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={customH !== null ? customH : autoCorpusH} min={100} onChange={e => setCustomH(e.target.value === "" ? "" : +e.target.value)} style={{ ...inputStyle, fontSize: 14, borderColor: customH !== null ? AMB : "#ddd" }} />
                      <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>mm</span>
                    </div>
                  </label>
                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                    <span>Szekrény mélysége <span style={{ fontWeight: 400, color: "#999" }}>(előlap nélkül)</span></span>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={localDepth} min={100} onChange={e => setLocalDepth(e.target.value === "" ? "" : +e.target.value)} style={{ ...inputStyle, fontSize: 14 }} />
                      <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>mm</span>
                    </div>
                  </label>
                  {[
                    ...(variant === "kitchen" ? [{ label: "Átkötő mélysége", val: braceDepth, set: setBraceDepth, min: 50, unit: "mm" }] : []),
                    { label: "Hátlap vastagság", val: backT, set: setBackT, min: 1, unit: "mm" },
                  ].map(f => (
                    <label key={f.label} style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                      {f.label}
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <input type="number" value={f.val} min={f.min} onChange={e => f.set(e.target.value === "" ? "" : +e.target.value)} style={{ ...inputStyle, fontSize: 14 }} />
                        <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>{f.unit}</span>
                      </div>
                    </label>
                  ))}
                </div>

                <div style={{ marginTop: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".05em" }}>Fiókelőlap rések</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                    {[
                      { label: "Alul", val: doorGapBottom, set: setDoorGapBottom },
                      { label: "Felül", val: doorGapTop, set: setDoorGapTop },
                      { label: "Oldalt", val: doorGapSide, set: setDoorGapSide },
                      { label: "Közöttük", val: drawerGap, set: setDrawerGap },
                    ].map(f => (
                      <label key={f.label} style={{ display: "flex", flexDirection: "column", gap: 2, fontSize: 11, color: "var(--text-secondary)", fontWeight: 600 }}>
                        {f.label}
                        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                          <input type="number" value={f.val} min={0} onChange={e => f.set(e.target.value === "" ? "" : +e.target.value)} style={{ ...inputStyle, fontSize: 13, padding: "4px 6px" }} />
                          <span style={{ fontSize: 10, color: "#aaa" }}>mm</span>
                        </div>
                      </label>
                    ))}
                  </div>
                </div>

                <div style={{ marginTop: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".05em" }}>Fenéklap pozíciója</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                     {[
                       { id: "between", label: "Oldalfalak között",
                         svg: <svg width="36" height="22" viewBox="0 0 36 22" fill="currentColor" style={{flexShrink:0,marginTop:2}}>
                           <rect x="0" y="0" width="5" height="22"/><rect x="31" y="0" width="5" height="22"/>
                           <rect x="6" y="16" width="24" height="5"/>
                         </svg>,
                         desc: "Fenéklap a két oldallap közé kerül" },
                       { id: "under", label: "Oldalfalak alatt",
                         svg: <svg width="36" height="22" viewBox="0 0 36 22" fill="currentColor" style={{flexShrink:0,marginTop:2}}>
                           <rect x="0" y="0" width="5" height="15"/><rect x="31" y="0" width="5" height="15"/>
                           <rect x="0" y="16" width="36" height="6"/>
                         </svg>,
                         desc: "Fenéklap az oldallapok alatt, azok ráállnak" },
                     ].map(opt => (
                       <button key={opt.id} onClick={() => setBottomPos(opt.id)} style={{ padding: "8px 12px", borderRadius: 8, fontSize: 12, cursor: "pointer", background: bottomPos === opt.id ? "#5a2a0a" : "#f4efe8", color: bottomPos === opt.id ? "#fff" : "#5a4a3a", border: bottomPos === opt.id ? "2px solid #5a2a0a" : "2px solid #d8d0c0", fontWeight: 700, fontFamily: "Inter, sans-serif", textAlign: "left", transition: "all .15s", display: "flex", alignItems: "flex-start", gap: 10 }}>
                         {opt.svg}
                         <div>{opt.label}<div style={{ fontSize: 10, fontWeight: 400, opacity: .7, marginTop: 2 }}>{opt.desc}</div></div>
                       </button>
                     ))}
                  </div>
                </div>

                {variant === "simple" && (
                  <div style={{ marginTop: 14 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".05em" }}>Tetőlap pozíciója</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                       {[
                         { id: "between", label: "Oldalfalak között",
                           svg: <svg width="36" height="22" viewBox="0 0 36 22" fill="currentColor" style={{flexShrink:0,marginTop:2}}>
                             <rect x="0" y="0" width="5" height="22"/><rect x="31" y="0" width="5" height="22"/>
                             <rect x="6" y="1" width="24" height="5"/>
                           </svg>,
                           desc: "Tetőlap a két oldallap közé kerül" },
                         { id: "over", label: "Oldalfalak felett",
                           svg: <svg width="36" height="22" viewBox="0 0 36 22" fill="currentColor" style={{flexShrink:0,marginTop:2}}>
                             <rect x="0" y="7" width="5" height="15"/><rect x="31" y="7" width="5" height="15"/>
                             <rect x="0" y="1" width="36" height="5"/>
                           </svg>,
                           desc: "Tetőlap az oldallapok felett" },
                       ].map(opt => (
                         <button key={opt.id} onClick={() => setTopPos(opt.id)} style={{ padding: "8px 12px", borderRadius: 8, fontSize: 12, cursor: "pointer", background: topPos === opt.id ? "#5a2a0a" : "#f4efe8", color: topPos === opt.id ? "#fff" : "#5a4a3a", border: topPos === opt.id ? "2px solid #5a2a0a" : "2px solid #d8d0c0", fontWeight: 700, fontFamily: "Inter, sans-serif", textAlign: "left", transition: "all .15s", display: "flex", alignItems: "flex-start", gap: 10 }}>
                           {opt.svg}
                           <div>{opt.label}<div style={{ fontSize: 10, fontWeight: 400, opacity: .7, marginTop: 2 }}>{opt.desc}</div></div>
                         </button>
                       ))}
                    </div>
                  </div>
                )}

                <div style={{ marginTop: 14 }}>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                    <div onClick={() => setSplitSides(s => !s)} style={{ width: 36, height: 20, borderRadius: 10, background: splitSides ? "#5a2a0a" : "#d0ccc0", position: "relative", cursor: "pointer", transition: "all .2s" }}>
                      <div style={{ width: 16, height: 16, borderRadius: 8, background: "#fff", position: "absolute", top: 2, left: splitSides ? 18 : 2, transition: "all .2s", boxShadow: "0 1px 3px rgba(0,0,0,.2)" }} />
                    </div>
                    Különböző oldallapok (bal/jobb)
                  </label>
                </div>
              </div>
            </div>

            {/* Center Column */}
            <div>
              <div style={cardStyle}>
                <div style={{ fontWeight: 800, fontSize: 14, color: BRN, marginBottom: 12 }}>{"\uD83D\uDCCB"} Alkatrészlista</div>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr>
                        {["Alkatrész", "db", "H × Sz (mm)  ⇄", "Vtg.", "Szín", "Élek (H1·H2·Sz1·Sz2)", "Megj."].map((h, i) => (
                          <th key={i} style={{ padding: "7px 6px", textAlign: "left", fontSize: 9, fontWeight: 700, background: BRN, color: "#fff", textTransform: "uppercase", letterSpacing: ".03em", whiteSpace: "nowrap", borderRight: "1px solid rgba(255,255,255,.1)" }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {(() => {
                        const corpusParts = parts.filter(p => !p.isFront && !p.isDrawer);
                        const frontParts = parts.filter(p => p.isFront);
                        const drawerParts = parts.filter(p => p.isDrawer);
                        const sections = [
                          { key: "corpus", label: "Korpusz anyag", color: "#5a3a1a", bg: "#f4ede0", parts: corpusParts },
                          { key: "front", label: "Előlap", color: "#1a3a5a", bg: "#e0eaf4", parts: frontParts },
                          { key: "drawer", label: "Fiókanyag", color: "#1a4a2a", bg: "#e0f4e8", parts: drawerParts },
                        ];
                        let globalIdx = 0;
                        return sections.map(sec => [
                          sec.parts.length > 0 && (
                            <tr key={sec.key + "_header"}>
                              <td colSpan={7} style={{ padding: "6px 8px 4px", fontSize: 10, fontWeight: 800, color: sec.color, background: sec.bg, textTransform: "uppercase", letterSpacing: ".08em", borderTop: "2px solid " + sec.color + "44", borderBottom: "1px solid " + sec.color + "33" }}>{sec.label}</td>
                            </tr>
                          ),
                          ...sec.parts.map((p, si) => {
                            const rowBg = si % 2 ? "#f8f6f2" : "#fff";
                            const dims = getDisplayDims(p);
                            const isSwapped = !!swappedParts[p.id];
                            globalIdx++;
                            return (
                              <tr key={p.id} style={{ background: rowBg, height: 32 }}>
                                <td style={{ padding: "6px", fontWeight: 700, color: "var(--text)", whiteSpace: "nowrap" }}>{p.name}</td>
                                <td style={{ padding: "6px", textAlign: "center", whiteSpace: "nowrap" }}>{monoSpan(p.qty)}</td>
                                <td style={{ padding: "6px", whiteSpace: "nowrap" }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                                    {monoSpan(dims.l)}<span style={{ fontSize: 10, color: "#aaa" }}>×</span>{monoSpan(dims.w)}
                                    <button onClick={() => toggleSwap(p.id)} title="Szálirány megfordítása" style={{ marginLeft: 2, padding: "1px 5px", borderRadius: 4, cursor: "pointer", fontSize: 10, fontWeight: 700, lineHeight: 1, background: isSwapped ? "#e8f0ff" : "#f0f0f0", border: isSwapped ? "1.5px solid #3a7acc" : "1px solid #ccc", color: isSwapped ? "#3a7acc" : "#888" }}>⇄</button>
                                  </div>
                                </td>
                                <td style={{ padding: "6px", whiteSpace: "nowrap" }}>{monoSpan(p.t)}</td>
                                <td style={{ padding: "6px", whiteSpace: "nowrap" }}>
                                  <div onClick={() => { const next = ((p.colorIdx || 0) + 1) % boardColors.length; setPartOverride(p.id, "colorIdx", next); }} style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer", userSelect: "none" }} title="Kattints a szín váltáshoz">
                                    <div style={{ width: 14, height: 14, borderRadius: 3, background: boardColors[p.colorIdx]?.hex || "#ccc", border: "1.5px solid #888", flexShrink: 0, transition: "all .15s" }} />
                                    <span style={{ fontSize: 10, color: "#666" }}>{boardColors[p.colorIdx]?.name || "?"}</span>
                                  </div>
                                </td>
                                <td style={{ padding: "6px" }}>
                                  <div style={{ display: "flex", gap: 2 }}>
                                    {["H1", "H2", "Sz1", "Sz2"].map((lbl, ei) => {
                                      const ev = p.edges[ei];
                                      return (
                                        <div key={lbl} onClick={() => { const newEdges = [...p.edges]; newEdges[ei] = cycleEdgeColor(ev); setPartOverride(p.id, "edges", newEdges); }} onContextMenu={(e) => { e.preventDefault(); e.stopPropagation(); const newEdges = [...p.edges]; newEdges[ei] = toggleEdgeThick(ev); setPartOverride(p.id, "edges", newEdges); }} title={lbl + ": bal klikk=szín, jobb klikk=vastagság"} style={{ width: 28, height: 20, borderRadius: 3, cursor: "pointer", userSelect: "none", background: edgeBg(ev), border: ev ? "1.5px solid #888" : "1px solid #d0ccc0", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 7, fontWeight: 700, color: ev ? "#333" : "#bbb", transition: "all .1s" }}>{ev ? thickLabels[ev.t] : "—"}</div>
                                      );
                                    })}
                                  </div>
                                </td>
                                <td style={{ padding: "6px", fontSize: 10, color: "#888", whiteSpace: "nowrap" }}>{p.note}</td>
                              </tr>
                            );
                          })
                        ]);
                      })()}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Fiók és Fogantyú beállítások */}
              <div style={{ ...cardStyle, marginTop: 16 }}>
                <div style={{ fontWeight: 800, fontSize: 13, color: BRN, marginBottom: 12 }}>{"\uD83D\uDDC4\uFE0F"} Fiók előlap és Fogantyú beállítások</div>

                  const scale = Math.min(scaleX, scaleY);
                  
                  const drawW = boxW * scale;
                  const drawH = boxD * scale;
                  
                  const startX = (SVW - drawW) / 2;
                  const startY = (SVH - drawH) / 2;
                  
                  const drwBt = drawerBt * scale;
                  
                  return (
                    <ZoomableSvg width={SVW} height={SVH}>
                      <svg width={SVW} height={SVH} style={{ display: "block", margin: "0 auto" }}>
                        <rect width={SVW} height={SVH} fill="#fff" rx={8} />
                        
                        {/* Drawer Bottom Panel */}
                        <rect x={startX + drwBt} y={startY + drwBt} width={drawW - 2*drwBt} height={drawH - 2*drwBt} fill="#eef4ff" stroke="#a0b8d0" strokeWidth={1} />
                        <text x={startX + drawW / 2} y={startY + drawH / 2} textAnchor="middle" fontSize={12} fill="#1a3a5a" fontWeight="700" fontFamily="Inter" opacity={0.6}>Fenéklap</text>
                        <text x={startX + drawW / 2} y={startY + drawH / 2 + 14} textAnchor="middle" fontSize={9} fill="#1a3a5a" fontWeight="500" fontFamily="Inter" opacity={0.5}>(Kereten belül)</text>
                        
                        {/* Drawer Side Panels */}
                        <rect x={startX} y={startY} width={drwBt} height={drawH} fill="#e0ebf5" stroke="#3a7acc" strokeWidth={1.5} />
                        <rect x={startX + drawW - drwBt} y={startY} width={drwBt} height={drawH} fill="#e0ebf5" stroke="#3a7acc" strokeWidth={1.5} />
                        
                        {/* Drawer Front/Back Panels */}
                        <rect x={startX + drwBt} y={startY} width={drawW - 2*drwBt} height={drwBt} fill="#d0e0f0" stroke="#3a7acc" strokeWidth={1.5} />
                        <rect x={startX + drwBt} y={startY + drawH - drwBt} width={drawW - 2*drwBt} height={drwBt} fill="#d0e0f0" stroke="#3a7acc" strokeWidth={1.5} />
                        
                        {/* Dimensions */}
                        {/* Width */}
                        <line x1={startX} y1={startY - 14} x2={startX + drawW} y2={startY - 14} stroke="#1a3a5a" strokeWidth={.8} />
                        <line x1={startX} y1={startY - 18} x2={startX} y2={startY - 6} stroke="#1a3a5a" strokeWidth={.8} />
                        <line x1={startX + drawW} y1={startY - 18} x2={startX + drawW} y2={startY - 6} stroke="#1a3a5a" strokeWidth={.8} />
                        <text x={startX + drawW / 2} y={startY - 20} textAnchor="middle" fontSize={9} fill="#1a3a5a" fontWeight="700" fontFamily="JetBrains Mono">{boxW} mm</text>
                        
                        {/* Depth */}
                        <line x1={startX - 14} y1={startY} x2={startX - 14} y2={startY + drawH} stroke="#1a3a5a" strokeWidth={.8} />
                        <line x1={startX - 18} y1={startY} x2={startX - 6} y2={startY} stroke="#1a3a5a" strokeWidth={.8} />
                        <line x1={startX - 18} y1={startY + drawH} x2={startX - 6} y2={startY + drawH} stroke="#1a3a5a" strokeWidth={.8} />
                        <text x={startX - 18} y={startY + drawH / 2} textAnchor="middle" fontSize={9} fill="#1a3a5a" fontWeight="700" fontFamily="JetBrains Mono" transform={`rotate(-90, ${startX - 18}, ${startY + drawH / 2})`}>{boxD} mm</text>
                      </svg>
                    </ZoomableSvg>
                  );
                })()}
              </div>)}

              {svgTab === "drawer" && (<div>
                <div style={{ fontWeight: 800, fontSize: 12, color: BRN, textAlign: "center", marginBottom: 8, letterSpacing: ".06em", textTransform: "uppercase" }}>Fiókdoboz — Műszaki Rajz</div>
                {drawerRunner !== "Blum_Tandem" || drawerBoxes.length === 0 ? (
                  <div style={{ textAlign: "center", padding: 40, color: "#aaa", fontSize: 12, fontStyle: "italic" }}>Csak Blum Tandem csúszóhoz érhető el.</div>
                ) : (() => {
                  const box = drawerBoxes[0];
                  const dW = box.w, dD = box.d, sH = box.h, fbH = box.fbH, sk = box.skirt;
                  const tBt = tandemBt;
                  const fnW = dW - 2 * tBt;
                  const fnD = dD - 2 * tBt;

                  // Canvas layout
                  const cW = 700, cH = 500;
                  const divX = 340, divY = 238;

                  // Colors
                  const cSide  = "#c8a845"; const cFront = "#e6d19a";
                  const cSkirt = "#8a6010"; const cFloor = "#d4b860";
                  const cPers  = "#f0e5c0"; const cStr   = "#5a4020";
                  const cDim   = "#1a3a5a"; const cDimSk = "#8a6010";

                  // Quadrant areas [x0, y0, w, h]
                  const TL = [0, 0, divX, divY];
                  const TR = [divX + 8, 0, cW - divX - 8, divY];
                  const BL = [0, divY + 8, divX, cH - divY - 8];
                  const BR = [divX + 8, divY + 8, cW - divX - 8, cH - divY - 8];

                  // Horizontal dim: draws line + ticks + label above or below
                  const dimH = (x1, x2, y, lbl, above, col = cDim) => {
                    const yL = above ? y - 6 : y + 6;
                    const tk = above ? 3 : -3;
                    const mx = (x1 + x2) / 2;
                    return (<g key={lbl}>
                      <line x1={x1} y1={yL} x2={x2} y2={yL} stroke={col} strokeWidth={0.75} />
                      <line x1={x1} y1={yL-tk} x2={x1} y2={yL+tk} stroke={col} strokeWidth={0.75} />
                      <line x1={x2} y1={yL-tk} x2={x2} y2={yL+tk} stroke={col} strokeWidth={0.75} />
                      <text x={mx} y={above ? yL - 2 : yL + 8} textAnchor="middle" fontSize={7.5}
                        fill={col} fontWeight="700" fontFamily="JetBrains Mono">{lbl}</text>
                    </g>);
                  };

                  // Vertical dim: draws line + ticks + rotated label, left or right of reference x
                  const dimV = (x, y1, y2, lbl, left, col = cDim) => {
                    const xL = left ? x - 7 : x + 7;
                    const tk = 3;
                    const my = (y1 + y2) / 2;
                    return (<g key={lbl}>
                      <line x1={xL} y1={y1} x2={xL} y2={y2} stroke={col} strokeWidth={0.75} />
                      <line x1={xL-tk} y1={y1} x2={xL+tk} y2={y1} stroke={col} strokeWidth={0.75} />
                      <line x1={xL-tk} y1={y2} x2={xL+tk} y2={y2} stroke={col} strokeWidth={0.75} />
                      <text x={xL + (left ? -2 : 2)} y={my} textAnchor="middle" fontSize={7.5}
                        fill={col} fontWeight="700" fontFamily="JetBrains Mono"
                        transform={`rotate(-90,${xL+(left?-2:2)},${my})`}>{lbl}</text>
                    </g>);
                  };

                  // ── VIEW 1: Elölnézet (top-left) ──
                  const [tlX, tlY, tlW, tlH] = TL;
                  const tlSc = Math.min((tlW-58)/dW, (tlH-44)/sH);
                  const tlOX = tlX + 36 + ((tlW-58) - dW*tlSc)/2;
                  const tlOY = tlY + 22 + ((tlH-44) - sH*tlSc)/2;
                  const tlx = (x) => tlOX + x*tlSc;
                  const tly = (y) => tlOY + y*tlSc;

                  // ── VIEW 2: Oldalnézet (top-right) ──
                  const [trX, trY, trW, trH] = TR;
                  const trSc = Math.min((trW-58)/dD, (trH-44)/sH);
                  const trOX = trX + 16 + ((trW-58) - dD*trSc)/2;
                  const trOY = trY + 22 + ((trH-44) - sH*trSc)/2;
                  const trx = (x) => trOX + x*trSc;
                  const svy = (y) => trOY + y*trSc;

                  // ── VIEW 3: Felülnézet (bottom-left) ──
                  const [blX, blY, blW, blH] = BL;
                  const blSc = Math.min((blW-52)/dW, (blH-54)/dD);
                  const blOX = blX + 36 + ((blW-52) - dW*blSc)/2;
                  const blOY = blY + 22 + ((blH-54) - dD*blSc)/2;
                  const blx = (x) => blOX + x*blSc;
                  const bly = (y) => blOY + y*blSc;

                  // ── VIEW 4: Perspektíva (bottom-right, oblique 30° factor 0.4) ──
                  const [brX, brY, brW, brH] = BR;
                  const ANG = 30*Math.PI/180, DF = 0.4;
                  const cosA = Math.cos(ANG), sinA = Math.sin(ANG);
                  const projW = dW + dD*DF*cosA, projH = sH + dD*DF*sinA;
                  const brSc = Math.min((brW-32)/projW, (brH-38)/projH);
                  const brOX = brX + 16 + ((brW-32) - projW*brSc)/2;
                  const brOY = brY + 16 + projH*brSc;
                  const brSX = (x, d=0) => brOX + (x + d*DF*cosA)*brSc;
                  const brSY = (y, d=0) => brOY - (y + d*DF*sinA)*brSc;
                  const brP  = (x, y, d=0) => `${brSX(x,d).toFixed(1)},${brSY(y,d).toFixed(1)}`;

                  return (
                    <ZoomableSvg width={cW} height={cH}>
                      <svg width={cW} height={cH} style={{ display: "block", margin: "0 auto" }}>
                        <defs>
                          <pattern id="szHatch4" width={4} height={4} patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                            <line x1={0} y1={0} x2={0} y2={4} stroke="#5a4020" strokeWidth={1} opacity={0.22} />
                          </pattern>
                          <pattern id="ehHatch4" width={4} height={4} patternUnits="userSpaceOnUse" patternTransform="rotate(135)">
                            <line x1={0} y1={0} x2={0} y2={4} stroke="#1a3a5a" strokeWidth={1} opacity={0.28} />
                          </pattern>
                        </defs>
                        <rect width={cW} height={cH} fill="#f9f8f5" rx={8} />
                        {/* Grid dividers */}
                        <line x1={divX+4} y1={4} x2={divX+4} y2={cH-4} stroke="#ddd" strokeWidth={1} />
                        <line x1={4} y1={divY+4} x2={cW-4} y2={divY+4} stroke="#ddd" strokeWidth={1} />

                        {/* ── VIEW LABELS ── */}
                        <text x={tlX+tlW/2} y={tlY+12} textAnchor="middle" fontSize={9} fill={BRN} fontWeight="800" fontFamily="Inter">Elölnézet</text>
                        <text x={trX+trW/2} y={trY+12} textAnchor="middle" fontSize={9} fill={BRN} fontWeight="800" fontFamily="Inter">Oldalnézet</text>
                        <text x={blX+blW/2} y={blY+12} textAnchor="middle" fontSize={9} fill={BRN} fontWeight="800" fontFamily="Inter">Felülnézet</text>
                        <text x={brX+brW/2} y={brY+12} textAnchor="middle" fontSize={9} fill={BRN} fontWeight="800" fontFamily="Inter">Perspektíva</text>

                        {/* ══════ ELÖLNÉZET ══════ */}
                        {/* Left side panel — full height including skirt */}
                        <rect x={tlx(0)} y={tly(0)} width={tBt*tlSc} height={sH*tlSc} fill={cSide} stroke={cStr} strokeWidth={0.8} />
                        {/* Right side panel */}
                        <rect x={tlx(dW-tBt)} y={tly(0)} width={tBt*tlSc} height={sH*tlSc} fill={cSide} stroke={cStr} strokeWidth={0.8} />
                        {/* Front panel face (between sides, fbH tall) */}
                        <rect x={tlx(tBt)} y={tly(0)} width={fnW*tlSc} height={fbH*tlSc} fill={cFront} stroke={cStr} strokeWidth={0.8} />
                        {/* Fenéklap cross-section: hatched (hidden, behind the front panel) */}
                        <rect x={tlx(tBt)} y={tly(fbH-tBt)} width={fnW*tlSc} height={tBt*tlSc}
                          fill={cFloor} stroke={cStr} strokeWidth={0.5} />
                        <rect x={tlx(tBt)} y={tly(fbH-tBt)} width={fnW*tlSc} height={tBt*tlSc}
                          fill="url(#szHatch4)" />
                        {/* Skirt zone: open/empty — dashed boundary only */}
                        <line x1={tlx(tBt)} y1={tly(fbH)} x2={tlx(dW-tBt)} y2={tly(fbH)}
                          stroke={cDimSk} strokeWidth={0.8} strokeDasharray="4,2" />
                        {/* Dims */}
                        {dimH(tlx(0), tlx(dW), tly(0), `${dW} mm`, true)}
                        {dimV(tlx(0), tly(0), tly(sH), `${sH} mm`, true)}
                        {sk > 0 && dimV(tlx(dW), tly(fbH), tly(sH), `${sk}`, false, cDimSk)}
                        {dimV(tlx(dW), tly(0), tly(fbH), `${fbH}`, false)}

                        {/* ══════ OLDALNÉZET ══════ */}
                        {/* Side panel face */}
                        <rect x={trx(0)} y={svy(0)} width={dD*trSc} height={sH*trSc} fill={cSide} stroke={cStr} strokeWidth={0.8} />
                        {/* Előlap metszete (bal szél) — fill + keresztcsíkos */}
                        <rect x={trx(0)} y={svy(0)} width={tBt*trSc} height={fbH*trSc} fill={cFront} stroke={cStr} strokeWidth={0.5} />
                        <rect x={trx(0)} y={svy(0)} width={tBt*trSc} height={fbH*trSc} fill="url(#ehHatch4)" />
                        {/* Hátlap metszete (jobb szél) */}
                        <rect x={trx(dD-tBt)} y={svy(0)} width={tBt*trSc} height={fbH*trSc} fill={cFront} stroke={cStr} strokeWidth={0.5} />
                        <rect x={trx(dD-tBt)} y={svy(0)} width={tBt*trSc} height={fbH*trSc} fill="url(#ehHatch4)" />
                        {/* Fenéklap metszete — fill + átlós csíkos */}
                        <rect x={trx(tBt)} y={svy(fbH-tBt)} width={fnD*trSc} height={tBt*trSc}
                          fill={cFloor} stroke={cStr} strokeWidth={0.5} />
                        <rect x={trx(tBt)} y={svy(fbH-tBt)} width={fnD*trSc} height={tBt*trSc}
                          fill="url(#szHatch4)" />
                        {/* Szoknya határ */}
                        <line x1={trx(0)} y1={svy(fbH)} x2={trx(dD)} y2={svy(fbH)}
                          stroke={cDimSk} strokeWidth={0.8} strokeDasharray="4,2" />
                        {/* Dims */}
                        {dimH(trx(0), trx(dD), svy(0), `${dD} mm`, true)}
                        {dimV(trx(dD), svy(0), svy(sH), `${sH} mm`, false)}
                        {sk > 0 && dimV(trx(dD)+14, svy(fbH), svy(sH), `${sk}`, false, cDimSk)}

                        {/* ══════ FELÜLNÉZET ══════ */}
                        {/* Side panels run the full depth end-to-end */}
                        <rect x={blx(0)} y={bly(0)} width={tBt*blSc} height={dD*blSc} fill={cSide} stroke={cStr} strokeWidth={0.8} />
                        <rect x={blx(dW-tBt)} y={bly(0)} width={tBt*blSc} height={dD*blSc} fill={cSide} stroke={cStr} strokeWidth={0.8} />
                        {/* Front/back panels sit BETWEEN the side panels */}
                        <rect x={blx(tBt)} y={bly(0)} width={fnW*blSc} height={tBt*blSc} fill={cFront} stroke={cStr} strokeWidth={0.8} />
                        <rect x={blx(tBt)} y={bly(dD-tBt)} width={fnW*blSc} height={tBt*blSc} fill={cFront} stroke={cStr} strokeWidth={0.8} />
                        {/* Fenéklap */}
                        <rect x={blx(tBt)} y={bly(tBt)} width={fnW*blSc} height={fnD*blSc}
                          fill={cFloor} stroke={cStr} strokeWidth={0.5} opacity={0.9} />
                        {/* Dims */}
                        {dimH(blx(0), blx(dW), bly(0), `${dW} mm`, true)}
                        {dimV(blx(0), bly(0), bly(dD), `${dD} mm`, true)}
                        {dimH(blx(0), blx(tBt), bly(dD), `${tBt}`, false, cDim)}

                        {/* ══════ PERSPEKTÍVA ══════ */}
                        {/* ══ PERSPEKTÍVA — painter's order: hátul → elöl ══ */}


                        {/* HÁTLAP látható face (d=dD, oldallapok között, sk..sH) — TÖMÖR, nem csíkos */}
                        <polygon points={`${brP(tBt,sk,dD)} ${brP(dW-tBt,sk,dD)} ${brP(dW-tBt,sH,dD)} ${brP(tBt,sH,dD)}`}
                          fill={cFront} stroke={cStr} strokeWidth={0.7} />

                        {/* JOBB OLDALLAP KÜLSŐ FACE (x=dW) — mint az Oldalnézet */}
                        {/* Alap: teljes oldallap */}
                        <polygon points={`${brP(dW,0,0)} ${brP(dW,0,dD)} ${brP(dW,sH,dD)} ${brP(dW,sH,0)}`}
                          fill={cSide} stroke={cStr} strokeWidth={0.8} />
                        {/* Előlap metszete (d=0..tBt, sk..sH): cFront + ehHatch4 */}
                        <polygon points={`${brP(dW,sk,0)} ${brP(dW,sk,tBt)} ${brP(dW,sH,tBt)} ${brP(dW,sH,0)}`}
                          fill={cFront} stroke={cStr} strokeWidth={0.5} />
                        <polygon points={`${brP(dW,sk,0)} ${brP(dW,sk,tBt)} ${brP(dW,sH,tBt)} ${brP(dW,sH,0)}`}
                          fill="url(#ehHatch4)" />
                        {/* Hátlap metszete (d=dD-tBt..dD, sk..sH): cFront + ehHatch4 */}
                        <polygon points={`${brP(dW,sk,dD-tBt)} ${brP(dW,sk,dD)} ${brP(dW,sH,dD)} ${brP(dW,sH,dD-tBt)}`}
                          fill={cFront} stroke={cStr} strokeWidth={0.5} />
                        <polygon points={`${brP(dW,sk,dD-tBt)} ${brP(dW,sk,dD)} ${brP(dW,sH,dD)} ${brP(dW,sH,dD-tBt)}`}
                          fill="url(#ehHatch4)" />
                        {/* Fenéklap metszete (d=tBt..dD-tBt, y=sk..sk+tBt): cFloor + szHatch4 */}
                        <polygon points={`${brP(dW,sk,tBt)} ${brP(dW,sk,dD-tBt)} ${brP(dW,sk+tBt,dD-tBt)} ${brP(dW,sk+tBt,tBt)}`}
                          fill={cFloor} stroke={cStr} strokeWidth={0.5} />
                        <polygon points={`${brP(dW,sk,tBt)} ${brP(dW,sk,dD-tBt)} ${brP(dW,sk+tBt,dD-tBt)} ${brP(dW,sk+tBt,tBt)}`}
                          fill="url(#szHatch4)" />
                        {/* Szoknya zóna csíkozás (y=0..sk) */}
                        <polygon points={`${brP(dW,0,0)} ${brP(dW,0,dD)} ${brP(dW,sk,dD)} ${brP(dW,sk,0)}`}
                          fill="url(#szHatch4)" />
                        {/* Szoknya határvonal */}
                        <line x1={brSX(dW,0)} y1={brSY(sk,0)} x2={brSX(dW,dD)} y2={brSY(sk,dD)}
                          stroke={cDimSk} strokeWidth={0.8} strokeDasharray="4,2" />

                        {/* FEDŐLAPOK (y=sH sík) */}
                        <polygon points={`${brP(0,sH,0)} ${brP(tBt,sH,0)} ${brP(tBt,sH,dD)} ${brP(0,sH,dD)}`}
                          fill={cSide} stroke={cStr} strokeWidth={0.6} />
                        <polygon points={`${brP(tBt,sH,0)} ${brP(dW-tBt,sH,0)} ${brP(dW-tBt,sH,tBt)} ${brP(tBt,sH,tBt)}`}
                          fill={cFront} stroke={cStr} strokeWidth={0.6} />
                        <polygon points={`${brP(tBt,sH,dD-tBt)} ${brP(dW-tBt,sH,dD-tBt)} ${brP(dW-tBt,sH,dD)} ${brP(tBt,sH,dD)}`}
                          fill={cFront} stroke={cStr} strokeWidth={0.6} />
                        <polygon points={`${brP(dW-tBt,sH,0)} ${brP(dW,sH,0)} ${brP(dW,sH,dD)} ${brP(dW-tBt,sH,dD)}`}
                          fill={cSide} stroke={cStr} strokeWidth={0.6} />

                        {/* FENÉKLAP felső lapja (belül, y=sk, csíkos) */}
                        <polygon points={`${brP(tBt,sk,tBt)} ${brP(dW-tBt,sk,tBt)} ${brP(dW-tBt,sk,dD-tBt)} ${brP(tBt,sk,dD-tBt)}`}
                          fill={cFloor} stroke={cStr} strokeWidth={0.6} />
                        <polygon points={`${brP(tBt,sk,tBt)} ${brP(dW-tBt,sk,tBt)} ${brP(dW-tBt,sk,dD-tBt)} ${brP(tBt,sk,dD-tBt)}`}
                          fill="url(#szHatch4)" opacity={0.45} />

                        {/* FRONT FACE — mint az Elölnézet */}
                        {/* Bal oldallap sáv (x=0..tBt, y=0..sH) — tömör */}
                        <polygon points={`${brP(0,0,0)} ${brP(tBt,0,0)} ${brP(tBt,sH,0)} ${brP(0,sH,0)}`}
                          fill={cSide} stroke={cStr} strokeWidth={0.8} />
                        {/* Előlap face (tBt..dW-tBt, sk..sH) — tömör */}
                        <polygon points={`${brP(tBt,sk,0)} ${brP(dW-tBt,sk,0)} ${brP(dW-tBt,sH,0)} ${brP(tBt,sH,0)}`}
                          fill={cFront} stroke={cStr} strokeWidth={0.9} />
                        {/* Fenéklap keresztmetszet az elöl-síkon (tBt..dW-tBt, sk..sk+tBt) — csíkos */}
                        <polygon points={`${brP(tBt,sk,0)} ${brP(dW-tBt,sk,0)} ${brP(dW-tBt,sk+tBt,0)} ${brP(tBt,sk+tBt,0)}`}
                          fill={cFloor} stroke={cStr} strokeWidth={0.5} />
                        <polygon points={`${brP(tBt,sk,0)} ${brP(dW-tBt,sk,0)} ${brP(dW-tBt,sk+tBt,0)} ${brP(tBt,sk+tBt,0)}`}
                          fill="url(#szHatch4)" />
                        {/* Szoknya határvonal az elöl-síkon */}
                        <line x1={brSX(tBt,0)} y1={brSY(sk,0)} x2={brSX(dW-tBt,0)} y2={brSY(sk,0)}
                          stroke={cDimSk} strokeWidth={0.9} strokeDasharray="4,2" />
                        {/* Jobb oldallap sáv (dW-tBt..dW, y=0..sH) — tömör */}
                        <polygon points={`${brP(dW-tBt,0,0)} ${brP(dW,0,0)} ${brP(dW,sH,0)} ${brP(dW-tBt,sH,0)}`}
                          fill={cSide} stroke={cStr} strokeWidth={0.8} />

                        {/* MÉRETVONALAK */}
                        {(() => { const dy = brSY(sH,0)-10; return (<g>
                          <line x1={brSX(0)} y1={dy} x2={brSX(dW)} y2={dy} stroke={cDim} strokeWidth={0.75}/>
                          <line x1={brSX(0)} y1={dy-3} x2={brSX(0)} y2={dy+3} stroke={cDim} strokeWidth={0.75}/>
                          <line x1={brSX(dW)} y1={dy-3} x2={brSX(dW)} y2={dy+3} stroke={cDim} strokeWidth={0.75}/>

                        </g>);})()}
                        {(() => { const x1=brSX(dW,0),y1=brSY(sH,0),x2=brSX(dW,dD),y2=brSY(sH,dD); return (<g>
                          <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={cDim} strokeWidth={0.75}/>
                          <text x={(x1+x2)/2+5} y={(y1+y2)/2-4} textAnchor="middle" fontSize={7.5} fill={cDim} fontWeight="700" fontFamily="JetBrains Mono">{dD}</text>
                        </g>);})()}
                        {(() => { const xL = brSX(dW,dD)+8; return (<g>
                          <line x1={xL} y1={brSY(0,dD)} x2={xL} y2={brSY(sH,dD)} stroke={cDim} strokeWidth={0.75}/>
                          <line x1={xL-3} y1={brSY(0,dD)} x2={xL+3} y2={brSY(0,dD)} stroke={cDim} strokeWidth={0.75}/>
                          <line x1={xL-3} y1={brSY(sH,dD)} x2={xL+3} y2={brSY(sH,dD)} stroke={cDim} strokeWidth={0.75}/>
                          <text x={xL+2} y={(brSY(0,dD)+brSY(sH,dD))/2} textAnchor="middle" fontSize={7.5} fill={cDim} fontWeight="700" fontFamily="JetBrains Mono" transform={`rotate(-90,${xL+2},${(brSY(0,dD)+brSY(sH,dD))/2})`}>{sH}</text>
                        </g>);})()}

                        {/* Info footer */}
                        <text x={cW/2} y={cH-5} textAnchor="middle" fontSize={7.5} fill="#bbb" fontFamily="Inter">
                          {`1. fiók — oldallap: ${sH} mm | e/h: ${fbH} mm | szoknya: ${sk} mm | anyagvastagság: ${tBt} mm`}
                        </text>
                      </svg>
                    </ZoomableSvg>
                  );
                })()}
              </div>)}

              </div>
            </div>
          </div>

    // ═══════════════════════════════════════════
    // SHELF CALCULATOR (complete, preserved)
    // ═══════════════════════════════════════════
    function ShelfCalc() {
      const [H, setH] = usePersistentState("ShelfCalc", "H", 1600);
      const [n, setN] = usePersistentState("ShelfCalc", "n", 2);
      const [t, setT] = usePersistentState("ShelfCalc", "t", 18);
      const [d, setD] = usePersistentState("ShelfCalc", "d", 5);
      const [mode, setMode] = usePersistentState("ShelfCalc", "mode", "equal");
      const [showSettings, setShowSettings] = useState(false);
      const [svgView, setSvgView] = usePersistentState("ShelfCalc", "svgView", "front");
      const [vizRef, setVizRef] = usePersistentState("ShelfCalc", "vizRef", "panel");
      const [shelfConfigs, setShelfConfigs] = usePersistentState("ShelfCalc", "shelfConfigs", [
        { isFixed: false, fixedPos: 500, zoneIdx: 0 },
        { isFixed: false, fixedPos: 500, zoneIdx: 0 },
      ]);
      const intH = (Number(H) || 0) - 2 * t;
      const handleSetN = (newN) => {
        if (newN === "") { setN(""); return; }
        const val = Math.max(1, Math.min(20, Number(newN))); setN(val);
        setShelfConfigs(prev => {
          if (prev.length === val) return prev;
          if (prev.length > val) return prev.slice(0, val);
          return [...prev, ...Array.from({ length: val - prev.length }, () => ({ isFixed: false, fixedPos: Math.round(((Number(H) || 0) - 2 * t) / 2), zoneIdx: 0 }))];
        });
      };
      const updateConfig = (i, key, value) => {
        setShelfConfigs(prev => { const next = [...prev]; while (next.length <= i) next.push({ isFixed: false, fixedPos: Math.round(intH / 2), zoneIdx: 0 }); next[i] = { ...next[i], [key]: value }; return next; });
      };
      const configs = useMemo(() => { const r = []; const currentN = Number(n) || 0; for (let i = 0; i < currentN; i++) r.push(shelfConfigs[i] || { isFixed: false, fixedPos: Math.round(intH / 2), zoneIdx: 0 }); return r; }, [shelfConfigs, n, intH]);
      const zoneInfo = useMemo(() => {
        if (mode !== "custom") return { labels: [], boundaries: [] };
        const fe = configs.map((c, i) => ({ idx: i + 1, pos: Math.max(0, Math.min(intH - t, Number(c.fixedPos) || 0)), isFixed: c.isFixed })).filter(e => e.isFixed).sort((a, b) => a.pos - b.pos);
        const b = [{ label: "Szekrény alja", pos: 0 }, ...fe.map(e => ({ label: `${e.idx}. polc (${e.pos} mm)`, pos: e.pos })), { label: "Szekrény teteje", pos: intH }];
        const l = []; for (let i = 0; i < b.length - 1; i++) l.push(`${b[i].label}  \u2194  ${b[i + 1].label}`);
        return { labels: l, boundaries: b };
      }, [mode, configs, intH, t]);
      const shelves = useMemo(() => {
        const currentH = Number(H) || 0;
        const currentN = Number(n) || 0;
        const intH = currentH - 2 * t;
        if (intH <= 0 || currentN < 1) return [];
        let positions = [], fixedFlags = [];
        if (mode === "equal") {
          const clear = (intH - currentN * t) / (currentN + 1);
          for (let i = 1; i <= currentN; i++) {
            const exact = i * clear + (i - 1) * t;
            positions.push({ intBot: Math.round(exact), exactIntBot: exact });
            fixedFlags.push(false);
          }
        } else {
          const fe = configs.map((c, i) => ({ idx: i, pos: Math.max(0, Math.min(intH - t, Number(c.fixedPos) || 0)), isFixed: c.isFixed })).filter(e => e.isFixed).sort((a, b) => a.pos - b.pos);
          const zones = []; let pb = 0; for (const f of fe) { zones.push({ start: pb, end: f.pos }); pb = f.pos + t; } zones.push({ start: pb, end: intH });
          const abz = {}; configs.forEach((c, i) => { if (!c.isFixed) { const zi = Math.min(Math.max(0, c.zoneIdx || 0), zones.length - 1); if (!abz[zi]) abz[zi] = []; abz[zi].push(i); } });
          const ap = new Array(currentN).fill(null), af = new Array(currentN).fill(false);
          fe.forEach(f => { ap[f.idx] = { intBot: f.pos, exactIntBot: f.pos }; af[f.idx] = true; });
          for (const [zi, ids] of Object.entries(abz)) {
            const z = zones[parseInt(zi)]; const zh = Math.max(0, z.end - z.start); const m = ids.length; const cs = Math.max(0, zh - m * t); const g = m > 0 ? cs / (m + 1) : 0;
            ids.forEach((oi, j) => {
              const exact = z.start + (j + 1) * g + j * t;
              ap[oi] = { intBot: Math.round(exact), exactIntBot: exact };
            });
          }
          const sorted = ap.map((p, i) => ({ ...p, isFixed: af[i] })).sort((a, b) => (a?.intBot || 0) - (b?.intBot || 0));
          positions = sorted.map(s => ({ intBot: s?.intBot || 0, exactIntBot: s?.exactIntBot || 0 }));
          fixedFlags = sorted.map(s => s?.isFixed || false);
        }
        return positions.map((posObj, i) => {
          const intBot = posObj.intBot;
          const exactIntBot = posObj.exactIntBot;
          const panelBot = t + intBot;
          const exactPanelBot = t + exactIntBot;
          const prevTop = i === 0 ? 0 : positions[i - 1].intBot + t;
          const nextBot = i === positions.length - 1 ? intH : positions[i + 1].intBot;

          const drillCenter = panelBot - d / 2;

          return { idx: i + 1, intBot, intTop: intBot + t, panelBot, panelTop: panelBot + t, drillCenter, drillBotEdge: panelBot - d, drillTopEdge: panelBot, spaceBelow: intBot - prevTop, spaceAbove: nextBot - intBot - t, isFixed: fixedFlags[i] || false };
        });
      }, [H, n, t, d, mode, configs, intH]);

      const SVW = 276, SVH = 600, PT = 43, PB = 96, PL = 26, PR = 108;
      const cabW = SVW - PL - PR; const sc = (SVH - PT - PB) / H; const toY = (v) => PT + (H - v) * sc;
      const fixedCount = configs.filter(c => c.isFixed).length;

      return (
        <div style={{ maxWidth: 1060, margin: "0 auto", padding: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 310px", gap: 16, alignItems: "start" }}>
            <div>
              <div style={cardStyle}>
                <div style={{ fontWeight: 800, fontSize: 15, color: GRN, marginBottom: 14 }}>{"\uD83D\uDCCB"} Alapadatok</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  {[{ label: "Korpusz külső magassága (mm)", val: H, set: v => setH(v === "" ? "" : Math.max(0, Number(v))), min: 0 }, { label: "Polcok száma (db)", val: n, set: v => handleSetN(v), min: 1, max: 20 }].map(f => (
                    <label key={f.label} style={{ display: "flex", flexDirection: "column", gap: 5, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                      {f.label}
                      <input type="number" value={f.val} min={f.min} max={f.max} onChange={e => f.set(e.target.value)}
                        style={{ padding: "9px 12px", border: "2px solid #ddd", borderRadius: 9, fontSize: 18, fontWeight: 700, fontFamily: "JetBrains Mono, monospace", color: GRN, background: "#fafaf8", outline: "none" }} />
                    </label>
                  ))}
                </div>
                <div style={{ marginTop: 16 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".06em" }}>Elosztás módja</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    {[["equal", "\u2696\uFE0F Egyenlő elosztás"], ["custom", "\uD83D\uDCCC Egyedi polc pozíciók"]].map(([id, label]) => (
                      <button key={id} onClick={() => setMode(id)} style={{ padding: "8px 16px", borderRadius: 9, fontSize: 13, fontWeight: 700, cursor: "pointer", background: mode === id ? GRN : "#ede8e0", color: mode === id ? "#fff" : "#5a4a3a", border: mode === id ? `2px solid ${GRN}` : "2px solid transparent", transition: "all .15s", fontFamily: "Inter, sans-serif" }}>{label}</button>
                    ))}
                  </div>
                </div>
                {mode === "custom" && (
                  <div style={{ marginTop: 14, background: "#f3f9ee", padding: 16, borderRadius: 10, border: "1.5px solid #bdd9ac" }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "#3a5a2a", marginBottom: 10, textTransform: "uppercase", letterSpacing: ".05em" }}>Polcok beállítása egyenként</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      {configs.map((cfg, i) => {
                        const cz = Math.min(Math.max(0, cfg.zoneIdx || 0), Math.max(0, zoneInfo.labels.length - 1));
                        return (
                          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, background: cfg.isFixed ? "#e8f4dc" : "#fff", padding: "8px 12px", borderRadius: 8, border: cfg.isFixed ? "1.5px solid #9cc87a" : "1.5px solid #e0dbd0" }}>
                            <span style={{ fontWeight: 800, fontSize: 13, color: "var(--text)", minWidth: 58, fontFamily: "JetBrains Mono" }}>{i + 1}. polc</span>
                            <button onClick={() => updateConfig(i, 'isFixed', !cfg.isFixed)} style={{ padding: "4px 10px", borderRadius: 6, fontSize: 11, cursor: "pointer", fontWeight: 700, fontFamily: "Inter", minWidth: 100, textAlign: "center", background: cfg.isFixed ? GRN : "#e8e2d8", color: cfg.isFixed ? "#fff" : "#6a5a4a", border: cfg.isFixed ? `1.5px solid ${GRN}` : "1.5px solid #ccc" }}>{cfg.isFixed ? "\uD83D\uDCCC Rögzített" : "\uD83D\uDD04 Auto"}</button>
                            {cfg.isFixed ? (
                              <div style={{ display: "flex", alignItems: "center", gap: 4, flex: 1 }}>
                                <input type="number" value={cfg.fixedPos} min={0} onChange={e => updateConfig(i, 'fixedPos', e.target.value === "" ? "" : Math.max(0, Number(e.target.value)))} style={{ padding: "5px 8px", border: "1.5px solid #9cc87a", borderRadius: 6, fontSize: 14, fontWeight: 700, fontFamily: "JetBrains Mono", color: GRN, background: "#fff", width: 90, outline: "none" }} />
                                <span style={{ fontSize: 11, color: "#6a8a50", fontWeight: 600 }}>mm</span>
                              </div>
                            ) : (
                              <select value={cz} onChange={e => updateConfig(i, 'zoneIdx', +e.target.value)} style={{ padding: "5px 8px", border: "1.5px solid #d0caba", borderRadius: 6, fontSize: 11, fontWeight: 600, fontFamily: "Inter", color: "#4a3a2a", background: "#fff", flex: 1, cursor: "pointer", outline: "none" }}>
                                {zoneInfo.labels.map((label, zi) => <option key={zi} value={zi}>{label}</option>)}
                              </select>
                            )}
                          </div>
                        );
                      })}
                    </div>
                    <div style={{ marginTop: 12, fontSize: 11, color: "#5a7a40", fontWeight: 600, lineHeight: 1.6, padding: "8px 10px", background: "#e0f0d0", borderRadius: 6, border: "1px solid #c8e0b0" }}>
                      {"\uD83D\uDCCC"} <strong>Rögzített</strong>: pontos pozíció. {"\uD83D\uDD04"} <strong>Auto</strong>: egyenletes elosztás a kiválasztott zónában.
                      {fixedCount === 0 && <><br />{"\u26A0\uFE0F"} Nincs rögzített polc.</>}
                    </div>
                  </div>
                )}
                <div style={{ marginTop: 14 }}>
                  <button onClick={() => setShowSettings(s => !s)} style={{ padding: "5px 14px", border: "1.5px solid #d8cfc0", borderRadius: 8, background: "#faf7f2", fontSize: 12, cursor: "pointer", color: "#6a5a4a", fontFamily: "Inter", fontWeight: 600 }}>{"\u2699\uFE0F"} Lap/furat beállítások {showSettings ? "\u25B2" : "\u25BC"}</button>
                  {showSettings && (
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginTop: 12, background: "#faf7f0", padding: 14, borderRadius: 10, border: "1.5px solid #e0d4b8" }}>
                      {[{ label: "Bútorlap vastagság (mm)", hint: "18 mm", val: t, set: v => setT(Math.max(1, v)) }, { label: "Furat átmérő (mm)", hint: "5 mm", val: d, set: v => setD(Math.max(1, v)) }].map(f => (

                        </label>

              </div>
              <div style={{ background: "var(--green-light)", borderRadius: "var(--radius)", padding: "12px 18px", marginBottom: 16, display: "flex", gap: 28, flexWrap: "wrap", border: "1px solid #A7F3D0" }}>
                {[["Belső mag.", `${intH} mm`], ["Lapvtg.", `${t} mm`], ["Furat \u00d8", `${d} mm`], ["Polcok", `${n} db`]].map(([l, v]) => (
                  <div key={l}><div style={{ fontSize: 10, color: "#4a7030", textTransform: "uppercase", letterSpacing: ".06em", fontWeight: 700 }}>{l}</div><div style={{ fontSize: 18, fontWeight: 800, color: GRN, fontFamily: "JetBrains Mono" }}>{v}</div></div>
                ))}
              </div>
              {/* Table 1 */}
              <div style={cardStyle}>
                <div style={{ fontWeight: 800, fontSize: 14, color: GRN, marginBottom: 4 }}>{"\uD83D\uDCCF"} Szabad oldallap</div>
                <div style={{ overflowX: "auto" }}>

                      <th colSpan={3} style={{ padding: "5px 10px", background: "#2a5a14", color: "#c8e8b0", fontSize: 10, fontWeight: 700, textTransform: "uppercase", textAlign: "center", borderRight: "1px solid rgba(255,255,255,.15)" }}>{"\u2191"} Aljától (mm)</th>
                      <th colSpan={3} style={{ padding: "5px 10px", background: "#3a2a14", color: "#e8d0a0", fontSize: 10, fontWeight: 700, textTransform: "uppercase", textAlign: "center" }}>{"\u2193"} Tetejétől (mm)</th>
                    </tr><tr>
                        {[["Polc alja", "#2a5a14"], ["Polc teteje", "#2a5a14"], ["\uD83D\uDD34 Furat", "#7a1010"], ["Polc alja", "#3a2a14"], ["Polc teteje", "#3a2a14"], ["\uD83D\uDD34 Furat", "#7a1010"]].map(([l, bg], i) => (

                        {[["Polc alja", "#2a5a14"], ["Polc teteje", "#2a5a14"], ["\uD83D\uDD34 Furat", "#7a1010"], ["Polc alja", "#3a2a14"], ["Polc teteje", "#3a2a14"], ["\uD83D\uDD34 Furat", "#7a1010"]].map(([l, bg], i) => (
