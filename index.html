              {/* Door SVG Area */}
              <div style={{ ...cardStyle, padding: 12 }}>
                <div style={{ fontWeight: 800, fontSize: 12, color: "var(--text-secondary)", textAlign: "center", marginBottom: 8, letterSpacing: ".06em", textTransform: "uppercase" }}>Ajtó Elölnézet</div>
                {(() => {
                  const dSVH = 460;
                  const dscX = (SVW - 120) / doorW;
                  const dscY = (dSVH - 100) / doorH;
                  const dsc = Math.min(dscX, dscY);
                  const dwa = doorW * dsc;
                  const dha = doorH * dsc;
                  const dx = 60 + (SVW - 120 - dwa) / 2;
                  const dy = 50 + (dSVH - 100 - dha) / 2;

                  // Handle hole pos calc
                  // hx1/hy1 = első furat, hx2/hy2 = második furat
                  // KOORDINÁTA RENDSZER: dx=bal él, dy=felső él
                  // handleMarginX = oldalról (balra: bal széltől, jobbra: jobb széltől, középre: nem releváns)
                  // handleMarginY = fentről
                  let hx1 = 0, hy1 = 0, hx2 = 0, hy2 = 0;
                  // Számított mm pozíciók méretezőhöz
                  let dimFromTop1 = 0, dimFromTop2 = 0;
                  let dimFromLeft1 = 0, dimFromRight2 = 0;
                  let showLeftDim = false, showRightDim = false, showCenterDimsH = false;

                  const hingesLeft = doorHanding === "left";
                  const hingeX = hingesLeft ? dx + 22.5 * dsc : dx + dwa - 22.5 * dsc;

                  if (handleOrient === "horizontal") {
                    // Y: mindkét furat ugyanazon a magasságon (fentről handleMarginY)
                    hy1 = dy + handleMarginY * dsc;
                    hy2 = hy1;
                    dimFromTop1 = handleMarginY;
                    if (!handleCenter) {
                      if (doorHanding === "right") { // hinges right, handle left
                        hx1 = dx + handleMarginX * dsc;
                        hx2 = hx1 + handlePitch * dsc;
                        dimFromLeft1 = handleMarginX;
                        showLeftDim = true;
                      } else { // doorHanding === "left", hinges left, handle right
                        hx2 = dx + dwa - handleMarginX * dsc;
                        hx1 = hx2 - handlePitch * dsc;
                        dimFromRight2 = handleMarginX;
                        showRightDim = true;
                      }
                    } else { // center
                      // Szimmetrikus: mindkét furat a középtől pitch/2 távolságra
                      hx1 = dx + dwa / 2 - (handlePitch * dsc) / 2;
                      hx2 = dx + dwa / 2 + (handlePitch * dsc) / 2;
                      // Balról: (doorW - pitch) / 2
                      dimFromLeft1 = Math.round((doorW - handlePitch) / 2);
                      dimFromRight2 = dimFromLeft1; // szimmetrikus
                      showCenterDimsH = true;
                    }
                  } else { // vertical
                    // X: mindkét furat ugyanazon az x pozíción
                    if (doorHanding === "right") { // handle left
                      hx1 = dx + handleMarginX * dsc;
                      dimFromLeft1 = handleMarginX;
                      showLeftDim = true;
                    } else { // handle right
                      hx1 = dx + dwa - handleMarginX * dsc;
                      dimFromRight2 = handleMarginX;
                      showRightDim = true;
                    }
                    hx2 = hx1;

                    if (!handleCenter) {
                      hy1 = dy + handleMarginY * dsc;
                      hy2 = hy1 + handlePitch * dsc;
                      dimFromTop1 = handleMarginY;
                      dimFromTop2 = handleMarginY + handlePitch;
                    } else {
                      hy1 = dy + dha / 2 - (handlePitch * dsc) / 2;
                      hy2 = dy + dha / 2 + (handlePitch * dsc) / 2;
                      dimFromTop1 = Math.round((doorH - handlePitch) / 2);
                      dimFromTop2 = dimFromTop1 + handlePitch;
                    }
                  }

                  // Hinges (jobbra, ha fogantyú balra vagy középen, és balra, ha fogantyú jobbra)
                  const hingeYs = [];
                  if (hingeCount >= 2) {
                    hingeYs.push(dy + hingeMargin * dsc);
                    hingeYs.push(dy + dha - hingeMargin * dsc);
                    const space = (doorH - 2 * hingeMargin) / (hingeCount - 1);
                    for (let i = 1; i < hingeCount - 1; i++) {
                      hingeYs.push(dy + (hingeMargin + i * space) * dsc);
                    }
                  }

                  return (
                    <ZoomableSvg width={SVW} height={dSVH}>
                      <svg width={SVW} height={dSVH} style={{ display: "block", margin: "0 auto" }}>
                        <rect width={SVW} height={dSVH} fill="#fff" rx={8} />

                        {/* Door board */}
                        <rect x={dx} y={dy} width={dwa} height={dha} fill="#eef4ff" stroke="#3a7acc" strokeWidth={1.5} rx={3} />

                        {/* Dimensions – szélesség felül */}
                        <line x1={dx} y1={dy - 14} x2={dx + dwa} y2={dy - 14} stroke="#3a7acc" strokeWidth={.8} />
                        <line x1={dx} y1={dy - 18} x2={dx} y2={dy - 6} stroke="#3a7acc" strokeWidth={.8} />
                        <line x1={dx + dwa} y1={dy - 18} x2={dx + dwa} y2={dy - 6} stroke="#3a7acc" strokeWidth={.8} />
                        <text x={dx + dwa / 2} y={dy - 20} textAnchor="middle" fontSize={9} fill="#1a3a5a" fontWeight="700" fontFamily="JetBrains Mono">{doorW}</text>

                        {/* Dimensions – magasság bal oldal */}
                        <line x1={dx - 14} y1={dy} x2={dx - 14} y2={dy + dha} stroke="#3a7acc" strokeWidth={.8} />
                        <line x1={dx - 18} y1={dy} x2={dx - 6} y2={dy} stroke="#3a7acc" strokeWidth={.8} />
                        <line x1={dx - 18} y1={dy + dha} x2={dx - 6} y2={dy + dha} stroke="#3a7acc" strokeWidth={.8} />
                        <text x={dx - 14} y={dy + dha / 2 - 4} textAnchor="middle" fontSize={9} fill="#1a3a5a" fontWeight="700" fontFamily="JetBrains Mono"
                          transform={`rotate(-90, ${dx - 14}, ${dy + dha / 2})`}>{doorH}</text>

                        {/* Handle */}
                        <line x1={hx1} y1={hy1} x2={hx2} y2={hy2} stroke="#333" strokeWidth={4} strokeLinecap="round" opacity={.6} />
                        <circle cx={hx1} cy={hy1} r={4} fill="none" stroke="#e46a3a" strokeWidth={1.5} />
                        <circle cx={hx1} cy={hy1} r={1.5} fill="#111" />
                        <circle cx={hx2} cy={hy2} r={4} fill="none" stroke="#e46a3a" strokeWidth={1.5} />
                        <circle cx={hx2} cy={hy2} r={1.5} fill="#111" />

                        {/* === FÜGGŐLEGES fogantyú méretezés === */}
                        {handleOrient === "vertical" && (() => {
                          const isRightSide = hx1 > dx + dwa / 2;
                          const dir = isRightSide ? -1 : 1;
                          const dimX = hx1 + dir * 16;

                          return (<>
                            {/* Fentről első furat */}
                            <line x1={dimX} y1={dy} x2={dimX} y2={hy1} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                            <line x1={dimX - 4} y1={dy} x2={dimX + 4} y2={dy} stroke="#e46a3a" strokeWidth={.7} />
                            <line x1={dimX - 4} y1={hy1} x2={dimX + 4} y2={hy1} stroke="#e46a3a" strokeWidth={.7} />
                            <text x={dimX} y={(dy + hy1) / 2 - 4} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono" transform={`rotate(-90, ${dimX}, ${(dy + hy1) / 2})`}>{dimFromTop1}</text>

                            {/* Pitch */}
                            <line x1={dimX} y1={hy1} x2={dimX} y2={hy2} stroke="#c04000" strokeWidth={.7} strokeDasharray="3,2" />
                            <line x1={dimX - 4} y1={hy2} x2={dimX + 4} y2={hy2} stroke="#c04000" strokeWidth={.7} />
                            <text x={dimX} y={(hy1 + hy2) / 2 - 4} textAnchor="middle" fontSize={8} fill="#c04000" fontWeight="700" fontFamily="JetBrains Mono" transform={`rotate(-90, ${dimX}, ${(hy1 + hy2) / 2})`}>{handlePitch}</text>

                            {/* Oldalról (vízszintes dimenzió) alulra helyezve */}
                            {showLeftDim && (<>
                              <line x1={dx} y1={hy2 + 16} x2={hx1} y2={hy2 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                              <line x1={dx} y1={hy2 + 12} x2={dx} y2={hy2 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <line x1={hx1} y1={hy2 + 12} x2={hx1} y2={hy2 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <text x={(dx + hx1) / 2} y={hy2 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromLeft1}</text>
                            </>)}
                            {showRightDim && (<>
                              <line x1={hx1} y1={hy2 + 16} x2={dx + dwa} y2={hy2 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                              <line x1={hx1} y1={hy2 + 12} x2={hx1} y2={hy2 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <line x1={dx + dwa} y1={hy2 + 12} x2={dx + dwa} y2={hy2 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <text x={(hx1 + dx + dwa) / 2} y={hy2 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromRight2}</text>
                            </>)}
                          </>);
                        })()}

                        {/* === VÍZSZINTES fogantyú méretezés === */}
                        {handleOrient === "horizontal" && (() => {
                          const yDimLine = hy1 - 16;
                          const centerHandleX = (hx1 + hx2) / 2;
                          return (<>
                            {/* Fentről Y dim, a fogantyú közepén */}
                            <line x1={centerHandleX} y1={dy} x2={centerHandleX} y2={hy1} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                            <line x1={centerHandleX - 4} y1={dy} x2={centerHandleX + 4} y2={dy} stroke="#e46a3a" strokeWidth={.7} />
                            <line x1={centerHandleX - 4} y1={hy1} x2={centerHandleX + 4} y2={hy1} stroke="#e46a3a" strokeWidth={.7} />
                            <text x={centerHandleX} y={(dy + hy1) / 2 - 4} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono" transform={`rotate(-90, ${centerHandleX}, ${(dy + hy1) / 2})`}>{dimFromTop1}</text>

                            {/* Pitch dim (vízszintes) */}
                            <line x1={hx1} y1={yDimLine} x2={hx2} y2={yDimLine} stroke="#c04000" strokeWidth={.7} strokeDasharray="3,2" />
                            <line x1={hx1} y1={yDimLine - 4} x2={hx1} y2={yDimLine + 4} stroke="#c04000" strokeWidth={.7} />
                            <line x1={hx2} y1={yDimLine - 4} x2={hx2} y2={yDimLine + 4} stroke="#c04000" strokeWidth={.7} />
                            <text x={(hx1 + hx2) / 2} y={yDimLine - 4} textAnchor="middle" fontSize={8} fill="#c04000" fontWeight="700" fontFamily="JetBrains Mono">{handlePitch}</text>

                            {/* Balról: első furat */}
                            {showLeftDim && (<>
                              <line x1={dx} y1={hy1 + 16} x2={hx1} y2={hy1 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                              <line x1={dx} y1={hy1 + 12} x2={dx} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <line x1={hx1} y1={hy1 + 12} x2={hx1} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <text x={(dx + hx1) / 2} y={hy1 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromLeft1}</text>
                            </>)}
                            {/* Jobbról: második furat */}
                            {showRightDim && (<>
                              <line x1={hx2} y1={hy1 + 16} x2={dx + dwa} y2={hy1 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                              <line x1={hx2} y1={hy1 + 12} x2={hx2} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <line x1={dx + dwa} y1={hy1 + 12} x2={dx + dwa} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <text x={(hx2 + dx + dwa) / 2} y={hy1 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromRight2}</text>
                            </>)}
                            {/* Középre: mindkét szélről, szépen egy vonalban */}
                            {showCenterDimsH && (<>
                              <line x1={dx} y1={hy1 + 16} x2={hx1} y2={hy1 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                              <line x1={dx} y1={hy1 + 12} x2={dx} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <line x1={hx1} y1={hy1 + 12} x2={hx1} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <text x={(dx + hx1) / 2} y={hy1 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromLeft1}</text>

                              <line x1={hx2} y1={hy1 + 16} x2={dx + dwa} y2={hy1 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                              <line x1={hx2} y1={hy1 + 12} x2={hx2} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <line x1={dx + dwa} y1={hy1 + 12} x2={dx + dwa} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <text x={(hx2 + dx + dwa) / 2} y={hy1 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromRight2}</text>
                            </>)}
                          </>);
                        })()}

                        {/* Hinges */}
                        {hingeYs.map((hy, idx) => (
                          <g key={idx}>
                            <circle cx={hingeX} cy={hy} r={17.5 * dsc} fill="#fff" stroke="#888" strokeWidth={1.5} />
                            <circle cx={hingeX} cy={hy} r={1.5} fill="#555" />
                            {idx === 0 && ( // Draw margin dimension for top hinge
                              <g>
                                <line x1={hingeX} y1={dy} x2={hingeX} y2={hy} stroke="#8a7a6a" strokeWidth={.6} strokeDasharray="2,2" />
                                <text x={hingeX + (hingesLeft ? 6 : -6)} y={(dy + hy) / 2 + 3} textAnchor={hingesLeft ? "start" : "end"} fontSize={8} fill="#8a7a6a" fontWeight="700" fontFamily="JetBrains Mono">{Math.round(hingeMargin)}</text>
                              </g>
                            )}
                            {idx === hingeYs.length - 1 && ( // Draw margin dimension for bot hinge
                              <g>
                                <line x1={hingeX} y1={dy + dha} x2={hingeX} y2={hy} stroke="#8a7a6a" strokeWidth={.6} strokeDasharray="2,2" />
                                <text x={hingeX + (hingesLeft ? 6 : -6)} y={(dy + dha + hy) / 2 + 3} textAnchor={hingesLeft ? "start" : "end"} fontSize={8} fill="#8a7a6a" fontWeight="700" fontFamily="JetBrains Mono">{Math.round(hingeMargin)}</text>
                              </g>
                            )}
                          </g>
                        ))}
                        <text x={hingeX + (hingesLeft ? 20 : -20)} y={hingeYs[0] + 3} textAnchor={hingesLeft ? "start" : "end"} fontSize={8} fill="#555" fontWeight="600" fontFamily="Inter">35mm pánthely</text>

                      </svg>
                    </ZoomableSvg>
                  );
                })()}
              </div>
            </div>
          </div>
        </div>
      );
    }

    function Lower2DoorCalc({ variant = "kitchen", params, boardColors, edgeBandOptions, partDefaults, onBack }) {
      const [W, setW] = usePersistentState("Lower2DoorCalc", "W", 600);
      const [customH, setCustomH] = usePersistentState("Lower2DoorCalc", "customH", null); // null = auto számolt
      const [braceDepth, setBraceDepth] = usePersistentState("Lower2DoorCalc", "braceDepth", 100);
      const [shelfCount, setShelfCount] = usePersistentState("Lower2DoorCalc", "shelfCount", 1);
      const [backT, setBackT] = usePersistentState("Lower2DoorCalc", "backT", 3);
      const [bottomPos, setBottomPos] = usePersistentState("Lower2DoorCalc", "bottomPos", "between");
      const [topPos, setTopPos] = usePersistentState("Lower2DoorCalc", "topPos", "between"); // new state for simple cabinet top
      // Helyi ajtórés — alapból a főoldalról jön, de itt felülírható
      const [doorGapTop, setDoorGapTop] = usePersistentState("Lower2DoorCalc", "doorGapTop", params.lowerDoorGapTop);
      const [doorGapBottom, setDoorGapBottom] = usePersistentState("Lower2DoorCalc", "doorGapBottom", params.lowerDoorGapBottom);
      const [doorGapSide, setDoorGapSide] = usePersistentState("Lower2DoorCalc", "doorGapSide", params.lowerDoorGapSide);
      // Polc behúzás - alapból a főoldalról
      const [shelfSetback, setShelfSetback] = usePersistentState("Lower2DoorCalc", "shelfSetback", params.shelfSetback);
      // Oldallap kettéválasztás (bal/jobb külön szín/él)
      const [splitSides, setSplitSides] = usePersistentState("Lower2DoorCalc", "splitSides", false);
      // Szálirány felcserélés (alkatrészenként)
      const [swappedParts, setSwappedParts] = usePersistentState("Lower2DoorCalc", "swappedParts", {});

      // Ajtólap és vasalat paraméterek
      const [handlePitch, setHandlePitch] = usePersistentState("Lower2DoorCalc", "handlePitch", params.handlePitch);
      const [handleOrient, setHandleOrient] = usePersistentState("Lower2DoorCalc", "handleOrient", params.handleOrient); // "horizontal" | "vertical"
      const [handleCenter, setHandleCenter] = usePersistentState("Lower2DoorCalc", "handleCenter", params.handleCenter); // false = corner, true = center
      const [doorHanding, setDoorHanding] = usePersistentState("Lower2DoorCalc", "doorHanding", "left"); // "left" = balos (pánt balra), "right" = jobbos (pánt jobbra)
      const [handleMarginX, setHandleMarginX] = usePersistentState("Lower2DoorCalc", "handleMarginX", params.handleMarginX);
      const [handleMarginY, setHandleMarginY] = usePersistentState("Lower2DoorCalc", "handleMarginY", params.handleMarginY);
      const [hingeMargin, setHingeMargin] = usePersistentState("Lower2DoorCalc", "hingeMargin", params.hingeMargin);
      const [doorMaterial, setDoorMaterial] = usePersistentState("Lower2DoorCalc", "doorMaterial", "butorlap"); // "butorlap" | "mdf"
      const [mdfThickness, setMdfThickness] = usePersistentState("Lower2DoorCalc", "mdfThickness", 18); // 18 | 22

      const bt = params.boardThickness;
      const autoTotalCabinetH = variant === "kitchen" ? params.counterHeight - params.countertopThickness : params.cabinetHeight;
      const totalCabinetH = customH !== null ? customH : autoTotalCabinetH;

      // corpusFrameH = a szekrény keret magassága lábazat nélkül (NEM változik a fenéklap pozíciótól!)
      const corpusFrameH = totalCabinetH - params.plinthHeight;

      // sideH = az oldallap tényleges hossza (ez változhat, ha fenéklap/tetőlap ráfekszik)
      let sideH = corpusFrameH;
      if (bottomPos === "under") sideH -= bt;
      if (variant === "simple" && topPos === "over") sideH -= bt;

      const internalW = W - 2 * bt;
      let internalH = sideH;
      if (bottomPos === "between") internalH -= bt;
      if (variant === "kitchen" || topPos === "between") internalH -= bt;

      // Az ajtó és hátlap magassága a KERET magasságától függ, nem az oldallap hosszától!
      const doorH = corpusFrameH - doorGapTop - doorGapBottom;
      const doorGapMiddle = 2;
      const doorW = (W - 2 * doorGapSide - doorGapMiddle) / 2;

      // Hátlap: teljes bútor külső méret - behúzás (keret magassága alapján)
      const backPanelW = W - params.backPanelGap;
      const backPanelH = corpusFrameH - params.backPanelGap;

      // Polc mélység: fenéklap (= szekrény mélysége) - behúzás
      const shelfDepth = params.lowerDepth - shelfSetback;

      const bottomPanelL = bottomPos === "between" ? internalW : W;
      const bottomPanelW = params.lowerDepth;
      const braceL = internalW;

      // ── Ajtó súly és Blum pánt számítás ──
      // Laminált bútorlap: ~11.8 kg/m²
      // E1 MDF sűrűség: ~700 kg/m³ (0.7 kg / m² / mm)
      const BOARD_KG_PER_M2 = doorMaterial === "mdf" ? (mdfThickness * 0.7) : 11.8;
      const doorAreaM2 = (doorH / 1000) * (doorW / 1000);
      const doorWeightKg = R(doorAreaM2 * BOARD_KG_PER_M2, 2);

      // Blum CLIP top pánt szükséglet — magasság és súly alapján (a kettő közül a nagyobb)
      const hingesByHeight = doorH <= 900 ? 2 : doorH <= 1600 ? 3 : doorH <= 2000 ? 4 : Math.max(2, Math.ceil(doorH / 500));
      const hingesByWeight = doorWeightKg <= 6 ? 2 : doorWeightKg <= 12 ? 3 : doorWeightKg <= 17 ? 4 : doorWeightKg <= 22 ? 5 : Math.max(2, Math.ceil(doorWeightKg / 5));
      const hingeCount = Math.max(hingesByHeight, hingesByWeight);

      // ── Alkatrészek definíciója szín/él alapértékekkel ──
      // Alapértékek betöltése a beállításokból
      const getDef = (id) => partDefaults.find(p => p.id === id) || { colorIdx: 0, edges: [e04, null, null, null] };
      const sideDef = getDef("lower_side");
      const bottomDef = getDef("lower_bottom");
      const braceFDef = getDef("lower_brace_f");
      const braceBDef = getDef("lower_brace_b");
      const backDef = getDef("lower_back");
      const doorDef = getDef("lower_door");
      const shelfDef = getDef("lower_shelf");

      const topPanelL = topPos === "between" ? internalW : W;

      const sideNote = () => {
        let n = [];
        if (bottomPos === "under") n.push("Lent rááll");
        if (variant === "simple" && topPos === "over") n.push("Fent alááll");
        return n.join(", ");
      };

      const defaultParts = [
        // Oldallapok: ha splitSides, 2 külön sor; ha nem, 1 sor qty:2
        ...(splitSides ? [
          {
            id: "side_l", name: "Oldallap (bal)", qty: 1, l: sideH, w: params.lowerDepth, t: bt,
            note: sideNote(),
            colorIdx: sideDef.colorIdx, edges: [...sideDef.edges]
          },
          {
            id: "side_r", name: "Oldallap (jobb)", qty: 1, l: sideH, w: params.lowerDepth, t: bt,
            note: sideNote(),
            colorIdx: sideDef.colorIdx, edges: [...sideDef.edges]
          },
        ] : [
          {
            id: "side", name: "Oldallap", qty: 2, l: sideH, w: params.lowerDepth, t: bt,
            note: sideNote(),
            colorIdx: sideDef.colorIdx, edges: [...sideDef.edges]
          },
        ]),
        {
          id: "bottom", name: "Fenéklap", qty: 1, l: bottomPanelL, w: bottomPanelW, t: bt,
          note: bottomPos === "between" ? "Oldalfalak között" : "Oldalfalak alatt",
          colorIdx: bottomDef.colorIdx,
          edges: bottomPos === "between"
            ? [...bottomDef.edges]
            : [bottomDef.edges[0], bottomDef.edges[1], bottomDef.edges[0] || e04, bottomDef.edges[3]]
        },
        ...(variant === "kitchen" ? [
          {
            id: "brace_f", name: "Átkötő (elöl)", qty: 1, l: braceL, w: braceDepth, t: bt,
            note: "Felül, elöl", colorIdx: braceFDef.colorIdx, edges: [...braceFDef.edges]
          },
          {
            id: "brace_b", name: "Átkötő (hátul)", qty: 1, l: braceL, w: braceDepth, t: bt,
            note: "Felül, hátul", colorIdx: braceBDef.colorIdx, edges: [...braceBDef.edges]
          }
        ] : [
          {
            id: "top", name: "Tetőlap", qty: 1, l: topPanelL, w: params.lowerDepth, t: bt,
            note: topPos === "between" ? "Oldalfalak között" : "Oldalfalak felett",
            colorIdx: bottomDef.colorIdx,
            edges: topPos === "between" ? [...bottomDef.edges] : [bottomDef.edges[0], bottomDef.edges[1], bottomDef.edges[0] || e04, bottomDef.edges[3]]
          }
        ]),
        {
          id: "back", name: "Hátlap", qty: 1, l: backPanelW, w: backPanelH, t: backT,
          note: "HDF (" + params.backPanelGap + " mm behúzás)",
          colorIdx: backDef.colorIdx, edges: [...backDef.edges]
        },
        {
          id: "door", name: "Ajtólap", qty: 2, l: doorH, w: doorW, t: bt,
          note: R(doorWeightKg, 1) + " kg — Blum " + hingeCount + " pár pánt",
          colorIdx: doorDef.colorIdx, edges: [...doorDef.edges]
        },
        ...Array.from({ length: shelfCount }, (_, i) => ({
          id: "shelf_" + i, name: "Polc" + (shelfCount > 1 ? " " + (i + 1) : ""),
          qty: 1, l: internalW, w: shelfDepth, t: bt,
          note: "Állítható", colorIdx: shelfDef.colorIdx, edges: [...shelfDef.edges]
        })),
      ];

      // Szálirány felcserélés segédfüggvény
      const toggleSwap = (id) => setSwappedParts(prev => ({ ...prev, [id]: !prev[id] }));
      const getDisplayDims = (p) => {
        const swapped = swappedParts[p.id];
        return swapped ? { l: p.w, w: p.l } : { l: p.l, w: p.w };
      };

      // Per-part overrides state (szín, élek)
      const [partOverrides, setPartOverrides] = usePersistentState("Lower2DoorCalc", "partOverrides", {});
      const getPart = (p) => {
        const ov = partOverrides[p.id] || {};
        return {
          ...p,
          colorIdx: ov.colorIdx !== undefined ? ov.colorIdx : p.colorIdx,
          edges: ov.edges || p.edges,
        };
      };
      const setPartOverride = (id, key, val) => {
        setPartOverrides(prev => ({
          ...prev,
          [id]: { ...prev[id], [key]: val }
        }));
      };

      const parts = defaultParts.map(getPart);

      // Élzárás jelölés compact
      const thickLabels = ["0.4", "2"];
      const edgeLabel = (e) => e ? (edgeBandOptions[e.o]?.name?.charAt(0) || "?") + " " + thickLabels[e.t] : "\u2014";
      const edgeBg = (e) => {
        if (!e) return "#e0dbd0";
        const colors = ["#b8d0e8", "#e8c8a0"];
        return colors[e.o] || "#ddd";
      };
      // Kattintás: ABS szín váltás (null → opt0 → opt1 → null)
      const cycleEdgeColor = (e) => {
        if (!e) return { o: 0, t: edgeBandOptions[0]?.defT || 0 };
        if (e.o < edgeBandOptions.length - 1) return { ...e, o: e.o + 1 };
        return null;
      };
      // Dupla kattintás: vastagság váltás (0.4 ↔ 2mm)
      const toggleEdgeThick = (e) => {
        if (!e) return { o: 0, t: 1 };
        return { ...e, t: e.t === 0 ? 1 : 0 };
      };

      // ── SVG Front View ──
      const SVW = 370, SVH = 520;
      const padL = 80, padR = 80, padT = 36, padB = 64;
      const drawW = SVW - padL - padR;
      const drawH = SVH - padT - padB;
      const scX = drawW / W;
      const scY = drawH / totalCabinetH;
      const sc = Math.min(scX, scY);
      const cw = W * sc;
      const ch = totalCabinetH * sc;
      const cx = padL + (drawW - cw) / 2;
      const cy = padT + (drawH - ch) / 2;

      const yFromBot = (mmFromBot) => cy + ch - mmFromBot * sc;

      const plinthTopY = yFromBot(params.plinthHeight);
      const cabinetTopY = cy;
      const bottomPanelTopY = plinthTopY - bt * sc;

      const sideTopY = variant === "simple" && topPos === "over" ? cabinetTopY + bt * sc : cabinetTopY;
      const sideBotY = bottomPos === "under" ? bottomPanelTopY : plinthTopY;
      const sideDrawH = sideBotY - sideTopY;

      return (
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: 16 }}>
          <button onClick={onBack} style={{
            padding: "6px 16px", borderRadius: 8, background: "rgba(90,42,10,.1)", border: "1.5px solid rgba(90,42,10,.2)",
            color: BRN, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "Inter, sans-serif", marginBottom: 16
          }}>{"\u2190"} Vissza a szekrénytípusokhoz</button>

          <div style={{ display: "grid", gridTemplateColumns: "340px 1fr", gap: 20, alignItems: "start" }}>
            {/* Left: Cabinet-specific inputs */}
            <div>
              <div style={cardStyle}>
                <div style={{ fontWeight: 800, fontSize: 14, color: BRN, marginBottom: 12 }}>{"\uD83D\uDEAA\uD83D\uDEAA"} 2 ajtós alsó szekrény</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {/* Szekrény szélessége */}
                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                    Szekrény szélessége
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={W} min={200}
                        onChange={e => setW(e.target.value === "" ? "" : +e.target.value)}
                        style={{ ...inputStyle, fontSize: 14 }} />
                      <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>mm</span>
                    </div>
                    <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                      {[300, 450, 600, 800, 900].map(w => (
                        <button key={w} onClick={e => { e.preventDefault(); setW(w); }} style={{
                          padding: "2px 8px", borderRadius: 5, fontSize: 11, cursor: "pointer",
                          background: W === w ? "#5a2a0a" : "#e8dfd0",
                          color: W === w ? "#fff" : "#5a4a3a",
                          border: W === w ? "1.5px solid #5a2a0a" : "1.5px solid #c0b090",
                          fontWeight: 700, fontFamily: "JetBrains Mono, monospace",
                          transition: "all .15s"
                        }}>{w}</button>
                      ))}
                    </div>
                  </label>
                  {/* Szekrény magassága — számított, de felülírható */}
                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span>Szekrény magassága (lábazattal együtt)</span>
                      {customH !== null && (
                        <button onClick={() => setCustomH(null)} style={{
                          fontSize: 9, padding: "1px 6px", borderRadius: 5, cursor: "pointer",
                          background: "#f0e0d0", border: "1px solid #c0a080", color: BRN, fontWeight: 700
                        }}>↩ Auto ({autoTotalCabinetH} mm)</button>
                      )}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={customH !== null ? customH : autoTotalCabinetH} min={100}
                        onChange={e => setCustomH(e.target.value === "" ? "" : +e.target.value)}
                        style={{ ...inputStyle, fontSize: 14, borderColor: customH !== null ? AMB : "#ddd" }} />
                      <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>mm</span>
                    </div>
                    {customH === null && <span style={{ fontSize: 9, color: "#aaa" }}>Számított: {autoTotalCabinetH} mm ({corpusFrameH}+{params.plinthHeight}) (módosítható)</span>}
                  </label>
                  {[
                    ...(variant === "kitchen" ? [{ label: "Átkötő mélysége", val: braceDepth, set: setBraceDepth, min: 50, unit: "mm" }] : []),
                    { label: "Hátlap vastagság", val: backT, set: setBackT, min: 1, unit: "mm" },
                    { label: "Polcok száma", val: shelfCount, set: setShelfCount, min: 0, unit: "db" },
                    { label: "Polc behúzás", val: shelfSetback, set: setShelfSetback, min: 0, unit: "mm" },
                  ].map(f => (
                    <label key={f.label} style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                      {f.label}
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <input type="number" value={f.val} min={f.min}
                          onChange={e => f.set(e.target.value === "" ? "" : +e.target.value)}
                          style={{ ...inputStyle, fontSize: 14 }} />
                        <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>{f.unit}</span>
                      </div>
                    </label>
                  ))}
                </div>

                {/* Ajtó rések */}
                <div style={{ marginTop: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".05em" }}>Ajtó rések</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
                    {[
                      { label: "Alul", val: doorGapBottom, set: setDoorGapBottom },
                      { label: "Felül", val: doorGapTop, set: setDoorGapTop },
                      { label: "Oldalt", val: doorGapSide, set: setDoorGapSide },
                    ].map(f => (
                      <label key={f.label} style={{ display: "flex", flexDirection: "column", gap: 2, fontSize: 11, color: "var(--text-secondary)", fontWeight: 600 }}>
                        {f.label}
                        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                          <input type="number" value={f.val} min={0}
                            onChange={e => f.set(e.target.value === "" ? "" : +e.target.value)}
                            style={{ ...inputStyle, fontSize: 13, padding: "4px 6px" }} />
                          <span style={{ fontSize: 10, color: "#aaa" }}>mm</span>
                        </div>
                      </label>
                    ))}
                  </div>
                </div>

                {/* Fenéklap pozíció választó */}
                <div style={{ marginTop: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".05em" }}>Fenéklap pozíciója</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                     {[
                       { id: "between", label: "Oldalfalak között",
                         svg: <svg width="36" height="22" viewBox="0 0 36 22" fill="currentColor" style={{flexShrink:0,marginTop:2}}>
                           <rect x="0" y="0" width="5" height="22"/><rect x="31" y="0" width="5" height="22"/>
                           <rect x="6" y="16" width="24" height="5"/>
                         </svg>,
                         desc: "Fenéklap a két oldallap közé kerül" },
                       { id: "under", label: "Oldalfalak alatt",
                         svg: <svg width="36" height="22" viewBox="0 0 36 22" fill="currentColor" style={{flexShrink:0,marginTop:2}}>
                           <rect x="0" y="0" width="5" height="15"/><rect x="31" y="0" width="5" height="15"/>
                           <rect x="0" y="16" width="36" height="6"/>
                         </svg>,
                         desc: "Fenéklap az oldallapok alatt, azok ráállnak" },
                     ].map(opt => (
                       <button key={opt.id} onClick={() => setBottomPos(opt.id)} style={{
                         padding: "8px 12px", borderRadius: 8, fontSize: 12, cursor: "pointer",
                         background: bottomPos === opt.id ? "#5a2a0a" : "#f4efe8",
                         color: bottomPos === opt.id ? "#fff" : "#5a4a3a",
                         border: bottomPos === opt.id ? "2px solid #5a2a0a" : "2px solid #d8d0c0",
                         fontWeight: 700, fontFamily: "Inter, sans-serif", textAlign: "left",
                         transition: "all .15s", display: "flex", alignItems: "flex-start", gap: 10
                       }}>
                         {opt.svg}
                         <div>{opt.label}<div style={{ fontSize: 10, fontWeight: 400, opacity: .7, marginTop: 2 }}>{opt.desc}</div></div>
                       </button>
                     ))}
                  </div>
                </div>

                {/* Tetőlap pozíció választó (csak egyszerű szekrénynél) */}
                {variant === "simple" && (
                  <div style={{ marginTop: 14 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".05em" }}>Tetőlap pozíciója</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      {[
                        { id: "between", label: "Oldalfalak között",
                          svg: <svg width="36" height="22" viewBox="0 0 36 22" fill="currentColor" style={{flexShrink:0,marginTop:2}}>
                            <rect x="0" y="0" width="5" height="22"/><rect x="31" y="0" width="5" height="22"/>
                            <rect x="6" y="1" width="24" height="5"/>
                          </svg>,
                          desc: "Tetőlap a két oldallap közé kerül" },
                        { id: "over", label: "Oldalfalak felett",
                          svg: <svg width="36" height="22" viewBox="0 0 36 22" fill="currentColor" style={{flexShrink:0,marginTop:2}}>
                            <rect x="0" y="7" width="5" height="15"/><rect x="31" y="7" width="5" height="15"/>
                            <rect x="0" y="1" width="36" height="5"/>
                          </svg>,
                          desc: "Tetőlap az oldallapok felett" },
                      ].map(opt => (
                        <button key={opt.id} onClick={() => setTopPos(opt.id)} style={{
                          padding: "8px 12px", borderRadius: 8, fontSize: 12, cursor: "pointer",
                          background: topPos === opt.id ? "#5a2a0a" : "#f4efe8",
                          color: topPos === opt.id ? "#fff" : "#5a4a3a",
                          border: topPos === opt.id ? "2px solid #5a2a0a" : "2px solid #d8d0c0",
                          fontWeight: 700, fontFamily: "Inter, sans-serif", textAlign: "left",
                          transition: "all .15s", display: "flex", alignItems: "flex-start", gap: 10
                        }}>
                          {opt.svg}
                          <div>{opt.label}<div style={{ fontSize: 10, fontWeight: 400, opacity: .7, marginTop: 2 }}>{opt.desc}</div></div>
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {/* Oldallap kettéválasztás */}
                <div style={{ marginTop: 14 }}>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                    <div onClick={() => setSplitSides(s => !s)} style={{
                      width: 36, height: 20, borderRadius: 10, background: splitSides ? "#5a2a0a" : "#d0ccc0",
                      position: "relative", cursor: "pointer", transition: "all .2s"
                    }}>
                      <div style={{
                        width: 16, height: 16, borderRadius: 8, background: "#fff", position: "absolute",
                        top: 2, left: splitSides ? 18 : 2, transition: "all .2s", boxShadow: "0 1px 3px rgba(0,0,0,.2)"
                      }} />
                    </div>
                    Különböző oldallapok (bal/jobb)
                  </label>
                  {splitSides && <div style={{ fontSize: 10, color: "#888", marginTop: 4 }}>A két oldallap külön sor az alkatrészlistában, eltérő szín/élzárás.</div>}
                </div>

                {/* Computed summary */}
                <div style={{ marginTop: 16, background: "#f8f0e8", borderRadius: 8, padding: 12, border: "1px solid #e0c8a0" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: BRN, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>Számított méretek</div>
                  {[
                    ["Oldallap H", sideH + " mm"],
                    ["Belső szél.", internalW + " mm"],
                    ["Belső mag.", internalH + " mm"],
                    ["Fenéklap sz.", bottomPanelL + " mm"],
                    ["Hátlap", backPanelW + " \u00d7 " + backPanelH + " mm"],
                    ["Polc mélys.", shelfDepth + " mm"],
                    ["Ajtó", doorW + " \u00d7 " + doorH + " mm"],
                  ].map(([l, v]) => (
                    <div key={l} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                      <span style={{ color: "#6a5a4a" }}>{l}:</span>
                      <span style={{ fontFamily: "JetBrains Mono, monospace", fontWeight: 700, color: "var(--text)" }}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Center: Parts list + color/edge + Door UI */}
            <div>
              <div style={cardStyle}>
                <div style={{ fontWeight: 800, fontSize: 14, color: BRN, marginBottom: 12 }}>{"\uD83D\uDCCB"} Alkatrészlista</div>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                    <thead>
                      <tr>
                        {["Alkatrész", "db", "H × Sz (mm)  ⇄", "Vtg.", "Szín", "Élek (H1·H2·Sz1·Sz2)", "Megj."].map((h, i) => (
                          <th key={i} style={{
                            padding: "7px 6px", textAlign: "left", fontSize: 9, fontWeight: 700,
                            background: BRN, color: "#fff", textTransform: "uppercase", letterSpacing: ".03em",
                            whiteSpace: "nowrap", borderRight: "1px solid rgba(255,255,255,.1)"
                          }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {parts.map((p, i) => {
                        const dims = getDisplayDims(p);
                        const isSwapped = !!swappedParts[p.id];
                        return (
                          <tr key={i} style={{ background: i % 2 ? "#f8f6f2" : "#fff", height: 32 }}>
                            <td style={{ padding: "6px", fontWeight: 700, color: "var(--text)", whiteSpace: "nowrap" }}>{p.name}</td>
                            <td style={{ padding: "6px", textAlign: "center", whiteSpace: "nowrap" }}>{monoSpan(p.qty)}</td>
                            <td style={{ padding: "6px", whiteSpace: "nowrap" }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                                {monoSpan(dims.l)}
                                <span style={{ fontSize: 10, color: "#aaa" }}>×</span>
                                {monoSpan(dims.w)}
                                <button onClick={() => toggleSwap(p.id)} title="Szálirány megfordítása (H×Sz csere)"
                                  style={{
                                    marginLeft: 2, padding: "1px 5px", borderRadius: 4, cursor: "pointer",
                                    fontSize: 10, fontWeight: 700, lineHeight: 1,
                                    background: isSwapped ? "#e8f0ff" : "#f0f0f0",
                                    border: isSwapped ? "1.5px solid #3a7acc" : "1px solid #ccc",
                                    color: isSwapped ? "#3a7acc" : "#888"
                                  }}>⇄</button>
                              </div>
                            </td>
                            <td style={{ padding: "6px", whiteSpace: "nowrap" }}>{monoSpan(p.t)}</td>
                            <td style={{ padding: "6px", whiteSpace: "nowrap" }}>
                              <div onClick={() => {
                                const next = ((p.colorIdx || 0) + 1) % boardColors.length;
                                setPartOverride(p.id, "colorIdx", next);
                              }} style={{ display: "flex", alignItems: "center", gap: 4, cursor: "pointer", userSelect: "none" }}
                                title="Kattints a szín váltáshoz">
                                <div style={{ width: 14, height: 14, borderRadius: 3, background: boardColors[p.colorIdx]?.hex || "#ccc", border: "1.5px solid #888", flexShrink: 0, transition: "all .15s" }} />
                                <span style={{ fontSize: 10, color: "#666" }}>{boardColors[p.colorIdx]?.name || "?"}</span>
                              </div>
                            </td>
                            <td style={{ padding: "6px" }}>
                              <div style={{ display: "flex", gap: 2 }}>
                                {["H1", "H2", "Sz1", "Sz2"].map((lbl, ei) => {
                                  const ev = p.edges[ei];
                                  return (
                                    <div key={lbl}
                                      onClick={() => {
                                        const newEdges = [...p.edges];
                                        newEdges[ei] = cycleEdgeColor(ev);
                                        setPartOverride(p.id, "edges", newEdges);
                                      }}
                                      onContextMenu={(e) => {
                                        e.preventDefault();
                                        e.stopPropagation();
                                        const newEdges = [...p.edges];
                                        newEdges[ei] = toggleEdgeThick(ev);
                                        setPartOverride(p.id, "edges", newEdges);
                                      }}
                                      title={lbl + ": bal klikk=szín, jobb klikk=vastagság"}
                                      style={{
                                        width: 28, height: 20, borderRadius: 3, cursor: "pointer", userSelect: "none",
                                        background: edgeBg(ev),
                                        border: ev ? "1.5px solid #888" : "1px solid #d0ccc0",
                                        display: "flex", alignItems: "center", justifyContent: "center",
                                        fontSize: 7, fontWeight: 700, color: ev ? "#333" : "#bbb",
                                        transition: "all .1s"
                                      }}>{ev ? thickLabels[ev.t] : "—"}</div>
                                  );
                                })}
                              </div>
                            </td>
                            <td style={{ padding: "6px", fontSize: 10, color: "#888", whiteSpace: "nowrap" }}>{p.note}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                {/* Summary metrics */}
                <div style={{ marginTop: 14, display: "flex", gap: 12, flexWrap: "wrap" }}>
                  {[
                    ["Össz. lap", parts.reduce((s, p) => s + p.qty, 0) + " db"],
                    ["Ajtó", doorW + " \u00d7 " + doorH],
                    ["Oldallap", sideH + " \u00d7 " + params.lowerDepth + " mm"],
                    ["Hátlap", backPanelW + "\u00d7" + backPanelH],
                    ["Fenéklap", bottomPos === "between" ? "Között" : "Alatt"],
                  ].map(([l, v]) => (
                    <div key={l} style={{ background: "#f0e8d8", padding: "5px 10px", borderRadius: 6 }}>
                      <div style={{ fontSize: 8, color: "#8a7060", textTransform: "uppercase", fontWeight: 700 }}>{l}</div>
                      <div style={{ fontSize: 13, fontWeight: 800, color: BRN, fontFamily: "JetBrains Mono, monospace" }}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ ...cardStyle, marginTop: 16 }}>
                <div style={{ fontWeight: 800, fontSize: 13, color: BRN, marginBottom: 12 }}>{"\uD83D\uDEAA"} Ajtólap és Vasalat beállítások</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
                  <GlobalHandleSelector
                    orient={handleOrient}
                    isCentered={handleCenter}
                    handing={doorHanding}
                    onChange={(o, c) => { setHandleOrient(o); setHandleCenter(c); }}
                  />
                  <DoorHandingSelector handing={doorHanding} onChange={setDoorHanding} />

                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 11, color: "var(--text-secondary)", fontWeight: 600 }}>
                    Furattávolság
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={handlePitch} onChange={e => setHandlePitch(+e.target.value)} style={{ ...inputStyle, flex: 1 }} />
                      <span style={{ fontSize: 10, color: "#888" }}>mm</span>
                    </div>
                  </label>

                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 11, color: "var(--text-secondary)", fontWeight: 600 }}>
                    Kezdő furat táv. oldalról
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={handleMarginX} disabled={handleCenter && handleOrient === "horizontal"} onChange={e => setHandleMarginX(+e.target.value)} style={{ ...inputStyle, flex: 1, opacity: handleCenter && handleOrient === "horizontal" ? .5 : 1 }} title="Csak aszimmetrikus pozíciónál érvényes" />
                      <span style={{ fontSize: 10, color: "#888" }}>mm</span>
                    </div>
                  </label>
                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 11, color: "var(--text-secondary)", fontWeight: 600 }}>
                    Kezdő furat táv. fentről
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={handleMarginY} onChange={e => setHandleMarginY(+e.target.value)} style={{ ...inputStyle, flex: 1 }} />
                      <span style={{ fontSize: 10, color: "#888" }}>mm</span>
                    </div>
                  </label>

                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 11, color: "var(--text-secondary)", fontWeight: 600 }}>
                    Pánthely távolsága széltől
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={hingeMargin} onChange={e => setHingeMargin(+e.target.value)} style={{ ...inputStyle, flex: 1 }} />
                      <span style={{ fontSize: 10, color: "#888" }}>mm</span>
                    </div>
                  </label>
                </div>

                <div style={{ background: "#eef4ff", borderRadius: 8, padding: 12, border: "1px solid #c0d8f0" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: BLUE, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>Vasalat számítások</div>

                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 11, color: "#4a6a8a", fontWeight: 600, marginBottom: 4 }}>Ajtólap anyaga</div>
                    <div style={{ display: "flex", gap: 6 }}>
                      {[
                        { val: "butorlap", label: "Laminált bútorlap (~11.8 kg/m²)" },
                        { val: "mdf", label: "E1 MDF" },
                      ].map(({ val, label }) => (
                        <button key={val} onClick={() => setDoorMaterial(val)} style={{
                          flex: 1, padding: "5px 8px", fontSize: 11, fontWeight: 700, borderRadius: 6, cursor: "pointer",
                          border: doorMaterial === val ? "2px solid " + BLUE : "1.5px solid #c0d8f0",
                          background: doorMaterial === val ? BLUE : "#fff",
                          color: doorMaterial === val ? "#fff" : "#4a6a8a",
                        }}>{label}</button>
                      ))}
                    </div>
                  </div>

                  {doorMaterial === "mdf" && (
                    <div style={{ marginBottom: 10 }}>
                      <div style={{ fontSize: 11, color: "#4a6a8a", fontWeight: 600, marginBottom: 4 }}>MDF vastagság</div>
                      <div style={{ display: "flex", gap: 6 }}>
                        {[18, 19, 20, 21, 22].map(t => (
                          <button key={t} onClick={() => setMdfThickness(t)} style={{
                            flex: 1, padding: "5px 8px", fontSize: 11, fontWeight: 700, borderRadius: 6, cursor: "pointer",
                            border: mdfThickness === t ? "2px solid " + BLUE : "1.5px solid #c0d8f0",
                            background: mdfThickness === t ? BLUE : "#fff",
                            color: mdfThickness === t ? "#fff" : "#4a6a8a",
                          }}>{t} mm</button>
                        ))}
                      </div>
                    </div>
                  )}

                  {[
                    ["Ajtó méret", doorW + " \u00d7 " + doorH + " mm"],
                    [
                      "Súly (" + (doorMaterial === "mdf" ? "E1 MDF " + mdfThickness + "mm" : "Laminált bútorlap 18mm") + ")",
                      doorWeightKg + " kg"
                    ],
                    ["Kivetőpánt szükséglet", hingeCount + " darab/ajtó"],
                  ].map(([l, v]) => (
                    <div key={l} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                      <span style={{ color: "#4a6a8a" }}>{l}:</span>
                      <span style={{ fontFamily: "JetBrains Mono, monospace", fontWeight: 700, color: "#1a3a5a" }}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Right: SVG visualization */}
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ ...cardStyle, padding: 12 }}>
                <div style={{ fontWeight: 800, fontSize: 12, color: "var(--text-secondary)", textAlign: "center", marginBottom: 8, letterSpacing: ".06em", textTransform: "uppercase" }}>Korpusz Elölnézet</div>

                <ZoomableSvg width={SVW} height={SVH}>
                  <svg width={SVW} height={SVH} style={{ display: "block", margin: "0 auto" }}>
                    <defs>
                      <pattern id="hatch" width={6} height={6} patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                        <line x1={0} y1={0} x2={0} y2={6} stroke="#d8c8a0" strokeWidth={1} />
                      </pattern>
                      <pattern id="plinthPattern" width={8} height={8} patternUnits="userSpaceOnUse">
                        <rect width={8} height={8} fill="#e8e0d0" />
                        <line x1={0} y1={4} x2={8} y2={4} stroke="#ccc4b0" strokeWidth={0.5} />
                      </pattern>
                    </defs>
                    <rect width={SVW} height={SVH} fill="#fff" rx={8} />

                    {/* Plinth area */}
                    <rect x={cx + bt * sc} y={plinthTopY} width={internalW * sc} height={(cy + ch) - plinthTopY}
                      fill="url(#plinthPattern)" stroke="#b8a888" strokeWidth={1} strokeDasharray="4,2" opacity={.6} />
                    <text x={cx + cw / 2} y={plinthTopY + ((cy + ch) - plinthTopY) / 2 + 3}
                      textAnchor="middle" fontSize={8} fill="#8a7a6a" fontWeight="600" fontFamily="Inter" opacity={.8}>Lábazat</text>

                    {/* Fenéklap / Bottom panel */}
                    {bottomPos === "between" ? (
                      <rect x={cx + bt * sc} y={plinthTopY - bt * sc} width={internalW * sc} height={bt * sc}
                        fill="#d4a843" stroke={BRD} strokeWidth={.8} />
                    ) : (
                      <rect x={cx} y={plinthTopY - bt * sc} width={cw} height={bt * sc}
                        fill="#d4a843" stroke={BRD} strokeWidth={.8} />
                    )}
                    <text x={cx + cw / 2} y={plinthTopY - bt * sc / 2 + 3}
                      textAnchor="middle" fontSize={7} fill="#fff" fontWeight="700" fontFamily="Inter">Fenéklap</text>

                    {/* Side panels */}
                    <rect x={cx} y={sideTopY} width={bt * sc} height={sideDrawH}
                      fill="#c4a560" stroke={BRD} strokeWidth={1} />
                    <rect x={cx + cw - bt * sc} y={sideTopY} width={bt * sc} height={sideDrawH}
                      fill="#c4a560" stroke={BRD} strokeWidth={1} />

                    {/* Top Panel or Cross-braces */}
                    {variant === "kitchen" ? (
                      <g>
                        <rect x={cx + bt * sc} y={cabinetTopY} width={internalW * sc} height={bt * sc} fill="#b89040" stroke={BRD} strokeWidth={.5} />
                        <text x={cx + cw / 2} y={cabinetTopY + bt * sc / 2 + 3} textAnchor="middle" fontSize={6} fill="#fff" fontWeight="700" fontFamily="Inter">{"\u00c1"}tkötő {"\u00d7"}2</text>
                      </g>
                    ) : (
                      <g>
                        {topPos === "between" ? (
                          <rect x={cx + bt * sc} y={cabinetTopY} width={internalW * sc} height={bt * sc} fill="#d4a843" stroke={BRD} strokeWidth={.8} />
                        ) : (
                          <rect x={cx} y={cabinetTopY} width={cw} height={bt * sc} fill="#d4a843" stroke={BRD} strokeWidth={.8} />
                        )}
                        <text x={cx + cw / 2} y={cabinetTopY + bt * sc / 2 + 3} textAnchor="middle" fontSize={6} fill="#fff" fontWeight="700" fontFamily="Inter">Tetőlap</text>
                      </g>
                    )}

                    {/* Shelves */}
                    {shelfCount > 0 && (() => {
                      const shelfZone = internalH;
                      const gap = shelfZone / (shelfCount + 1);
                      const baseFromFloor = params.plinthHeight + bt;
                      return Array.from({ length: shelfCount }, (_, i) => {
                        const shelfBot = baseFromFloor + (i + 1) * gap;
                        const sy = yFromBot(shelfBot);
                        return (
                          <g key={i}>
                            <rect x={cx + bt * sc} y={sy} width={internalW * sc} height={Math.max(2, bt * sc)}
                              fill="#d4a843" stroke={BRD} strokeWidth={.5} opacity={.8} />
                            <text x={cx + cw / 2} y={sy + Math.max(2, bt * sc) / 2 + 3}
                              textAnchor="middle" fontSize={7} fill="#fff" fontWeight="800" fontFamily="Inter">{i + 1}.</text>
                          </g>
                        );
                      });
                    })()}

                    {/* Door outline */}
                    {(() => {
                      const doorBotFromFloor = params.plinthHeight + doorGapBottom;
                      const doorTopFromFloor = doorBotFromFloor + doorH;
                      const doorTopY = yFromBot(doorTopFromFloor);
                      const doorBotY = yFromBot(doorBotFromFloor);
                      return (
                        <>
                          <rect x={cx + doorGapSide * sc} y={doorTopY}
                            width={doorW * sc} height={doorBotY - doorTopY}
                            fill="none" stroke="#3a7acc" strokeWidth={1.5} strokeDasharray="6,3" opacity={.6} rx={2} />
                          <rect x={cx + (doorGapSide + doorW + doorGapMiddle) * sc} y={doorTopY}
                            width={doorW * sc} height={doorBotY - doorTopY}
                            fill="none" stroke="#3a7acc" strokeWidth={1.5} strokeDasharray="6,3" opacity={.6} rx={2} />
                          <text x={cx + cw / 2} y={(doorTopY + doorBotY) / 2 + 4}
                            textAnchor="middle" fontSize={9} fill="#3a7acc" fontWeight="700" fontFamily="Inter" opacity={.5}>2x Ajtólap</text>
                        </>
                      );
                    })()}

                    {/* Dimension lines – felső szélesség */}
                    <line x1={cx} y1={cy - 16} x2={cx + cw} y2={cy - 16} stroke="#555" strokeWidth={.8} />
                    <line x1={cx} y1={cy - 20} x2={cx} y2={cy - 6} stroke="#555" strokeWidth={.8} />
                    <line x1={cx + cw} y1={cy - 20} x2={cx + cw} y2={cy - 6} stroke="#555" strokeWidth={.8} />
                    <text x={cx + cw / 2} y={cy - 21} textAnchor="middle" fontSize={9} fill="#333" fontWeight="700" fontFamily="JetBrains Mono">{W}</text>

                    {/* Belső szélesség – csak ha van elég hely (legalább 30px) */}
                    {internalW * sc > 30 && (
                      <>
                        <line x1={cx + bt * sc} y1={cabinetTopY + bt * sc + 12} x2={cx + cw - bt * sc} y2={cabinetTopY + bt * sc + 12} stroke={BRN} strokeWidth={.6} />
                        <line x1={cx + bt * sc} y1={cabinetTopY + bt * sc + 8} x2={cx + bt * sc} y2={cabinetTopY + bt * sc + 16} stroke={BRN} strokeWidth={.6} />
                        <line x1={cx + cw - bt * sc} y1={cabinetTopY + bt * sc + 8} x2={cx + cw - bt * sc} y2={cabinetTopY + bt * sc + 16} stroke={BRN} strokeWidth={.6} />
                        <text x={cx + cw / 2} y={cabinetTopY + bt * sc + 26} textAnchor="middle" fontSize={8} fill={BRN} fontWeight="600" fontFamily="JetBrains Mono">{internalW}</text>
                      </>
                    )}

                    {/* Teljes magasság – jobb oldal, legtávolabbi */}
                    <line x1={cx + cw + 16} y1={cy} x2={cx + cw + 16} y2={cy + ch} stroke="#555" strokeWidth={.8} />
                    <line x1={cx + cw + 8} y1={cy} x2={cx + cw + 20} y2={cy} stroke="#555" strokeWidth={.8} />
                    <line x1={cx + cw + 8} y1={cy + ch} x2={cx + cw + 20} y2={cy + ch} stroke="#555" strokeWidth={.8} />
                    <text x={cx + cw + 16} y={cy + ch / 2 - 4} textAnchor="middle" fontSize={9} fill="#333" fontWeight="700" fontFamily="JetBrains Mono"
                      transform={`rotate(90, ${cx + cw + 16}, ${cy + ch / 2})`}>{totalCabinetH}</text>

                    {/* Oldallap magassága – jobb, közelebb */}
                    <line x1={cx + cw + 34} y1={sideTopY} x2={cx + cw + 34} y2={sideBotY} stroke={BRN} strokeWidth={.6} />
                    <line x1={cx + cw + 28} y1={sideTopY} x2={cx + cw + 40} y2={sideTopY} stroke={BRN} strokeWidth={.6} />
                    <line x1={cx + cw + 28} y1={sideBotY} x2={cx + cw + 40} y2={sideBotY} stroke={BRN} strokeWidth={.6} />
                    <text x={cx + cw + 34} y={(sideTopY + sideBotY) / 2 - 4} textAnchor="middle" fontSize={8} fill={BRN} fontWeight="600" fontFamily="JetBrains Mono"
                      transform={`rotate(90, ${cx + cw + 34}, ${(sideTopY + sideBotY) / 2})`}>{sideH}</text>

                    {/* Lábazat magassága – jobb, legtávolabbi */}
                    <line x1={cx + cw + 54} y1={plinthTopY} x2={cx + cw + 54} y2={cy + ch} stroke="#888" strokeWidth={.6} />
                    <line x1={cx + cw + 46} y1={plinthTopY} x2={cx + cw + 60} y2={plinthTopY} stroke="#888" strokeWidth={.6} />
                    <line x1={cx + cw + 46} y1={cy + ch} x2={cx + cw + 60} y2={cy + ch} stroke="#888" strokeWidth={.6} />
                    <text x={cx + cw + 54} y={plinthTopY + ((cy + ch) - plinthTopY) / 2 - 4} textAnchor="middle" fontSize={8} fill="#888" fontWeight="600" fontFamily="JetBrains Mono"
                      transform={`rotate(90, ${cx + cw + 54}, ${plinthTopY + ((cy + ch) - plinthTopY) / 2})`}>{params.plinthHeight}</text>

                    {/* Belső magasság – bal oldal, külső sor */}
                    {(() => {
                      const intTopY = cabinetTopY + bt * sc;
                      const intBotY = bottomPos === "between" ? plinthTopY - bt * sc : plinthTopY;
                      return (
                        <>
                          <line x1={cx - 22} y1={intTopY} x2={cx - 22} y2={intBotY} stroke={BRN} strokeWidth={.6} />
                          <line x1={cx - 28} y1={intTopY} x2={cx - 16} y2={intTopY} stroke={BRN} strokeWidth={.6} />
                          <line x1={cx - 28} y1={intBotY} x2={cx - 16} y2={intBotY} stroke={BRN} strokeWidth={.6} />
                          <text x={cx - 22} y={(intTopY + intBotY) / 2 - 4} textAnchor="middle" fontSize={8} fill={BRN} fontWeight="700" fontFamily="JetBrains Mono"
                            transform={`rotate(-90, ${cx - 22}, ${(intTopY + intBotY) / 2})`}>{internalH}</text>
                        </>
                      );
                    })()}

                    {/* Ajtó magassága – bal oldal, belső sor */}
                    {(() => {
                      const doorBotFromFloor = params.plinthHeight + doorGapBottom;
                      const doorTopFromFloor = doorBotFromFloor + doorH;
                      const dTopY = yFromBot(doorTopFromFloor);
                      const dBotY = yFromBot(doorBotFromFloor);
                      return (
                        <>
                          <line x1={cx - 44} y1={dTopY} x2={cx - 44} y2={dBotY} stroke="#3a7acc" strokeWidth={.6} />
                          <line x1={cx - 50} y1={dTopY} x2={cx - 38} y2={dTopY} stroke="#3a7acc" strokeWidth={.6} />
                          <line x1={cx - 50} y1={dBotY} x2={cx - 38} y2={dBotY} stroke="#3a7acc" strokeWidth={.6} />
                          <text x={cx - 44} y={(dTopY + dBotY) / 2 - 4} textAnchor="middle" fontSize={8} fill="#3a7acc" fontWeight="600" fontFamily="JetBrains Mono"
                            transform={`rotate(-90, ${cx - 44}, ${(dTopY + dBotY) / 2})`}>{doorH}</text>
                        </>
                      );
                    })()}

                    {/* Legend */}
                    <rect x={4} y={SVH - 56} width={SVW - 8} height={52} fill="white" rx={5} stroke="#e0dbd0" strokeWidth={1} />
                    <rect x={12} y={SVH - 48} width={10} height={7} fill="#c4a560" stroke={BRD} strokeWidth={.5} />
                    <text x={26} y={SVH - 42} fontSize={8} fill="#5a4a3a" fontFamily="Inter">Oldallap (nem ér a földre)</text>
                    <rect x={12} y={SVH - 36} width={10} height={7} fill="#d4a843" stroke={BRD} strokeWidth={.5} />
                    <text x={26} y={SVH - 30} fontSize={8} fill="#5a4a3a" fontFamily="Inter">Fenéklap / Polc{variant === "kitchen" ? " / Átkötő \u00d72" : " / Tetőlap"}</text>
                    <rect x={12} y={SVH - 24} width={10} height={7} fill="none" stroke="#3a7acc" strokeWidth={1} strokeDasharray="3,2" />
                    <text x={26} y={SVH - 18} fontSize={8} fill="#5a4a3a" fontFamily="Inter">2db Ajtólap kontúr ({doorW}{"\u00d7"}{doorH})</text>
                  </svg>
                </ZoomableSvg>
              </div>

              {/* Door SVG Area */}
              <div style={{ ...cardStyle, padding: 12 }}>
                <div style={{ fontWeight: 800, fontSize: 12, color: "var(--text-secondary)", textAlign: "center", marginBottom: 8, letterSpacing: ".06em", textTransform: "uppercase" }}>Ajtó Elölnézet</div>
                {(() => {
                  const dSVH = 460;
                  const dscX = (SVW - 120) / doorW;
                  const dscY = (dSVH - 100) / doorH;
                  const dsc = Math.min(dscX, dscY);
                  const dwa = doorW * dsc;
                  const dha = doorH * dsc;
                  const dx = 60 + (SVW - 120 - dwa) / 2;
                  const dy = 50 + (dSVH - 100 - dha) / 2;

                  // Handle hole pos calc
                  // hx1/hy1 = első furat, hx2/hy2 = második furat
                  // KOORDINÁTA RENDSZER: dx=bal él, dy=felső él
                  // handleMarginX = oldalról (balra: bal széltől, jobbra: jobb széltől, középre: nem releváns)
                  // handleMarginY = fentről
                  let hx1 = 0, hy1 = 0, hx2 = 0, hy2 = 0;
                  // Számított mm pozíciók méretezőhöz
                  let dimFromTop1 = 0, dimFromTop2 = 0;
                  let dimFromLeft1 = 0, dimFromRight2 = 0;
                  let showLeftDim = false, showRightDim = false, showCenterDimsH = false;

                  const hingesLeft = doorHanding === "left";
                  const hingeX = hingesLeft ? dx + 22.5 * dsc : dx + dwa - 22.5 * dsc;

                  if (handleOrient === "horizontal") {
                    // Y: mindkét furat ugyanazon a magasságon (fentről handleMarginY)
                    hy1 = dy + handleMarginY * dsc;
                    hy2 = hy1;
                    dimFromTop1 = handleMarginY;
                    if (!handleCenter) {
                      if (doorHanding === "right") { // hinges right, handle left
                        hx1 = dx + handleMarginX * dsc;
                        hx2 = hx1 + handlePitch * dsc;
                        dimFromLeft1 = handleMarginX;
                        showLeftDim = true;
                      } else { // doorHanding === "left", hinges left, handle right
                        hx2 = dx + dwa - handleMarginX * dsc;
                        hx1 = hx2 - handlePitch * dsc;
                        dimFromRight2 = handleMarginX;
                        showRightDim = true;
                      }
                    } else { // center
                      // Szimmetrikus: mindkét furat a középtől pitch/2 távolságra
                      hx1 = dx + dwa / 2 - (handlePitch * dsc) / 2;
                      hx2 = dx + dwa / 2 + (handlePitch * dsc) / 2;
                      // Balról: (doorW - pitch) / 2
                      dimFromLeft1 = Math.round((doorW - handlePitch) / 2);
                      dimFromRight2 = dimFromLeft1; // szimmetrikus
                      showCenterDimsH = true;
                    }
                  } else { // vertical
                    // X: mindkét furat ugyanazon az x pozíción
                    if (doorHanding === "right") { // handle left
                      hx1 = dx + handleMarginX * dsc;
                      dimFromLeft1 = handleMarginX;
                      showLeftDim = true;
                    } else { // handle right
                      hx1 = dx + dwa - handleMarginX * dsc;
                      dimFromRight2 = handleMarginX;
                      showRightDim = true;
                    }
                    hx2 = hx1;

                    if (!handleCenter) {
                      hy1 = dy + handleMarginY * dsc;
                      hy2 = hy1 + handlePitch * dsc;
                      dimFromTop1 = handleMarginY;
                      dimFromTop2 = handleMarginY + handlePitch;
                    } else {
                      hy1 = dy + dha / 2 - (handlePitch * dsc) / 2;
                      hy2 = dy + dha / 2 + (handlePitch * dsc) / 2;
                      dimFromTop1 = Math.round((doorH - handlePitch) / 2);
                      dimFromTop2 = dimFromTop1 + handlePitch;
                    }
                  }

                  // Hinges (jobbra, ha fogantyú balra vagy középen, és balra, ha fogantyú jobbra)
                  const hingeYs = [];
                  if (hingeCount >= 2) {
                    hingeYs.push(dy + hingeMargin * dsc);
                    hingeYs.push(dy + dha - hingeMargin * dsc);
                    const space = (doorH - 2 * hingeMargin) / (hingeCount - 1);
                    for (let i = 1; i < hingeCount - 1; i++) {
                      hingeYs.push(dy + (hingeMargin + i * space) * dsc);
                    }
                  }

                  return (
                    <ZoomableSvg width={SVW} height={dSVH}>
                      <svg width={SVW} height={dSVH} style={{ display: "block", margin: "0 auto" }}>
                        <rect width={SVW} height={dSVH} fill="#fff" rx={8} />

                        {/* Door board */}
                        <rect x={dx} y={dy} width={dwa} height={dha} fill="#eef4ff" stroke="#3a7acc" strokeWidth={1.5} rx={3} />

                        {/* Dimensions – szélesség felül */}
                        <line x1={dx} y1={dy - 14} x2={dx + dwa} y2={dy - 14} stroke="#3a7acc" strokeWidth={.8} />
                        <line x1={dx} y1={dy - 18} x2={dx} y2={dy - 6} stroke="#3a7acc" strokeWidth={.8} />
                        <line x1={dx + dwa} y1={dy - 18} x2={dx + dwa} y2={dy - 6} stroke="#3a7acc" strokeWidth={.8} />
                        <text x={dx + dwa / 2} y={dy - 20} textAnchor="middle" fontSize={9} fill="#1a3a5a" fontWeight="700" fontFamily="JetBrains Mono">{doorW}</text>

                        {/* Dimensions – magasság bal oldal */}
                        <line x1={dx - 14} y1={dy} x2={dx - 14} y2={dy + dha} stroke="#3a7acc" strokeWidth={.8} />
                        <line x1={dx - 18} y1={dy} x2={dx - 6} y2={dy} stroke="#3a7acc" strokeWidth={.8} />
                        <line x1={dx - 18} y1={dy + dha} x2={dx - 6} y2={dy + dha} stroke="#3a7acc" strokeWidth={.8} />
                        <text x={dx - 14} y={dy + dha / 2 - 4} textAnchor="middle" fontSize={9} fill="#1a3a5a" fontWeight="700" fontFamily="JetBrains Mono"
                          transform={`rotate(-90, ${dx - 14}, ${dy + dha / 2})`}>{doorH}</text>

                        {/* Handle */}
                        <line x1={hx1} y1={hy1} x2={hx2} y2={hy2} stroke="#333" strokeWidth={4} strokeLinecap="round" opacity={.6} />
                        <circle cx={hx1} cy={hy1} r={4} fill="none" stroke="#e46a3a" strokeWidth={1.5} />
                        <circle cx={hx1} cy={hy1} r={1.5} fill="#111" />
                        <circle cx={hx2} cy={hy2} r={4} fill="none" stroke="#e46a3a" strokeWidth={1.5} />
                        <circle cx={hx2} cy={hy2} r={1.5} fill="#111" />

                        {/* === FÜGGŐLEGES fogantyú méretezés === */}
                        {handleOrient === "vertical" && (() => {
                          const isRightSide = hx1 > dx + dwa / 2;
                          const dir = isRightSide ? -1 : 1;
                          const dimX = hx1 + dir * 16;

                          return (<>
                            {/* Fentről első furat */}
                            <line x1={dimX} y1={dy} x2={dimX} y2={hy1} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                            <line x1={dimX - 4} y1={dy} x2={dimX + 4} y2={dy} stroke="#e46a3a" strokeWidth={.7} />
                            <line x1={dimX - 4} y1={hy1} x2={dimX + 4} y2={hy1} stroke="#e46a3a" strokeWidth={.7} />
                            <text x={dimX} y={(dy + hy1) / 2 - 4} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono" transform={`rotate(-90, ${dimX}, ${(dy + hy1) / 2})`}>{dimFromTop1}</text>

                            {/* Pitch */}
                            <line x1={dimX} y1={hy1} x2={dimX} y2={hy2} stroke="#c04000" strokeWidth={.7} strokeDasharray="3,2" />
                            <line x1={dimX - 4} y1={hy2} x2={dimX + 4} y2={hy2} stroke="#c04000" strokeWidth={.7} />
                            <text x={dimX} y={(hy1 + hy2) / 2 - 4} textAnchor="middle" fontSize={8} fill="#c04000" fontWeight="700" fontFamily="JetBrains Mono" transform={`rotate(-90, ${dimX}, ${(hy1 + hy2) / 2})`}>{handlePitch}</text>

                            {/* Oldalról (vízszintes dimenzió) alulra helyezve */}
                            {showLeftDim && (<>
                              <line x1={dx} y1={hy2 + 16} x2={hx1} y2={hy2 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                              <line x1={dx} y1={hy2 + 12} x2={dx} y2={hy2 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <line x1={hx1} y1={hy2 + 12} x2={hx1} y2={hy2 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <text x={(dx + hx1) / 2} y={hy2 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromLeft1}</text>
                            </>)}
                            {showRightDim && (<>
                              <line x1={hx1} y1={hy2 + 16} x2={dx + dwa} y2={hy2 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                              <line x1={hx1} y1={hy2 + 12} x2={hx1} y2={hy2 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <line x1={dx + dwa} y1={hy2 + 12} x2={dx + dwa} y2={hy2 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <text x={(hx1 + dx + dwa) / 2} y={hy2 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromRight2}</text>
                            </>)}
                          </>);
                        })()}

                        {/* === VÍZSZINTES fogantyú méretezés === */}
                        {handleOrient === "horizontal" && (() => {
                          const yDimLine = hy1 - 16;
                          const centerHandleX = (hx1 + hx2) / 2;
                          return (<>
                            {/* Fentről Y dim, a fogantyú közepén */}
