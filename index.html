              <div style={{ display: "flex", gap: 6, marginBottom: 10, justifyContent: "center" }}>
                {[["front", "Szekrény"], ["side", "Oldallap"]].map(([id, label]) => (
                  <button key={id} onClick={() => setSvgView(id)} style={{ padding: "4px 12px", borderRadius: 7, fontSize: 11, cursor: "pointer", background: svgView === id ? GRN : "#ede8e0", color: svgView === id ? "#fff" : "#6a5a4a", border: "none", fontWeight: 700, fontFamily: "Inter" }}>{label}</button>
                ))}
              </div>
              <div style={{ display: "flex", gap: 6, marginBottom: 10, justifyContent: "center" }}>
                {[["panel", "\uD83D\uDCCF Szabad oldallap"], ["internal", "\uD83D\uDCE6 Összeszrelt"]].map(([id, label]) => (
                  <button key={id} onClick={() => setVizRef(id)} style={{ padding: "4px 10px", borderRadius: 7, fontSize: 10, cursor: "pointer", background: vizRef === id ? "#6a4a2a" : "#ede8e0", color: vizRef === id ? "#fff" : "#6a5a4a", border: "none", fontWeight: 700, fontFamily: "Inter" }}>{label}</button>
                ))}
              </div>
              <ZoomableSvg width={SVW} height={SVH}>
                <svg width={SVW} height={SVH} style={{ display: "block", margin: "0 auto" }}>
                  <defs><pattern id="grid" width={8} height={8} patternUnits="userSpaceOnUse"><path d="M 8 0 L 0 0 0 8" fill="none" stroke="#e0dbd0" strokeWidth=".4" /></pattern></defs>
                  <rect width={SVW} height={SVH} fill="#fff" rx={8} /><rect width={SVW} height={SVH} fill="url(#grid)" rx={8} />
                  {svgView === "front" ? (() => {
                    const x0 = PL, y0 = PT, cw = cabW;
                    return (<>
                      <rect x={x0} y={y0} width={cw} height={H * sc} fill="#e8d8b8" stroke={BRD} strokeWidth={1.5} rx={1} />
                      <rect x={x0} y={toY(t)} width={cw} height={t * sc} fill="#c4a560" stroke={BRD} strokeWidth={.5} />
                      <rect x={x0} y={y0} width={cw} height={t * sc} fill="#c4a560" stroke={BRD} strokeWidth={.5} />
                      {shelves.map(s => {
                        const dim = vizRef === "panel" ? s.drillCenter : R(s.intBot - d / 2); return (
                          <g key={s.idx}>
                            <rect x={x0} y={toY(s.panelBot + t)} width={cw} height={Math.max(2, t * sc)} fill={s.isFixed ? "#e09030" : "#d4a843"} stroke={BRD} strokeWidth={.5} opacity={.9} />
                            <text x={x0 + cw / 2} y={toY(s.panelBot + t) + Math.max(2, t * sc) / 2 + 3} textAnchor="middle" fontSize={8} fill="#fff" fontWeight="800" fontFamily="Inter">{s.idx}.</text>
                            <line x1={x0 + cw} y1={toY(s.drillCenter)} x2={x0 + cw + 5} y2={toY(s.drillCenter)} stroke={RED} strokeWidth={.8} />
                            <text x={x0 + cw + 7} y={toY(s.drillCenter) + 3.5} fontSize={8.5} fill={RED} fontWeight="700" fontFamily="JetBrains Mono">{dim}</text>
                          </g>);
                      })}
                      <line x1={x0 - 9} y1={y0} x2={x0 - 9} y2={y0 + H * sc} stroke="#666" strokeWidth={.8} />
                      <line x1={x0 - 13} y1={y0} x2={x0 - 5} y2={y0} stroke="#666" strokeWidth={.8} />
                      <line x1={x0 - 13} y1={y0 + H * sc} x2={x0 - 5} y2={y0 + H * sc} stroke="#666" strokeWidth={.8} />
                      <text x={x0 - 11} y={y0 + (H * sc) / 2 + 3} textAnchor="middle" fontSize={8} fill="#555" transform={`rotate(-90,${x0 - 11},${y0 + (H * sc) / 2})`}>{H} mm</text>
                      <text x={x0 - 1} y={y0 + H * sc + 10} textAnchor="end" fontSize={7} fill="#888">0</text>
                      <text x={x0 - 1} y={y0 - 3} textAnchor="end" fontSize={7} fill="#888">{H}</text>
                    </>);
                  })() : (() => {
                    const px = PL, pw = cabW;
                    return (<>
                      <rect x={px} y={PT} width={pw} height={H * sc} fill="#e8d8b8" stroke={BRD} strokeWidth={1.5} rx={1} />
                      <rect x={px} y={toY(t)} width={pw} height={t * sc} fill="#c4a560" stroke={BRD} strokeWidth={.5} />
                      <rect x={px} y={PT} width={pw} height={t * sc} fill="#c4a560" stroke={BRD} strokeWidth={.5} />
                      {shelves.map(s => {
                        const dim = vizRef === "panel" ? s.drillCenter : R(s.intBot - d / 2); return (
                          <g key={s.idx}>
                            <rect x={px} y={toY(s.panelBot + t)} width={pw} height={Math.max(2, t * sc)} fill={s.isFixed ? "#e09030" : "#d4a843"} stroke={BRD} strokeWidth={.5} opacity={.7} />
                            <text x={px + pw / 2} y={toY(s.panelBot + t) + Math.max(2, t * sc) / 2 + 3} textAnchor="middle" fontSize={8} fill="#fff" fontWeight="800" fontFamily="Inter">{s.idx}.</text>
                            <circle cx={px + pw * .25} cy={toY(s.drillCenter)} r={Math.max(2.5, d * sc * .5)} fill={RED} stroke="#880000" strokeWidth={.5} />
                            <circle cx={px + pw * .75} cy={toY(s.drillCenter)} r={Math.max(2.5, d * sc * .5)} fill={RED} stroke="#880000" strokeWidth={.5} opacity={.5} />
                            <line x1={px + pw} y1={toY(s.drillCenter)} x2={px + pw + 4} y2={toY(s.drillCenter)} stroke={RED} strokeWidth={.8} strokeDasharray="2,1.5" />
                            <text x={px + pw + 6} y={toY(s.drillCenter) + 3.5} fontSize={8.5} fill={RED} fontWeight="700" fontFamily="JetBrains Mono">{dim}</text>
                          </g>);
                      })}
                      <line x1={px - 9} y1={PT} x2={px - 9} y2={PT + H * sc} stroke="#666" strokeWidth={.8} />
                      <line x1={px - 13} y1={PT} x2={px - 5} y2={PT} stroke="#666" strokeWidth={.8} />
                      <line x1={px - 13} y1={PT + H * sc} x2={px - 5} y2={PT + H * sc} stroke="#666" strokeWidth={.8} />
                      <text x={px - 11} y={PT + (H * sc) / 2 + 3} textAnchor="middle" fontSize={8} fill="#555" transform={`rotate(-90,${px - 11},${PT + (H * sc) / 2})`}>{H} mm</text>
                      <text x={px - 1} y={PT + H * sc + 10} textAnchor="end" fontSize={7} fill="#888">0</text>
                      <text x={px - 1} y={PT - 3} textAnchor="end" fontSize={7} fill="#888">{H}</text>
                    </>);
                  })()}
                  <rect x={4} y={SVH - 78} width={SVW - 8} height={74} fill="white" rx={5} stroke="#e0dbd0" strokeWidth={1} />
                  <rect x={12} y={SVH - 68} width={10} height={7} fill="#c4a560" stroke={BRD} strokeWidth={.5} />
                  <text x={26} y={SVH - 62} fontSize={8} fill="#5a4a3a" fontFamily="Inter">Aljlap / Tetőlap ({t} mm)</text>
                  <rect x={12} y={SVH - 54} width={10} height={7} fill="#d4a843" stroke={BRD} strokeWidth={.5} />
                  <text x={26} y={SVH - 48} fontSize={8} fill="#5a4a3a" fontFamily="Inter">Polc ({t} mm)</text>
                  {svgView === "side" ? (<><circle cx={17} cy={SVH - 35} r={4} fill={RED} /><text x={26} y={SVH - 31} fontSize={8} fill="#5a4a3a" fontFamily="Inter">Furat ({"\u00d8"}{d})</text></>) : (<><line x1={12} y1={SVH - 33} x2={22} y2={SVH - 33} stroke={RED} strokeWidth={1.5} /><text x={26} y={SVH - 29} fontSize={8} fill="#5a4a3a" fontFamily="Inter">Furat közép</text></>)}
                  <text x={12} y={SVH - 14} fontSize={7.5} fill={RED} fontWeight="700" fontFamily="JetBrains Mono">{"\u2190"} furat közép (mm)</text>
                </svg>
              </ZoomableSvg>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    // MAIN APP WITH ROUTING
    // ═══════════════════════════════════════════
    function App({ user }) {
      const [startupMode, setStartupMode] = useState(null);
      const [page, setPage] = usePersistentState("App", "page", "home");

      useEffect(() => {
        if (!startupMode) {
          let hasSaved = false;
          for (let i = 0; i < localStorage.length; i++) {
            if (localStorage.key(i) && localStorage.key(i).startsWith('appState_')) {
              hasSaved = true; break;
            }
          }
          if (hasSaved) {
            setStartupMode('asking');
          } else {
            window.__APP_STARTUP_MODE__ = 'default';
            setStartupMode('default');
          }
        }
      }, [startupMode]);

      if (startupMode === 'asking') {
        return <StartupPrompt onSelect={(mode) => {
          window.__APP_STARTUP_MODE__ = mode;
          setStartupMode(mode);
        }} />;
      }
      if (!startupMode) return null;

      const handleSignOut = async () => {
        if (confirm("Biztosan ki szeretnél jelentkezni?")) {
          const keys = Object.keys(localStorage).filter(k => k.startsWith('appState_') || k.startsWith('appDefault_'));
          keys.forEach(k => localStorage.removeItem(k));
          window.__APP_STARTUP_MODE__ = undefined;
          await auth.signOut();
        }
      };
      const saveDefaults = () => {
        if (confirm("Biztosan elmented a jelenlegi beállításokat alapértelmezettként?")) {
          const batch = db.batch();
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith('appState_')) {
              const val = localStorage.getItem(key);
              const defKey = key.replace('appState_', 'appDefault_');
              localStorage.setItem(defKey, val);
              if (currentUser) {
                try {
                  const ref = db.collection('users').doc(currentUser.uid).collection('state').doc(defKey);
                  batch.set(ref, { v: JSON.parse(val) });
                } catch(e) {}
              }
            }
          }
          if (currentUser) batch.commit().catch(() => {});
          alert("Sikeresen mentve alapértelmezettként!");
        }
      };
      const pageNames = { home: "Főoldal", shelf: "Polckiosztás", drawer: "Fiókkiosztás", kitchen: "Konyhabútor", simple: "Egyszerű szekrény", sliding: "Tolóajtós szekrény" };
      const pageColors = { home: "var(--accent)", shelf: GRN, drawer: BLUE, kitchen: BRN, simple: AMB, sliding: "#78716C" };
      return (
        <div style={{ fontFamily: "Inter, sans-serif", background: "var(--bg)", minHeight: "100vh" }}>
          <style>{FONTS}</style>
          <div style={{ background: "#1C1917", color: "#fff", padding: "0 24px", boxShadow: "0 1px 3px rgba(0,0,0,.2)", borderBottom: `3px solid ${pageColors[page]}` }}>
            <div style={{ maxWidth: 1200, margin: "0 auto", display: "flex", alignItems: "center", gap: 12, height: 56 }}>
              {page !== "home" && (
                <button onClick={() => setPage("home")} style={{ background: "rgba(255,255,255,.08)", border: "1px solid rgba(255,255,255,.1)", borderRadius: 8, padding: "6px 14px", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "Inter, sans-serif" }}
                  onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,.15)"} onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,.08)"}>{"\u2190"} Főoldal</button>
              )}
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 17, fontWeight: 700, letterSpacing: "-.01em" }}>{page === "home" ? "Bútortervező Kalkulátor" : pageNames[page]}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                {user?.photoURL && <img src={user.photoURL} style={{ width: 28, height: 28, borderRadius: "50%", border: "2px solid rgba(255,255,255,.3)" }} referrerPolicy="no-referrer" />}
                <span style={{ fontSize: 12, color: "rgba(255,255,255,.6)", maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", display: window.innerWidth < 500 ? "none" : "block" }}>{user?.displayName || user?.email}</span>
                <span style={{ fontSize: 11, color: "rgba(255,255,255,.6)", fontFamily: "JetBrains Mono, monospace", letterSpacing: ".03em", background: "rgba(255,255,255,.08)", padding: "2px 7px", borderRadius: 5 }}>v{VERSION}</span>
                <button onClick={handleSignOut} style={{ background: "rgba(255,255,255,.08)", border: "1px solid rgba(255,255,255,.15)", borderRadius: 8, padding: "5px 10px", color: "rgba(255,255,255,.8)", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "Inter, sans-serif" }}
                  onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,.18)"} onMouseLeave={e => e.currentTarget.style.background = "rgba(255,255,255,.08)"}>Kilépés</button>
              </div>
            </div>
          </div>
          {page === "home" && <HomePage onNavigate={setPage} />}
          {page === "shelf" && <ShelfCalc />}
          {page === "drawer" && <DrawerCalc onBack={() => setPage("home")} />}
          {page === "kitchen" && <CorpusPlanner variant="kitchen" />}
          {page === "simple" && <CorpusPlanner variant="simple" />}
          {page === "sliding" && <SlidingPlanner />}
        </div>
      );
    }

    // ─── Login képernyő ───────────────────────────────────────────────────────
    function LoginScreen() {
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const handleLogin = async () => {
        setLoading(true); setError(null);
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await auth.signInWithPopup(provider);
        } catch(e) {
          setError("Bejelentkezés sikertelen. Próbáld újra.");
          setLoading(false);
        }
      };
      return (
        <div style={{ minHeight: "100vh", background: "#1C1917", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>
          <style>{FONTS}</style>
          <div style={{ background: "#fff", borderRadius: 20, padding: 48, maxWidth: 420, width: "100%", margin: "0 20px", boxShadow: "0 20px 60px rgba(0,0,0,0.4)" }}>
            <div style={{ textAlign: "center", marginBottom: 32 }}>
              <div style={{ fontSize: 52, marginBottom: 12 }}>🪑</div>
              <h1 style={{ fontSize: 26, fontWeight: 800, color: "#1C1917", margin: "0 0 8px", fontFamily: "Inter, sans-serif" }}>Squadra</h1>
              <p style={{ color: "#78716C", fontSize: 15, margin: 0 }}>Bútortervező Kalkulátor</p>
            </div>
            <button onClick={handleLogin} disabled={loading}
              style={{ width: "100%", padding: "14px 20px", background: "#fff", border: "2px solid #e5e7eb", borderRadius: 12, fontSize: 15, fontWeight: 600, cursor: loading ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 12, color: "#374151", opacity: loading ? 0.7 : 1, transition: "border-color 0.15s" }}
              onMouseEnter={e => { if (!loading) e.currentTarget.style.borderColor = "#4285f4"; }}
              onMouseLeave={e => e.currentTarget.style.borderColor = "#e5e7eb"}>
              <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/>
                <path fill="#34A853" d="M6.3 14.7l7 5.1C15.1 16.2 19.2 13 24 13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 16.3 2 9.7 7.4 6.3 14.7z"/>
                <path fill="#FBBC05" d="M24 46c5.5 0 10.5-1.9 14.3-5l-6.6-5.4C29.7 37.3 27 38 24 38c-6 0-11.1-4-13-9.4l-7 5.4C7.7 41.6 15.3 46 24 46z"/>
                <path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-.8 2.4-2.4 4.4-4.5 5.8l6.6 5.4c3.9-3.6 6.1-8.9 6.1-15.2 0-1.3-.2-2.7-.5-4.5z"/>
              </svg>
              {loading ? "Bejelentkezés..." : "Bejelentkezés Google-fiókkal"}
            </button>
            {error && <p style={{ color: "#dc2626", fontSize: 13, textAlign: "center", marginTop: 12, marginBottom: 0 }}>{error}</p>}
          </div>
        </div>
      );
    }

    // ─── Root: auth állapot kezelés ───────────────────────────────────────────
    function Root() {
      const [authState, setAuthState] = useState('loading');
      const [user, setUser] = useState(null);

      useEffect(() => {
        return auth.onAuthStateChanged(async (u) => {
          if (u) {
            currentUser = u;
            setAuthState('syncing');
            try { await syncFromFirestore(u.uid); } catch(e) {}
            setUser(u);
            setAuthState('ready');
          } else {
            currentUser = null;
            setUser(null);
            setAuthState('loggedOut');
          }
        });
      }, []);

      if (authState === 'loading' || authState === 'syncing') {
        return (
          <div style={{ minHeight: "100vh", background: "#1C1917", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16, fontFamily: "Inter, sans-serif" }}>
            <style>{`${FONTS} @keyframes spin { to { transform: rotate(360deg); } }`}</style>
            <div style={{ width: 36, height: 36, border: "3px solid rgba(255,255,255,.15)", borderTopColor: "#fff", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
            <div style={{ color: "rgba(255,255,255,.5)", fontSize: 14 }}>{authState === 'syncing' ? 'Adatok szinkronizálása...' : 'Betöltés...'}</div>
          </div>
        );
      }
      if (authState === 'loggedOut') return <LoginScreen />;
      return <App user={user} />;
    }
    // ─────────────────────────────────────────────────────────────────────────

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Root />);
  </script>
</body>

</html>
