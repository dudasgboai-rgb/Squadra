                            <line x1={centerHandleX - 4} y1={hy1} x2={centerHandleX + 4} y2={hy1} stroke="#e46a3a" strokeWidth={.7} />
                            <text x={centerHandleX} y={(dy + hy1) / 2 - 4} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono" transform={`rotate(-90, ${centerHandleX}, ${(dy + hy1) / 2})`}>{dimFromTop1}</text>

                            {/* Pitch dim (vízszintes) */}
                            <line x1={hx1} y1={yDimLine} x2={hx2} y2={yDimLine} stroke="#c04000" strokeWidth={.7} strokeDasharray="3,2" />
                            <line x1={hx1} y1={yDimLine - 4} x2={hx1} y2={yDimLine + 4} stroke="#c04000" strokeWidth={.7} />
                            <line x1={hx2} y1={yDimLine - 4} x2={hx2} y2={yDimLine + 4} stroke="#c04000" strokeWidth={.7} />
                            <text x={(hx1 + hx2) / 2} y={yDimLine - 4} textAnchor="middle" fontSize={8} fill="#c04000" fontWeight="700" fontFamily="JetBrains Mono">{handlePitch}</text>

                            {/* Balról: első furat */}
                            {showLeftDim && (<>
                              <line x1={dx} y1={hy1 + 16} x2={hx1} y2={hy1 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                              <line x1={dx} y1={hy1 + 12} x2={dx} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <line x1={hx1} y1={hy1 + 12} x2={hx1} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <text x={(dx + hx1) / 2} y={hy1 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromLeft1}</text>
                            </>)}
                            {/* Jobbról: második furat */}
                            {showRightDim && (<>
                              <line x1={hx2} y1={hy1 + 16} x2={dx + dwa} y2={hy1 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                              <line x1={hx2} y1={hy1 + 12} x2={hx2} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <line x1={dx + dwa} y1={hy1 + 12} x2={dx + dwa} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <text x={(hx2 + dx + dwa) / 2} y={hy1 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromRight2}</text>
                            </>)}
                            {/* Középre: mindkét szélről, szépen egy vonalban */}
                            {showCenterDimsH && (<>
                              <line x1={dx} y1={hy1 + 16} x2={hx1} y2={hy1 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                              <line x1={dx} y1={hy1 + 12} x2={dx} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <line x1={hx1} y1={hy1 + 12} x2={hx1} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <text x={(dx + hx1) / 2} y={hy1 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromLeft1}</text>

                              <line x1={hx2} y1={hy1 + 16} x2={dx + dwa} y2={hy1 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" />
                              <line x1={hx2} y1={hy1 + 12} x2={hx2} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <line x1={dx + dwa} y1={hy1 + 12} x2={dx + dwa} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} />
                              <text x={(hx2 + dx + dwa) / 2} y={hy1 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromRight2}</text>
                            </>)}
                          </>);
                        })()}

                        {/* Hinges */}
                        {hingeYs.map((hy, idx) => (
                          <g key={idx}>
                            <circle cx={hingeX} cy={hy} r={17.5 * dsc} fill="#fff" stroke="#888" strokeWidth={1.5} />
                            <circle cx={hingeX} cy={hy} r={1.5} fill="#555" />
                            {idx === 0 && ( // Draw margin dimension for top hinge
                              <g>
                                <line x1={hingeX} y1={dy} x2={hingeX} y2={hy} stroke="#8a7a6a" strokeWidth={.6} strokeDasharray="2,2" />
                                <text x={hingeX + (hingesLeft ? 6 : -6)} y={(dy + hy) / 2 + 3} textAnchor={hingesLeft ? "start" : "end"} fontSize={8} fill="#8a7a6a" fontWeight="700" fontFamily="JetBrains Mono">{Math.round(hingeMargin)}</text>
                              </g>
                            )}
                            {idx === hingeYs.length - 1 && ( // Draw margin dimension for bot hinge
                              <g>
                                <line x1={hingeX} y1={dy + dha} x2={hingeX} y2={hy} stroke="#8a7a6a" strokeWidth={.6} strokeDasharray="2,2" />
                                <text x={hingeX + (hingesLeft ? 6 : -6)} y={(dy + dha + hy) / 2 + 3} textAnchor={hingesLeft ? "start" : "end"} fontSize={8} fill="#8a7a6a" fontWeight="700" fontFamily="JetBrains Mono">{Math.round(hingeMargin)}</text>
                              </g>
                            )}
                          </g>
                        ))}
                        <text x={hingeX + (hingesLeft ? 20 : -20)} y={hingeYs[0] + 3} textAnchor={hingesLeft ? "start" : "end"} fontSize={8} fill="#555" fontWeight="600" fontFamily="Inter">35mm pánthely</text>

                      </svg>
                    </ZoomableSvg>
                  );
                })()}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════
    // UPPER 1-DOOR CABINET CALCULATOR
    // ═══════════════════════════════════════════
    function Upper1DoorCalc({ params, boardColors, edgeBandOptions, partDefaults, onBack }) {
      const [W, setW] = usePersistentState("Upper1DoorCalc", "W", 600);
      const [customH, setCustomH] = usePersistentState("Upper1DoorCalc", "customH", null);
      const [shelfCount, setShelfCount] = usePersistentState("Upper1DoorCalc", "shelfCount", 1);
      const [backT, setBackT] = usePersistentState("Upper1DoorCalc", "backT", 3);
      const [bottomPos, setBottomPos] = usePersistentState("Upper1DoorCalc", "bottomPos", "between");
      const [topPos, setTopPos] = usePersistentState("Upper1DoorCalc", "topPos", "between");
      const [doorGapTop, setDoorGapTop] = usePersistentState("Upper1DoorCalc", "doorGapTop", params.upperDoorGapTop);
      const [doorGapBottom, setDoorGapBottom] = usePersistentState("Upper1DoorCalc", "doorGapBottom", params.upperDoorGapBottom);
      const [doorGapSide, setDoorGapSide] = usePersistentState("Upper1DoorCalc", "doorGapSide", params.upperDoorGapSide);
      const [shelfSetback, setShelfSetback] = usePersistentState("Upper1DoorCalc", "shelfSetback", params.shelfSetback);
      const [splitSides, setSplitSides] = usePersistentState("Upper1DoorCalc", "splitSides", false);
      const [swappedParts, setSwappedParts] = usePersistentState("Upper1DoorCalc", "swappedParts", {});
      const [handlePitch, setHandlePitch] = usePersistentState("Upper1DoorCalc", "handlePitch", params.handlePitch);
      const [handleOrient, setHandleOrient] = usePersistentState("Upper1DoorCalc", "handleOrient", params.handleOrient);
      const [handleCenter, setHandleCenter] = usePersistentState("Upper1DoorCalc", "handleCenter", params.handleCenter);
      const [doorHanding, setDoorHanding] = usePersistentState("Upper1DoorCalc", "doorHanding", "left");
      const [handleMarginX, setHandleMarginX] = usePersistentState("Upper1DoorCalc", "handleMarginX", params.handleMarginX);
      const [handleMarginY, setHandleMarginY] = usePersistentState("Upper1DoorCalc", "handleMarginY", params.handleMarginY);
      const [hingeMargin, setHingeMargin] = usePersistentState("Upper1DoorCalc", "hingeMargin", params.hingeMargin);
      const [doorMaterial, setDoorMaterial] = usePersistentState("Upper1DoorCalc", "doorMaterial", "butorlap");
      const [mdfThickness, setMdfThickness] = usePersistentState("Upper1DoorCalc", "mdfThickness", 18);

      const bt = params.boardThickness;
      const autoTotalCabinetH = params.upperHeight;
      const totalCabinetH = customH !== null ? customH : autoTotalCabinetH;
      const corpusFrameH = totalCabinetH;

      let sideH = corpusFrameH;
      if (bottomPos === "under") sideH -= bt;
      if (topPos === "over") sideH -= bt;

      const internalW = W - 2 * bt;
      let internalH = sideH;
      if (bottomPos === "between") internalH -= bt;
      if (topPos === "between") internalH -= bt;

      const doorH = corpusFrameH - doorGapTop - doorGapBottom;
      const doorW = W - 2 * doorGapSide;
      const backPanelW = W - params.backPanelGap;
      const backPanelH = corpusFrameH - params.backPanelGap;
      const shelfDepth = params.upperDepth - shelfSetback;
      const bottomPanelL = bottomPos === "between" ? internalW : W;
      const topPanelL = topPos === "between" ? internalW : W;

      const BOARD_KG_PER_M2 = doorMaterial === "mdf" ? (mdfThickness * 0.7) : 11.8;
      const doorAreaM2 = (doorH / 1000) * (doorW / 1000);
      const doorWeightKg = R(doorAreaM2 * BOARD_KG_PER_M2, 2);
      const hingesByHeight = doorH <= 900 ? 2 : doorH <= 1600 ? 3 : doorH <= 2000 ? 4 : Math.max(2, Math.ceil(doorH / 500));
      const hingesByWeight = doorWeightKg <= 6 ? 2 : doorWeightKg <= 12 ? 3 : doorWeightKg <= 17 ? 4 : doorWeightKg <= 22 ? 5 : Math.max(2, Math.ceil(doorWeightKg / 5));
      const hingeCount = Math.max(hingesByHeight, hingesByWeight);

      const getDef = (id) => partDefaults.find(p => p.id === id) || { colorIdx: 0, edges: [e04, null, null, null] };
      const sideDef = getDef("upper_side");
      const bottomDef = getDef("upper_bottom");
      const topDef = getDef("upper_top");
      const backDef = getDef("upper_back");
      const doorDef = getDef("upper_door");
      const shelfDef = getDef("upper_shelf");

      const sideNote = () => {
        let n = [];
        if (bottomPos === "under") n.push("Lent rááll");
        if (topPos === "over") n.push("Fent alááll");
        return n.join(", ");
      };

      const defaultParts = [
        ...(splitSides ? [
          { id: "side_l", name: "Oldallap (bal)", qty: 1, l: sideH, w: params.upperDepth, t: bt, note: sideNote(), colorIdx: sideDef.colorIdx, edges: [...sideDef.edges] },
          { id: "side_r", name: "Oldallap (jobb)", qty: 1, l: sideH, w: params.upperDepth, t: bt, note: sideNote(), colorIdx: sideDef.colorIdx, edges: [...sideDef.edges] },
        ] : [
          { id: "side", name: "Oldallap", qty: 2, l: sideH, w: params.upperDepth, t: bt, note: sideNote(), colorIdx: sideDef.colorIdx, edges: [...sideDef.edges] },
        ]),
        {
          id: "bottom", name: "Fenéklap", qty: 1, l: bottomPanelL, w: params.upperDepth, t: bt,
          note: bottomPos === "between" ? "Oldalfalak között" : "Oldalfalak alatt",
          colorIdx: bottomDef.colorIdx,
          edges: bottomPos === "between" ? [...bottomDef.edges] : [bottomDef.edges[0], bottomDef.edges[1], bottomDef.edges[0] || e04, bottomDef.edges[3]]
        },
        {
          id: "top", name: "Tetőlap", qty: 1, l: topPanelL, w: params.upperDepth, t: bt,
          note: topPos === "between" ? "Oldalfalak között" : "Oldalfalak felett",
          colorIdx: topDef.colorIdx,
          edges: topPos === "between" ? [...topDef.edges] : [topDef.edges[0], topDef.edges[1], topDef.edges[0] || e04, topDef.edges[3]]
        },
        { id: "back", name: "Hátlap", qty: 1, l: backPanelW, w: backPanelH, t: backT, note: "HDF (" + params.backPanelGap + " mm behúzás)", colorIdx: backDef.colorIdx, edges: [...backDef.edges] },
        { id: "door", name: "Ajtólap", qty: 1, l: doorH, w: doorW, t: bt, note: R(doorWeightKg, 1) + " kg — Blum " + hingeCount + " pár pánt", colorIdx: doorDef.colorIdx, edges: [...doorDef.edges] },
        ...Array.from({ length: shelfCount }, (_, i) => ({
          id: "shelf_" + i, name: "Polc" + (shelfCount > 1 ? " " + (i + 1) : ""),
          qty: 1, l: internalW, w: shelfDepth, t: bt, note: "Állítható", colorIdx: shelfDef.colorIdx, edges: [...shelfDef.edges]
        })),
      ];

      const toggleSwap = (id) => setSwappedParts(prev => ({ ...prev, [id]: !prev[id] }));
      const getDisplayDims = (p) => { const swapped = swappedParts[p.id]; return swapped ? { l: p.w, w: p.l } : { l: p.l, w: p.w }; };

      const [partOverrides, setPartOverrides] = usePersistentState("Upper1DoorCalc", "partOverrides", {});
      const getPart = (p) => { const ov = partOverrides[p.id] || {}; return { ...p, colorIdx: ov.colorIdx !== undefined ? ov.colorIdx : p.colorIdx, edges: ov.edges || p.edges }; };
      const setPartOverride = (id, key, val) => setPartOverrides(prev => ({ ...prev, [id]: { ...prev[id], [key]: val } }));
      const parts = defaultParts.map(getPart);

      const thickLabels = ["0.4", "2"];
      const edgeBg = (e) => { if (!e) return "#e0dbd0"; const colors = ["#b8d0e8", "#e8c8a0"]; return colors[e.o] || "#ddd"; };
      const cycleEdgeColor = (e) => { if (!e) return { o: 0, t: edgeBandOptions[0]?.defT || 0 }; if (e.o < edgeBandOptions.length - 1) return { ...e, o: e.o + 1 }; return null; };
      const toggleEdgeThick = (e) => { if (!e) return { o: 0, t: 1 }; return { ...e, t: e.t === 0 ? 1 : 0 }; };

      const SVW = 370, SVH = 480;
      const padL = 80, padR = 80, padT = 36, padB = 40;
      const drawW = SVW - padL - padR; const drawH = SVH - padT - padB;
      const scX = drawW / W; const scY = drawH / totalCabinetH;
      const sc = Math.min(scX, scY);
      const cw = W * sc; const ch = totalCabinetH * sc;
      const cx = padL + (drawW - cw) / 2; const cy = padT + (drawH - ch) / 2;
      const yFromBot = (mm) => cy + ch - mm * sc;
      const cabinetTopY = cy; const cabinetBotY = cy + ch;
      const sideTopY = topPos === "over" ? cabinetTopY + bt * sc : cabinetTopY;
      const sideBotY = bottomPos === "under" ? cabinetBotY - bt * sc : cabinetBotY;
      const sideDrawH = sideBotY - sideTopY;

      return (
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: 16 }}>
          <button onClick={onBack} style={{ padding: "6px 16px", borderRadius: 8, background: "rgba(90,42,10,.1)", border: "1.5px solid rgba(90,42,10,.2)", color: BRN, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "Inter, sans-serif", marginBottom: 16 }}>{"←"} Vissza a szekrénytípusokhoz</button>
          <div style={{ display: "grid", gridTemplateColumns: "340px 1fr", gap: 20, alignItems: "start" }}>
            <div>
              <div style={cardStyle}>
                <div style={{ fontWeight: 800, fontSize: 14, color: BRN, marginBottom: 12 }}>{"🚪"} 1 ajtós felső szekrény</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                    Szekrény szélessége
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={W} min={200} onChange={e => setW(e.target.value === "" ? "" : +e.target.value)} style={{ ...inputStyle, fontSize: 14 }} />
                      <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>mm</span>
                    </div>
                    <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                      {[300, 450, 600, 800, 900].map(w => (
                        <button key={w} onClick={e => { e.preventDefault(); setW(w); }} style={{ padding: "2px 8px", borderRadius: 5, fontSize: 11, cursor: "pointer", background: W === w ? "#5a2a0a" : "#e8dfd0", color: W === w ? "#fff" : "#5a4a3a", border: W === w ? "1.5px solid #5a2a0a" : "1.5px solid #c0b090", fontWeight: 700, fontFamily: "JetBrains Mono, monospace", transition: "all .15s" }}>{w}</button>
                      ))}
                    </div>
                  </label>
                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span>Szekrény magassága</span>
                      {customH !== null && (<button onClick={() => setCustomH(null)} style={{ fontSize: 9, padding: "1px 6px", borderRadius: 5, cursor: "pointer", background: "#f0e0d0", border: "1px solid #c0a080", color: BRN, fontWeight: 700 }}>{"↩"} Auto ({autoTotalCabinetH} mm)</button>)}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={customH !== null ? customH : autoTotalCabinetH} min={100} onChange={e => setCustomH(e.target.value === "" ? "" : +e.target.value)} style={{ ...inputStyle, fontSize: 14, borderColor: customH !== null ? AMB : "#ddd" }} />
                      <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>mm</span>
                    </div>
                    {customH === null && <span style={{ fontSize: 9, color: "#aaa" }}>Számított: {autoTotalCabinetH} mm (módosítható)</span>}
                  </label>
                  {[
                    { label: "Hátlap vastagság", val: backT, set: setBackT, min: 1, unit: "mm" },
                    { label: "Polcok száma", val: shelfCount, set: setShelfCount, min: 0, unit: "db" },
                    { label: "Polc behúzás", val: shelfSetback, set: setShelfSetback, min: 0, unit: "mm" },
                  ].map(f => (
                    <label key={f.label} style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                      {f.label}
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <input type="number" value={f.val} min={f.min} onChange={e => f.set(e.target.value === "" ? "" : +e.target.value)} style={{ ...inputStyle, fontSize: 14 }} />
                        <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>{f.unit}</span>
                      </div>
                    </label>
                  ))}
                </div>
                <div style={{ marginTop: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".05em" }}>Ajtó rések</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
                    {[{ label: "Alul", val: doorGapBottom, set: setDoorGapBottom }, { label: "Felül", val: doorGapTop, set: setDoorGapTop }, { label: "Oldalt", val: doorGapSide, set: setDoorGapSide }].map(f => (
                      <label key={f.label} style={{ display: "flex", flexDirection: "column", gap: 2, fontSize: 11, color: "var(--text-secondary)", fontWeight: 600 }}>
                        {f.label}
                        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                          <input type="number" value={f.val} min={0} onChange={e => f.set(e.target.value === "" ? "" : +e.target.value)} style={{ ...inputStyle, fontSize: 13, padding: "4px 6px" }} />
                          <span style={{ fontSize: 10, color: "#aaa" }}>mm</span>
                        </div>
                      </label>
                    ))}
                  </div>
                </div>
                <div style={{ marginTop: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase", letterSpacing: ".05em" }}>Fenéklap pozíciója</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {[
                      { id: "between", label: "Oldalfalak között", svg: <svg width="36" height="22" viewBox="0 0 36 22" fill="currentColor" style={{flexShrink:0,marginTop:2}}><rect x="0" y="0" width="5" height="22"/><rect x="31" y="0" width="5" height="22"/><rect x="6" y="16" width="24" height="5"/></svg>, desc: "Fenéklap a két oldallap közé kerül" },
                      { id: "under", label: "Oldalfalak alatt", svg: <svg width="36" height="22" viewBox="0 0 36 22" fill="currentColor" style={{flexShrink:0,marginTop:2}}><rect x="0" y="0" width="5" height="15"/><rect x="31" y="0" width="5" height="15"/><rect x="0" y="16" width="36" height="6"/></svg>, desc: "Fenéklap az oldallapok alatt, azok ráállnak" },
                    ].map(opt => (
                      <button key={opt.id} onClick={() => setBottomPos(opt.id)} style={{ padding: "8px 12px", borderRadius: 8, fontSize: 12, cursor: "pointer", background: bottomPos === opt.id ? "#5a2a0a" : "#f4efe8", color: bottomPos === opt.id ? "#fff" : "#5a4a3a", border: bottomPos === opt.id ? "2px solid #5a2a0a" : "2px solid #d8d0c0", fontWeight: 700, fontFamily: "Inter, sans-serif", textAlign: "left", transition: "all .15s", display: "flex", alignItems: "flex-start", gap: 10 }}>
                        {opt.svg}<div>{opt.label}<div style={{ fontSize: 10, fontWeight: 400, opacity: .7, marginTop: 2 }}>{opt.desc}</div></div>
                      </button>
                    ))}
                  </div>

                    if (doorHanding === "right") { hx1 = dx + handleMarginX * dsc; dimFromLeft1 = handleMarginX; showLeftDim = true; }
                    else { hx1 = dx + dwa - handleMarginX * dsc; dimFromRight2 = handleMarginX; showRightDim = true; }
                    hx2 = hx1;
                    if (!handleCenter) { hy1 = dy + handleMarginY * dsc; hy2 = hy1 + handlePitch * dsc; dimFromTop1 = handleMarginY; dimFromTop2 = handleMarginY + handlePitch; }
                    else { hy1 = dy + dha / 2 - (handlePitch * dsc) / 2; hy2 = dy + dha / 2 + (handlePitch * dsc) / 2; dimFromTop1 = Math.round((doorH - handlePitch) / 2); dimFromTop2 = dimFromTop1 + handlePitch; }
                  }
                  const hingeYs = [];
                  if (hingeCount >= 2) { hingeYs.push(dy + hingeMargin * dsc); hingeYs.push(dy + dha - hingeMargin * dsc); const space = (doorH - 2 * hingeMargin) / (hingeCount - 1); for (let i = 1; i < hingeCount - 1; i++) hingeYs.push(dy + (hingeMargin + i * space) * dsc); }
                  return (
                    <ZoomableSvg width={SVW} height={dSVH}>
                      <svg width={SVW} height={dSVH} style={{ display: "block", margin: "0 auto" }}>

                        <line x1={dx - 14} y1={dy} x2={dx - 14} y2={dy + dha} stroke="#3a7acc" strokeWidth={.8} /><line x1={dx - 18} y1={dy} x2={dx - 6} y2={dy} stroke="#3a7acc" strokeWidth={.8} /><line x1={dx - 18} y1={dy + dha} x2={dx - 6} y2={dy + dha} stroke="#3a7acc" strokeWidth={.8} />
                        <text x={dx - 14} y={dy + dha / 2 - 4} textAnchor="middle" fontSize={9} fill="#1a3a5a" fontWeight="700" fontFamily="JetBrains Mono" transform={`rotate(-90, ${dx - 14}, ${dy + dha / 2})`}>{doorH}</text>

                        {handleOrient === "vertical" && (() => {

                            <text x={dimX} y={(hy1 + hy2) / 2 - 4} textAnchor="middle" fontSize={8} fill="#c04000" fontWeight="700" fontFamily="JetBrains Mono" transform={`rotate(-90, ${dimX}, ${(hy1 + hy2) / 2})`}>{handlePitch}</text>
                            {showLeftDim && (<><line x1={dx} y1={hy2 + 16} x2={hx1} y2={hy2 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" /><line x1={dx} y1={hy2 + 12} x2={dx} y2={hy2 + 20} stroke="#e46a3a" strokeWidth={.7} /><line x1={hx1} y1={hy2 + 12} x2={hx1} y2={hy2 + 20} stroke="#e46a3a" strokeWidth={.7} /><text x={(dx + hx1) / 2} y={hy2 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromLeft1}</text></>)}

                          </>);
                        })()}
                        {handleOrient === "horizontal" && (() => {
                          const yDimLine = hy1 - 16; const centerHandleX = (hx1 + hx2) / 2;
                          return (<>
                            <line x1={centerHandleX} y1={dy} x2={centerHandleX} y2={hy1} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" /><line x1={centerHandleX - 4} y1={dy} x2={centerHandleX + 4} y2={dy} stroke="#e46a3a" strokeWidth={.7} /><line x1={centerHandleX - 4} y1={hy1} x2={centerHandleX + 4} y2={hy1} stroke="#e46a3a" strokeWidth={.7} />
                            <text x={centerHandleX} y={(dy + hy1) / 2 - 4} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono" transform={`rotate(-90, ${centerHandleX}, ${(dy + hy1) / 2})`}>{dimFromTop1}</text>
                            <line x1={hx1} y1={yDimLine} x2={hx2} y2={yDimLine} stroke="#c04000" strokeWidth={.7} strokeDasharray="3,2" /><line x1={hx1} y1={yDimLine - 4} x2={hx1} y2={yDimLine + 4} stroke="#c04000" strokeWidth={.7} /><line x1={hx2} y1={yDimLine - 4} x2={hx2} y2={yDimLine + 4} stroke="#c04000" strokeWidth={.7} />
                            <text x={(hx1 + hx2) / 2} y={yDimLine - 4} textAnchor="middle" fontSize={8} fill="#c04000" fontWeight="700" fontFamily="JetBrains Mono">{handlePitch}</text>
                            {showLeftDim && (<><line x1={dx} y1={hy1 + 16} x2={hx1} y2={hy1 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" /><line x1={dx} y1={hy1 + 12} x2={dx} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} /><line x1={hx1} y1={hy1 + 12} x2={hx1} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} /><text x={(dx + hx1) / 2} y={hy1 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromLeft1}</text></>)}
                            {showRightDim && (<><line x1={hx2} y1={hy1 + 16} x2={dx + dwa} y2={hy1 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" /><line x1={hx2} y1={hy1 + 12} x2={hx2} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} /><line x1={dx + dwa} y1={hy1 + 12} x2={dx + dwa} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} /><text x={(hx2 + dx + dwa) / 2} y={hy1 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromRight2}</text></>)}
                            {showCenterDimsH && (<><line x1={dx} y1={hy1 + 16} x2={hx1} y2={hy1 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" /><line x1={dx} y1={hy1 + 12} x2={dx} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} /><line x1={hx1} y1={hy1 + 12} x2={hx1} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} /><text x={(dx + hx1) / 2} y={hy1 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromLeft1}</text><line x1={hx2} y1={hy1 + 16} x2={dx + dwa} y2={hy1 + 16} stroke="#e46a3a" strokeWidth={.7} strokeDasharray="3,2" /><line x1={hx2} y1={hy1 + 12} x2={hx2} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} /><line x1={dx + dwa} y1={hy1 + 12} x2={dx + dwa} y2={hy1 + 20} stroke="#e46a3a" strokeWidth={.7} /><text x={(hx2 + dx + dwa) / 2} y={hy1 + 12} textAnchor="middle" fontSize={8} fill="#e46a3a" fontWeight="700" fontFamily="JetBrains Mono">{dimFromRight2}</text></>)}
                          </>);
                        })()}
                        {hingeYs.map((hy, idx) => (
                          <g key={idx}>
                            <circle cx={hingeX} cy={hy} r={17.5 * dsc} fill="#fff" stroke="#888" strokeWidth={1.5} /><circle cx={hingeX} cy={hy} r={1.5} fill="#555" />
                            {idx === 0 && (<g><line x1={hingeX} y1={dy} x2={hingeX} y2={hy} stroke="#8a7a6a" strokeWidth={.6} strokeDasharray="2,2" /><text x={hingeX + (hingesLeft ? 6 : -6)} y={(dy + hy) / 2 + 3} textAnchor={hingesLeft ? "start" : "end"} fontSize={8} fill="#8a7a6a" fontWeight="700" fontFamily="JetBrains Mono">{Math.round(hingeMargin)}</text></g>)}
                            {idx === hingeYs.length - 1 && (<g><line x1={hingeX} y1={dy + dha} x2={hingeX} y2={hy} stroke="#8a7a6a" strokeWidth={.6} strokeDasharray="2,2" /><text x={hingeX + (hingesLeft ? 6 : -6)} y={(dy + dha + hy) / 2 + 3} textAnchor={hingesLeft ? "start" : "end"} fontSize={8} fill="#8a7a6a" fontWeight="700" fontFamily="JetBrains Mono">{Math.round(hingeMargin)}</text></g>)}
                          </g>
                        ))}
                        <text x={hingeX + (hingesLeft ? 20 : -20)} y={hingeYs[0] + 3} textAnchor={hingesLeft ? "start" : "end"} fontSize={8} fill="#555" fontWeight="600" fontFamily="Inter">35mm pánthely</text>
                      </svg>
                    </ZoomableSvg>
                  );
                })()}
              </div>
            </div>
          </div>
        </div>

    }

    // ═══════════════════════════════════════════
    // UPPER 2-DOOR CABINET CALCULATOR
    // ═══════════════════════════════════════════
    function Upper2DoorCalc({ params, boardColors, edgeBandOptions, partDefaults, onBack }) {
      const [W, setW] = usePersistentState("Upper2DoorCalc", "W", 600);
      const [customH, setCustomH] = usePersistentState("Upper2DoorCalc", "customH", null);
      const [shelfCount, setShelfCount] = usePersistentState("Upper2DoorCalc", "shelfCount", 1);
      const [backT, setBackT] = usePersistentState("Upper2DoorCalc", "backT", 3);
      const [bottomPos, setBottomPos] = usePersistentState("Upper2DoorCalc", "bottomPos", "between");
      const [topPos, setTopPos] = usePersistentState("Upper2DoorCalc", "topPos", "between");
      const [doorGapTop, setDoorGapTop] = usePersistentState("Upper2DoorCalc", "doorGapTop", params.upperDoorGapTop);
      const [doorGapBottom, setDoorGapBottom] = usePersistentState("Upper2DoorCalc", "doorGapBottom", params.upperDoorGapBottom);
      const [doorGapSide, setDoorGapSide] = usePersistentState("Upper2DoorCalc", "doorGapSide", params.upperDoorGapSide);
      const [shelfSetback, setShelfSetback] = usePersistentState("Upper2DoorCalc", "shelfSetback", params.shelfSetback);
      const [splitSides, setSplitSides] = usePersistentState("Upper2DoorCalc", "splitSides", false);
      const [swappedParts, setSwappedParts] = usePersistentState("Upper2DoorCalc", "swappedParts", {});
      const [handlePitch, setHandlePitch] = usePersistentState("Upper2DoorCalc", "handlePitch", params.handlePitch);
      const [handleOrient, setHandleOrient] = usePersistentState("Upper2DoorCalc", "handleOrient", params.handleOrient);
      const [handleCenter, setHandleCenter] = usePersistentState("Upper2DoorCalc", "handleCenter", params.handleCenter);
      const [doorHanding, setDoorHanding] = usePersistentState("Upper2DoorCalc", "doorHanding", "left");
      const [handleMarginX, setHandleMarginX] = usePersistentState("Upper2DoorCalc", "handleMarginX", params.handleMarginX);
      const [handleMarginY, setHandleMarginY] = usePersistentState("Upper2DoorCalc", "handleMarginY", params.handleMarginY);
      const [hingeMargin, setHingeMargin] = usePersistentState("Upper2DoorCalc", "hingeMargin", params.hingeMargin);
      const [doorMaterial, setDoorMaterial] = usePersistentState("Upper2DoorCalc", "doorMaterial", "butorlap");
      const [mdfThickness, setMdfThickness] = usePersistentState("Upper2DoorCalc", "mdfThickness", 18);

      const bt = params.boardThickness;
      const autoTotalCabinetH = params.upperHeight;
      const totalCabinetH = customH !== null ? customH : autoTotalCabinetH;
      const corpusFrameH = totalCabinetH;

      let sideH = corpusFrameH;
      if (bottomPos === "under") sideH -= bt;
      if (topPos === "over") sideH -= bt;

      const internalW = W - 2 * bt;
      let internalH = sideH;
      if (bottomPos === "between") internalH -= bt;
      if (topPos === "between") internalH -= bt;

      const doorH = corpusFrameH - doorGapTop - doorGapBottom;
      const doorGapMiddle = 2;
      const doorW = (W - 2 * doorGapSide - doorGapMiddle) / 2;
      const backPanelW = W - params.backPanelGap;
      const backPanelH = corpusFrameH - params.backPanelGap;
      const shelfDepth = params.upperDepth - shelfSetback;
      const bottomPanelL = bottomPos === "between" ? internalW : W;
      const topPanelL = topPos === "between" ? internalW : W;

      const BOARD_KG_PER_M2 = doorMaterial === "mdf" ? (mdfThickness * 0.7) : 11.8;
      const doorAreaM2 = (doorH / 1000) * (doorW / 1000);
      const doorWeightKg = R(doorAreaM2 * BOARD_KG_PER_M2, 2);
      const hingesByHeight = doorH <= 900 ? 2 : doorH <= 1600 ? 3 : doorH <= 2000 ? 4 : Math.max(2, Math.ceil(doorH / 500));
      const hingesByWeight = doorWeightKg <= 6 ? 2 : doorWeightKg <= 12 ? 3 : doorWeightKg <= 17 ? 4 : doorWeightKg <= 22 ? 5 : Math.max(2, Math.ceil(doorWeightKg / 5));
      const hingeCount = Math.max(hingesByHeight, hingesByWeight);

      const getDef = (id) => partDefaults.find(p => p.id === id) || { colorIdx: 0, edges: [e04, null, null, null] };
      const sideDef = getDef("upper_side");
      const bottomDef = getDef("upper_bottom");
      const topDef = getDef("upper_top");
      const backDef = getDef("upper_back");
      const doorDef = getDef("upper_door");
      const shelfDef = getDef("upper_shelf");

      const sideNote = () => { let n = []; if (bottomPos === "under") n.push("Lent rááll"); if (topPos === "over") n.push("Fent alááll"); return n.join(", "); };

      const defaultParts = [
        ...(splitSides ? [
          { id: "side_l", name: "Oldallap (bal)", qty: 1, l: sideH, w: params.upperDepth, t: bt, note: sideNote(), colorIdx: sideDef.colorIdx, edges: [...sideDef.edges] },
          { id: "side_r", name: "Oldallap (jobb)", qty: 1, l: sideH, w: params.upperDepth, t: bt, note: sideNote(), colorIdx: sideDef.colorIdx, edges: [...sideDef.edges] },
        ] : [
          { id: "side", name: "Oldallap", qty: 2, l: sideH, w: params.upperDepth, t: bt, note: sideNote(), colorIdx: sideDef.colorIdx, edges: [...sideDef.edges] },
        ]),
        { id: "bottom", name: "Fenéklap", qty: 1, l: bottomPanelL, w: params.upperDepth, t: bt, note: bottomPos === "between" ? "Oldalfalak között" : "Oldalfalak alatt", colorIdx: bottomDef.colorIdx, edges: bottomPos === "between" ? [...bottomDef.edges] : [bottomDef.edges[0], bottomDef.edges[1], bottomDef.edges[0] || e04, bottomDef.edges[3]] },
        { id: "top", name: "Tetőlap", qty: 1, l: topPanelL, w: params.upperDepth, t: bt, note: topPos === "between" ? "Oldalfalak között" : "Oldalfalak felett", colorIdx: topDef.colorIdx, edges: topPos === "between" ? [...topDef.edges] : [topDef.edges[0], topDef.edges[1], topDef.edges[0] || e04, topDef.edges[3]] },
        { id: "back", name: "Hátlap", qty: 1, l: backPanelW, w: backPanelH, t: backT, note: "HDF (" + params.backPanelGap + " mm behúzás)", colorIdx: backDef.colorIdx, edges: [...backDef.edges] },
        { id: "door", name: "Ajtólap", qty: 2, l: doorH, w: doorW, t: bt, note: R(doorWeightKg, 1) + " kg — Blum " + hingeCount + " pár pánt", colorIdx: doorDef.colorIdx, edges: [...doorDef.edges] },
        ...Array.from({ length: shelfCount }, (_, i) => ({ id: "shelf_" + i, name: "Polc" + (shelfCount > 1 ? " " + (i + 1) : ""), qty: 1, l: internalW, w: shelfDepth, t: bt, note: "Állítható", colorIdx: shelfDef.colorIdx, edges: [...shelfDef.edges] })),
      ];

      const toggleSwap = (id) => setSwappedParts(prev => ({ ...prev, [id]: !prev[id] }));
      const getDisplayDims = (p) => { const swapped = swappedParts[p.id]; return swapped ? { l: p.w, w: p.l } : { l: p.l, w: p.w }; };
      const [partOverrides, setPartOverrides] = usePersistentState("Upper2DoorCalc", "partOverrides", {});
      const getPart = (p) => { const ov = partOverrides[p.id] || {}; return { ...p, colorIdx: ov.colorIdx !== undefined ? ov.colorIdx : p.colorIdx, edges: ov.edges || p.edges }; };
      const setPartOverride = (id, key, val) => setPartOverrides(prev => ({ ...prev, [id]: { ...prev[id], [key]: val } }));
      const parts = defaultParts.map(getPart);

      const thickLabels = ["0.4", "2"];
      const edgeBg = (e) => { if (!e) return "#e0dbd0"; const colors = ["#b8d0e8", "#e8c8a0"]; return colors[e.o] || "#ddd"; };
      const cycleEdgeColor = (e) => { if (!e) return { o: 0, t: edgeBandOptions[0]?.defT || 0 }; if (e.o < edgeBandOptions.length - 1) return { ...e, o: e.o + 1 }; return null; };
      const toggleEdgeThick = (e) => { if (!e) return { o: 0, t: 1 }; return { ...e, t: e.t === 0 ? 1 : 0 }; };

      const SVW = 370, SVH = 480;
      const padL = 80, padR = 80, padT = 36, padB = 40;
      const drawW = SVW - padL - padR; const drawH = SVH - padT - padB;
      const scX = drawW / W; const scY = drawH / totalCabinetH;
      const sc = Math.min(scX, scY);
      const cw = W * sc; const ch = totalCabinetH * sc;
      const cx = padL + (drawW - cw) / 2; const cy = padT + (drawH - ch) / 2;
      const yFromBot = (mm) => cy + ch - mm * sc;
      const cabinetTopY = cy; const cabinetBotY = cy + ch;
      const sideTopY = topPos === "over" ? cabinetTopY + bt * sc : cabinetTopY;
      const sideBotY = bottomPos === "under" ? cabinetBotY - bt * sc : cabinetBotY;
      const sideDrawH = sideBotY - sideTopY;

      return (
        <div style={{ maxWidth: 1200, margin: "0 auto", padding: 16 }}>
          <button onClick={onBack} style={{ padding: "6px 16px", borderRadius: 8, background: "rgba(90,42,10,.1)", border: "1.5px solid rgba(90,42,10,.2)", color: BRN, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "Inter, sans-serif", marginBottom: 16 }}>{"←"} Vissza a szekrénytípusokhoz</button>
          <div style={{ display: "grid", gridTemplateColumns: "340px 1fr", gap: 20, alignItems: "start" }}>
            <div>
              <div style={cardStyle}>
                <div style={{ fontWeight: 800, fontSize: 14, color: BRN, marginBottom: 12 }}>{"🚪🚪"} 2 ajtós felső szekrény</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                    Szekrény szélessége
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}><input type="number" value={W} min={200} onChange={e => setW(e.target.value === "" ? "" : +e.target.value)} style={{ ...inputStyle, fontSize: 14 }} /><span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>mm</span></div>
                    <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                      {[300, 450, 600, 800, 900].map(w => (<button key={w} onClick={e => { e.preventDefault(); setW(w); }} style={{ padding: "2px 8px", borderRadius: 5, fontSize: 11, cursor: "pointer", background: W === w ? "#5a2a0a" : "#e8dfd0", color: W === w ? "#fff" : "#5a4a3a", border: W === w ? "1.5px solid #5a2a0a" : "1.5px solid #c0b090", fontWeight: 700, fontFamily: "JetBrains Mono, monospace", transition: "all .15s" }}>{w}</button>))}
                    </div>
                  </label>
                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span>Szekrény magassága</span>
                      {customH !== null && (<button onClick={() => setCustomH(null)} style={{ fontSize: 9, padding: "1px 6px", borderRadius: 5, cursor: "pointer", background: "#f0e0d0", border: "1px solid #c0a080", color: BRN, fontWeight: 700 }}>{"↩"} Auto ({autoTotalCabinetH} mm)</button>)}
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}><input type="number" value={customH !== null ? customH : autoTotalCabinetH} min={100} onChange={e => setCustomH(e.target.value === "" ? "" : +e.target.value)} style={{ ...inputStyle, fontSize: 14, borderColor: customH !== null ? AMB : "#ddd" }} /><span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>mm</span></div>
                    {customH === null && <span style={{ fontSize: 9, color: "#aaa" }}>Számított: {autoTotalCabinetH} mm (módosítható)</span>}

        { id: "tall", icon: "📐", title: "Magas szekrény", desc: "Padlótól a felsőig érő", category: "magas", ready: false },
        { id: "custom", icon: "✏️", title: "Egyedi szekrény", desc: "Szabadon megadott méretek", category: "egyedi", ready: false },
      ] : [
        { id: "simple1", icon: "🚪", title: "1 ajtós szekrény", desc: "Egyajtós szekrény, polccal", category: "egyedi", ready: true },
      ];

      if (selectedCabinet === "lower1" || selectedCabinet === "simple1") {
        return <Lower1DoorCalc variant={variant} params={params} boardColors={boardColors} edgeBandOptions={edgeBandOptions} partDefaults={partDefaults} onBack={() => setSelectedCabinet(null)} />;
      }
      if (selectedCabinet === "lower2") {
        return <Lower2DoorCalc variant={variant} params={params} boardColors={boardColors} edgeBandOptions={edgeBandOptions} partDefaults={partDefaults} onBack={() => setSelectedCabinet(null)} />;
      }
      if (selectedCabinet === "upper1") {
        return <Upper1DoorCalc params={params} boardColors={boardColors} edgeBandOptions={edgeBandOptions} partDefaults={partDefaults} onBack={() => setSelectedCabinet(null)} />;
      }
      if (selectedCabinet === "upper2") {
        return <Upper2DoorCalc params={params} boardColors={boardColors} edgeBandOptions={edgeBandOptions} partDefaults={partDefaults} onBack={() => setSelectedCabinet(null)} />;
      }

      // Áthelyezett funkciók az edge módosításhoz
      const thickLabels = ["0.4", "2"];
      const edgeBg = (e) => {
        if (!e) return "#e0dbd0";
        const colors = ["#b8d0e8", "#e8c8a0"];
        return colors[e.o] || "#ddd";
      };
      const cycleEdgeColor = (e) => {
        if (!e) return { o: 0, t: edgeBandOptions[0]?.defT || 0 };
        if (e.o < edgeBandOptions.length - 1) return { ...e, o: e.o + 1 };
        return null;
      };
      const toggleEdgeThick = (e) => {
        if (!e) return { o: 0, t: 1 };
        return { ...e, t: e.t === 0 ? 1 : 0 };
      };

      if (corpusPage === "types") {
        return (
          <div style={{ maxWidth: 800, margin: "0 auto", padding: 16 }}>
            <button onClick={() => setCorpusPage("params")} style={{
              padding: "6px 16px", borderRadius: 8, background: "rgba(90,42,10,.1)", border: "1.5px solid rgba(90,42,10,.2)",
              color: BRN, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "Inter, sans-serif", marginBottom: 16
            }}>{"\u2190"} Vissza az Alapadatokhoz</button>
            <div style={{ fontWeight: 800, fontSize: 18, color: BRN, marginBottom: 16, borderBottom: "2px solid #e0dbd0", paddingBottom: 10 }}>
              {"\uD83C\uDFD7\uFE0F"} Szekrénytípusok
            </div>
            {["alsó", "felső", "magas", "egyedi"].map(cat => {
              const items = cabinetTypes.filter(c => c.category === cat);
              if (items.length === 0) return null;
              const catLabels = { "alsó": "Alsó szekrények", "felső": "Felső szekrények", magas: "Magas / speciális", egyedi: variant === "kitchen" ? "Egyedi" : "Szekrények" };
              const catColors = { "alsó": GRN, "felső": BLUE, magas: BRN, egyedi: "#555" };
              return (
                <div key={cat} style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 12, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".06em", color: catColors[cat], marginBottom: 12 }}>{catLabels[cat]}</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 12 }}>
                    {items.map(c => (
                      <div key={c.id} onClick={() => c.ready && setSelectedCabinet(c.id)} style={{
                        background: "#fff", borderRadius: 12, padding: "16px 18px",
                        border: "2px solid #e0dbd0", cursor: c.ready ? "pointer" : "default",
                        transition: "all .15s", boxShadow: "0 2px 6px rgba(0,0,0,.04)", opacity: c.ready ? 1 : 0.55
                      }}
                        onMouseEnter={e => { if (c.ready) { e.currentTarget.style.borderColor = catColors[cat]; e.currentTarget.style.boxShadow = "0 4px 16px rgba(0,0,0,.1)"; } }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = "#e0dbd0"; e.currentTarget.style.boxShadow = "0 2px 6px rgba(0,0,0,.04)"; }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                          <span style={{ fontSize: 28 }}>{c.icon}</span>
                          <div>
                            <div style={{ fontSize: 14, fontWeight: 800, color: "var(--text)" }}>{c.title}</div>
                            <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 4 }}>{c.desc}</div>
                          </div>
                        </div>
                        <div style={{ marginTop: 14, fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: ".06em", color: c.ready ? catColors[cat] : "#bbb", textAlign: "right" }}>
                          {c.ready ? "Megnyitás \u2192" : "Hamarosan \u2192"}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        );
      }

      // Schema SVG params
      const SCHEMA_H = 340, SCHEMA_W = 380;
      const SCHEMA_PT = 15, SCHEMA_PB = 15;
      const totalMm = params.counterHeight + params.gapBetween + params.upperHeight;
      const schemaScale = (SCHEMA_H - SCHEMA_PT - SCHEMA_PB) / totalMm;
      const toY = (mm) => SCHEMA_H - SCHEMA_PB - (mm * schemaScale);

      const drawDimLine = (x, y1, y2, val, align = "left", offset = 0) => {
        const cx = align === "left" ? x - 4 + offset : x + 4 + offset;
        const Anchor = align === "left" ? "end" : "start";
        const txtX = align === "left" ? cx - 4 : cx + 4;
        return (
          <g>
            <line x1={x} y1={y1} x2={x} y2={y2} stroke="#a09080" strokeWidth={0.8} />
            <line x1={x - 3} y1={y1} x2={x + 3} y2={y1} stroke="#a09080" strokeWidth={0.8} />
            <line x1={x - 3} y1={y2} x2={x + 3} y2={y2} stroke="#a09080" strokeWidth={0.8} />
            <text x={txtX} y={(y1 + y2) / 2 + 3} textAnchor={Anchor} fill="#6a5a4a" fontSize={9} fontWeight={700} fontFamily="JetBrains Mono">{val}</text>
          </g>
        );
      };

      const drawYMarker = (y, val, lbl, align = "left") => {
        const tx = align === "left" ? SCHEMA_W / 2 - 76 : SCHEMA_W / 2 + 76;
        const Anchor = align === "left" ? "end" : "start";
        return (
          <g>
            <line x1={SCHEMA_W / 2 - 65} y1={y} x2={SCHEMA_W / 2 + 65} y2={y} stroke="#c0a890" strokeWidth={0.6} strokeDasharray="3,2" />
            <text x={tx} y={y + 3} textAnchor={Anchor} fill="#5a4a3a" fontSize={9} fontWeight={700} fontFamily="JetBrains Mono">{val} <tspan fill="#8a7a6a" fontWeight={600} fontFamily="Inter">({lbl})</tspan></text>
          </g>
        );
      };

      return (
        <div style={{ maxWidth: 1060, margin: "0 auto", padding: 16 }}>
          {/* Summary bar */}
          <div style={{ background: "var(--card)", borderRadius: "var(--radius)", padding: "12px 18px", marginBottom: 16, display: "flex", gap: 24, flexWrap: "wrap", border: "1px solid var(--border)", boxShadow: "var(--shadow)" }}>
            {(variant === "kitchen" ? [
              ["Oldallap H", sideH + " mm"],
              ["Belső H (alsó)", lowerInternalH + " mm"],
              ["Munkamagasság", params.counterHeight + " mm"],
              ["Felső alja", upperBottom + " mm"],
            ] : [
              ["Teljes H", params.cabinetHeight + " mm"],
              ["Belső H", (params.cabinetHeight - params.plinthHeight - 2 * params.boardThickness) + " mm"],
              ["Mélység", params.lowerDepth + " mm"],
            ]).map(([l, v]) => (
              <div key={l}>
                <div style={{ fontSize: 10, color: "var(--text-secondary)", textTransform: "uppercase", letterSpacing: ".06em", fontWeight: 700 }}>{l}</div>
                <div style={{ fontSize: 16, fontWeight: 800, color: "var(--text)", fontFamily: "JetBrains Mono, monospace" }}>{v}</div>
              </div>
            ))}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "380px 1fr", gap: 20, alignItems: "start" }}>
            {/* Left Column: Global params */}
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={cardStyle}>
                <div style={{ fontWeight: 800, fontSize: 15, color: BRN, marginBottom: 14 }}>{"\uD83D\uDCCB"} Alapadatok</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {paramFields.map(f => (
                    <label key={f.key} style={{ display: "flex", flexDirection: "column", gap: 2, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                      <div style={{ display: "flex", justifyContent: "space-between" }}>
                        <span>{f.label}</span>
                        {f.hint && <span style={{ fontSize: 10, color: "#bbb", fontWeight: 400 }}>({f.hint})</span>}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <input type="number" value={params[f.key]} min={f.min}
                          onChange={e => setP(f.key, e.target.value === "" ? "" : +e.target.value)}
                          style={{ ...inputStyle, fontSize: 13, padding: "6px 8px" }} />
                        <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>{f.unit}</span>
                      </div>
                    </label>
                  ))}
                </div>
              </div>
              <div style={cardStyle}>
                <div style={{ fontWeight: 800, fontSize: 15, color: BRN, marginBottom: 14 }}>{"\uD83D\uDCD0"} Rések</div>
                <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text)", marginBottom: 8, marginTop: 4 }}>Felső szekrény beállítások</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
                  {upperGapFields.map(f => (
                    <label key={f.key} style={{ display: "flex", flexDirection: "column", gap: 2, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                      {f.label}
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <input type="number" value={params[f.key]} min={f.min}
                          onChange={e => setP(f.key, e.target.value === "" ? "" : +e.target.value)}
                          style={{ ...inputStyle, fontSize: 13, padding: "6px 8px" }} />
                        <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>{f.unit}</span>
                      </div>
                    </label>
                  ))}
                </div>
                <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text)", marginBottom: 8 }}>Alsó szekrény beállítások</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {lowerGapFields.map(f => (
                    <label key={f.key} style={{ display: "flex", flexDirection: "column", gap: 2, fontSize: 12, color: "var(--text-secondary)", fontWeight: 600 }}>
                      {f.label}
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <input type="number" value={params[f.key]} min={f.min}
                          onChange={e => setP(f.key, e.target.value === "" ? "" : +e.target.value)}
                          style={{ ...inputStyle, fontSize: 13, padding: "6px 8px" }} />
                        <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>{f.unit}</span>
                      </div>
                    </label>
                  ))}
                </div>
              </div>
              <div style={cardStyle}>
                <div style={{ fontWeight: 800, fontSize: 15, color: BRN, marginBottom: 14 }}>{"\uD83C\uDFA8"} Színek és élzárás</div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-secondary)", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>Bútorlap színek (4 opció)</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 14 }}>
                  {boardColors.map((c, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ width: 24, height: 24, borderRadius: 6, background: c.hex, border: "1.5px solid #bbb", flexShrink: 0 }} />
                      <input type="text" value={c.name}
                        onChange={e => { const nc = [...boardColors]; nc[i] = { ...nc[i], name: e.target.value }; setBoardColors(nc); }}
                        style={{ ...inputStyle, fontSize: 12, padding: "4px 8px" }} />
                      <input type="color" value={c.hex}
                        onChange={e => { const nc = [...boardColors]; nc[i] = { ...nc[i], hex: e.target.value }; setBoardColors(nc); }}
                        style={{ width: 28, height: 28, border: "none", padding: 0, cursor: "pointer", borderRadius: 4 }} />
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 11, fontWeight: 700, color: "var(--text-secondary)", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 8 }}>Élzárás (ABS) színek</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {edgeBandOptions.map((e, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ width: 24, height: 24, borderRadius: 6, background: i === 0 ? "#b8d0e8" : "#e8c8a0", border: "1.5px solid #bbb", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700, color: "#555" }}>{i + 1}</div>
                      <input type="text" value={e.name} placeholder="ABS szín neve"
                        onChange={ev => { const ne = [...edgeBandOptions]; ne[i] = { ...ne[i], name: ev.target.value }; setEdgeBandOptions(ne); }}
                        style={{ ...inputStyle, fontSize: 12, padding: "4px 8px", flex: 1 }} />
                      <div
                        onClick={() => { const ne = [...edgeBandOptions]; ne[i] = { ...ne[i], defT: e.defT === 0 ? 1 : 0 }; setEdgeBandOptions(ne); }}
                        style={{
                          display: "flex", borderRadius: 6, overflow: "hidden", cursor: "pointer", border: "1.5px solid #bbb", flexShrink: 0
                        }}>
                        <div style={{ padding: "4px 8px", fontSize: 10, fontWeight: 700, background: e.defT === 0 ? "#5a2a0a" : "#f0e8d8", color: e.defT === 0 ? "#fff" : "#888", transition: "all .15s" }}>0.4</div>
                        <div style={{ padding: "4px 8px", fontSize: 10, fontWeight: 700, background: e.defT === 1 ? "#5a2a0a" : "#f0e8d8", color: e.defT === 1 ? "#fff" : "#888", transition: "all .15s" }}>2mm</div>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ fontSize: 10, color: "#999", marginTop: 6, marginBottom: 16 }}>Kattints a vastagság váltóra az alapértelmezett beállításhoz.</div>

                <button onClick={() => setShowPartDefaults(s => !s)} style={{
                  background: "none", border: "none", cursor: "pointer", width: "100%", textAlign: "left",
                  fontWeight: 800, fontSize: 12, color: "var(--text)", fontFamily: "Inter, sans-serif", padding: 0,
                  display: "flex", alignItems: "center", justifyContent: "space-between",
                  marginBottom: showPartDefaults ? 10 : 0, paddingBottom: showPartDefaults ? 6 : 0,
                  borderBottom: showPartDefaults ? "1px solid #e0d8c0" : "none", textTransform: "uppercase", letterSpacing: ".05em"
                }}>
                  <span>Alkatrészek alapértelmezett színe és élzárása</span>
                  <span style={{ fontSize: 11, color: "#888", background: "#f0e8d8", padding: "2px 6px", borderRadius: 4 }}>{showPartDefaults ? "\u25B2 Bezár" : "\u25BC Kinyit"}</span>
                </button>

                {showPartDefaults && (
                  <div style={{ marginTop: 8 }}>
                    <div style={{ fontSize: 10, color: "#888", marginBottom: 12, lineHeight: 1.5 }}>
                      {"\uD83D\uDCA1"} <strong>H1</strong> = hosszanti él elöl, <strong>H2</strong> = hátul, <strong>Sz1</strong> = szél. bal/alsó, <strong>Sz2</strong> = jobb/felső<br />
                      Bal klikk = ABS szín váltás <br />
                      Jobb klikk = vastagság váltás (0.4 {"\u2194"} 2 mm)
                    </div>
                    <div style={{ display: "flex", flexDirection: "row", gap: 14 }}>
                      {["lower", "upper"].map(cat => (
                        <div key={cat} style={{ flex: 1 }}>
                          <div style={{ fontSize: 11, fontWeight: 800, color: cat === "lower" ? GRN : BLUE, textTransform: "uppercase", marginBottom: 6, paddingLeft: 2 }}>
                            {cat === "lower" ? "\uD83D\uDCE6 Alsó szekrény alkatrészei" : "\uD83D\uDCE6 Felső szekrény alkatrészei"}
                          </div>
                          <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                            {partDefaults.filter(p => p.filter === cat).map((p) => {
                              const pi = partDefaults.findIndex(pd => pd.id === p.id);
                              return (
                                <div key={p.id} style={{ background: pi % 2 ? "#faf8f4" : "#fff", padding: "6px 10px", borderRadius: 8, border: "1px solid #e8e0d4" }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                    <span style={{ fontWeight: 700, fontSize: 12, color: "var(--text)", minWidth: 80, flex: 1 }}>{p.name}</span>

                                    <div style={{ display: "flex", flexDirection: "column", gap: 4, marginLeft: "auto" }}>
                                      {/* Board color picker */}
                                      <div style={{ display: "flex", gap: 3 }}>
                                        {boardColors.map((c, ci) => (
                                          <button key={ci} onClick={() => {
                                            const newDefs = [...partDefaults];
                                            newDefs[pi] = { ...p, colorIdx: ci };
                                            setPartDefaults(newDefs);
                                          }} style={{
                                            width: 38, height: 26, borderRadius: 5, background: c.hex,
                                            border: p.colorIdx === ci ? "2.5px solid #333" : "1.5px solid #ccc",
                                            cursor: "pointer", padding: 0, transition: "all .1s",
                                            boxShadow: p.colorIdx === ci ? "0 0 0 1px #fff inset" : "none"
                                          }} title={c.name} />
                                        ))}
                                      </div>

                                      {/* Edge toggles */}
                                      <div style={{ display: "flex", gap: 3 }}>
                                      {["H1", "H2", "Sz1", "Sz2"].map((lbl, ei) => {
                                        const ev = p.edges[ei];
                                        return (
                                          <button key={lbl}
                                            onClick={() => {
                                              const newEdges = [...p.edges];
                                              newEdges[ei] = cycleEdgeColor(ev);
                                              const newDefs = [...partDefaults];
                                              newDefs[pi] = { ...p, edges: newEdges };
                                              setPartDefaults(newDefs);
                                            }}
                                            onContextMenu={(e) => {
                                              e.preventDefault();
                                              e.stopPropagation();
                                              const newEdges = [...p.edges];
                                              newEdges[ei] = toggleEdgeThick(ev);
                                              const newDefs = [...partDefaults];
                                              newDefs[pi] = { ...p, edges: newEdges };
                                              setPartDefaults(newDefs);
                                            }}
                                            style={{
                                              width: 38, height: 26, borderRadius: 5, cursor: "pointer",
                                              background: edgeBg(ev),
                                              border: ev ? "1.5px solid #888" : "1.5px solid #d0ccc0",
                                              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                                              fontSize: 7, fontWeight: 700, color: ev ? "#333" : "#bbb",
                                              transition: "all .1s", padding: 0
                                            }}>
                                            <span style={{ fontSize: 6, opacity: .5 }}>{lbl}</span>
                                            <span>{ev ? (edgeBandOptions[ev.o]?.name?.substring(0, 3) || "?") : "\u2014"}</span>
                                          </button>
                                        );
                                      })}
                                      </div>
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            </div>

            {/* Right Column: Other params & Start CTA */}
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {/* KONYHA VAGY SZEKRÉNY MAGASSÁGI SÉMA SVG */}
              <div style={{ ...cardStyle, padding: 0, overflow: "hidden" }}>
                <div style={{ padding: "14px 18px", borderBottom: "1px solid #e8e0d4", background: "#faf8f4", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontWeight: 800, fontSize: 13, color: BRN }}>{variant === "kitchen" ? "Konyha magassági séma" : "Szekrény magassági séma"}</span>
                  <span style={{ fontSize: 11, color: "#888", fontWeight: 700, fontFamily: "JetBrains Mono" }}>{variant === "kitchen" ? totalMm : params.cabinetHeight} mm</span>
                </div>
                <div style={{ display: "flex", justifyContent: "center", padding: "16px 0", background: "#fff" }}>
                  <ZoomableSvg width={SCHEMA_W} height={SCHEMA_H}>
                    <svg width={SCHEMA_W} height={SCHEMA_H} style={{ overflow: "visible" }}>
                      <defs>
                        <pattern id="plinthPattern2" width={6} height={6} patternUnits="userSpaceOnUse">
                          <path d="M 6 0 L 0 6" fill="none" stroke="#ddd" strokeWidth={2} />
                        </pattern>
                      </defs>

                      {/* Alapvonal */}
                      <line x1={20} y1={toY(0)} x2={SCHEMA_W - 20} y2={toY(0)} stroke="#ccc" strokeWidth={1} />
                      <text x={SCHEMA_W / 2} y={toY(0) + 12} textAnchor="middle" fontSize={9} fill="#aaa" fontWeight={600} fontFamily="Inter">Padlószint 0</text>

                      {/* Dobozok */}
                      {(() => {
                        const hw = 100, hx = SCHEMA_W / 2 - hw / 2;
                        const plTop = params.plinthHeight;

                        if (variant === "kitchen") {
                          const cTop = params.counterHeight;
                          const cBot = cTop - params.countertopThickness;
                          return (
                            <g>
                              <rect x={hx + 10} y={toY(plTop)} width={hw - 20} height={plTop * schemaScale} fill="url(#plinthPattern2)" stroke="#ccc" strokeWidth={1} />
                              <rect x={hx} y={toY(cBot)} width={hw} height={(cBot - plTop) * schemaScale} fill="#faf7ec" stroke={BRD} strokeWidth={1.5} />
                              <rect x={hx - 5} y={toY(cTop)} width={hw + 5} height={params.countertopThickness * schemaScale} fill="#e4d8c8" stroke={BRN} strokeWidth={1.5} />

                              {/* Felső szekrény */}
                              {(() => { const uW = ((params.upperDepth || 300) / (params.lowerDepth || 560)) * hw; return <rect x={hx + hw - uW} y={toY(totalMm)} width={uW} height={params.upperHeight * schemaScale} fill="#edf4fa" stroke={BLUE} strokeWidth={1.5} />; })()}

                              {/* Y Markers for typical levels */}
                              {drawYMarker(toY(plTop), plTop, "Lábazat", "left")}
                              {drawYMarker(toY(cTop), cTop, "Munkalap", "left")}
                              {drawYMarker(toY(cTop + params.gapBetween), cTop + params.gapBetween, "Felső szekrény alja", "right")}
                              {drawYMarker(toY(totalMm), totalMm, "Teljes / Felső teteje", "right")}

                              {/* Dims that show DELTAs */}
                              {drawDimLine(hx - 35, toY(cTop), toY(cBot), params.countertopThickness, "left")}
                              {drawDimLine(hx - 70, toY(cBot), toY(plTop), cBot - plTop, "left")}
                              {drawDimLine(hx + hw + 25, toY(cTop + params.gapBetween), toY(cTop), params.gapBetween, "right", 0)}
                              {drawDimLine(hx + hw + 25, toY(totalMm), toY(cTop + params.gapBetween), params.upperHeight, "right", 0)}
                            </g>
                          );
                        } else {
                          // Egyszerű szekrény séma
                          const cabTop = params.cabinetHeight;
                          const cabScale = (SCHEMA_H - SCHEMA_PT - SCHEMA_PB) / Math.max(100, cabTop);
                          const sY = (mm) => SCHEMA_H - SCHEMA_PB - (mm * cabScale);
                          return (
                            <g>
                              <rect x={hx + 10} y={sY(plTop)} width={hw - 20} height={plTop * cabScale} fill="url(#plinthPattern2)" stroke="#ccc" strokeWidth={1} />
                              <rect x={hx} y={sY(cabTop)} width={hw} height={(cabTop - plTop) * cabScale} fill="#faf7ec" stroke={BRD} strokeWidth={1.5} />

                              <line x1={SCHEMA_W / 2 - 65} y1={sY(plTop)} x2={SCHEMA_W / 2 + 65} y2={sY(plTop)} stroke="#c0a890" strokeWidth={0.6} strokeDasharray="3,2" />
                              <text x={SCHEMA_W / 2 - 76} y={sY(plTop) + 3} textAnchor="end" fill="#5a4a3a" fontSize={9} fontWeight={700} fontFamily="JetBrains Mono">{plTop} <tspan fill="#8a7a6a" fontWeight={600} fontFamily="Inter">(Lábazat)</tspan></text>

                              <line x1={SCHEMA_W / 2 - 65} y1={sY(cabTop)} x2={SCHEMA_W / 2 + 65} y2={sY(cabTop)} stroke="#c0a890" strokeWidth={0.6} strokeDasharray="3,2" />
                              <text x={SCHEMA_W / 2 - 76} y={sY(cabTop) + 3} textAnchor="end" fill="#5a4a3a" fontSize={9} fontWeight={700} fontFamily="JetBrains Mono">{cabTop} <tspan fill="#8a7a6a" fontWeight={600} fontFamily="Inter">(Tető)</tspan></text>

                              {/* Dims that show DELTAs */}
                              <g>
                                <line x1={hx + 90} y1={sY(cabTop)} x2={hx + 90} y2={sY(plTop)} stroke="#a09080" strokeWidth={0.8} />
                                <line x1={hx + 87} y1={sY(cabTop)} x2={hx + 93} y2={sY(cabTop)} stroke="#a09080" strokeWidth={0.8} />
                                <line x1={hx + 87} y1={sY(plTop)} x2={hx + 93} y2={sY(plTop)} stroke="#a09080" strokeWidth={0.8} />
                                <text x={hx + 94} y={(sY(cabTop) + sY(plTop)) / 2 + 3} textAnchor="start" fill="#6a5a4a" fontSize={9} fontWeight={700} fontFamily="JetBrains Mono">{cabTop - plTop}</text>
                              </g>
                            </g>
                          );
                        }
                      })()}
                    </svg>
                  </ZoomableSvg>
                </div>
              </div>

              <div style={cardStyle}>
                <div style={{ fontWeight: 800, fontSize: 15, color: BRN, marginBottom: 14 }}>{"\uD83D\uDDDD\uFE0F"} Fogantyú és pánthely (Alapértelmezések)</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <GlobalHandleSelector
                    orient={params.handleOrient}

                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 11, color: "var(--text-secondary)", fontWeight: 600 }}>

                      <span style={{ fontSize: 10, color: "#888" }}>mm</span>

                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 11, color: "var(--text-secondary)", fontWeight: 600 }}>
                    Kezdő furat táv. oldalról
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={params.handleMarginX} disabled={params.handleCenter && params.handleOrient === "horizontal"} onChange={e => setP("handleMarginX", +e.target.value)} style={{ ...inputStyle, flex: 1, padding: "6px 8px", fontSize: 13, opacity: params.handleCenter && params.handleOrient === "horizontal" ? .5 : 1 }} title="Csak aszimmetrikus pozíciónál érvényes" />
                      <span style={{ fontSize: 10, color: "#888" }}>mm</span>
                    </div>
                  </label>
                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 11, color: "var(--text-secondary)", fontWeight: 600 }}>
                    Kezdő furat táv. fentről
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <input type="number" value={params.handleMarginY} onChange={e => setP("handleMarginY", +e.target.value)} style={{ ...inputStyle, flex: 1, padding: "6px 8px", fontSize: 13 }} />
                      <span style={{ fontSize: 10, color: "#888" }}>mm</span>
                    </div>
                  </label>
                  <label style={{ display: "flex", flexDirection: "column", gap: 3, fontSize: 11, color: "var(--text-secondary)", fontWeight: 600 }}>
                    Pánthely távolsága széltől

                      <input type="number" value={params.hingeMargin} onChange={e => setP("hingeMargin", +e.target.value)} style={{ ...inputStyle, flex: 1, padding: "6px 8px", fontSize: 13 }} />
                      <span style={{ fontSize: 10, color: "#888" }}>mm</span>
